                                                        <div className="flex gap-1 mb-1">
                                                            {currentMemos.filter(m => m.linkedNodeId === node.id).map(m => (
                                                                <span key={m.id} className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-medium bg-yellow-100 text-yellow-800 border border-yellow-300">
                                                                    <i className="fas fa-thumbtack text-[8px]"></i>{m.title || 'MEMO'}
                                                                </span>
                                                            ))}
                                                        </div>
                                                    ) : null;
                                                })()}

                                                {/* 子任務清單 (多行 textarea) */}
                                                {node.subtasks.length > 0 && (
                                                    <div className="mt-2 pl-3 border-l-2 border-dashed border-slate-200 space-y-1">
                                                        {node.subtasks.map(sub => (
                                                            <div key={sub.id} className="flex items-start gap-2 group/sub">
                                                                <i className="far fa-clock text-xs text-slate-400 mt-1.5"></i>
                                                                <AutoResizeTextarea
                                                                    className="text-sm text-slate-600 bg-transparent border-none focus:outline-none focus:bg-slate-50 w-full py-0.5 px-1 rounded"
                                                                    value={sub.text}
                                                                    onChange={(e) => updateSubtaskText(activeDay.id, node.id, sub.id, e.target.value)}
                                                                    placeholder="輸入預估時間或備註..."
                                                                />
                                                                <button onClick={() => deleteSubtask(activeDay.id, node.id, sub.id)} className="text-slate-300 hover:text-red-500 opacity-0 group-hover/sub:opacity-100 p-1 flex-shrink-0">
                                                                    <i className="fas fa-times text-xs"></i>
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}

                                                <div className="mt-2 flex gap-3">
                                                    <button onClick={() => addSubtask(activeDay.id, node.id)} className="text-xs text-blue-500 hover:text-blue-700 font-medium flex items-center gap-1 opacity-50 hover:opacity-100 transition-opacity">
                                                        <i className="fas fa-plus-circle"></i> 新增預估時間/車程
                                                    </button>
                                                    <button onClick={() => addChildNode(activeDay.id, node.id)} className="text-xs text-emerald-500 hover:text-emerald-700 font-medium flex items-center gap-1 opacity-50 hover:opacity-100 transition-opacity">
                                                        <i className="fas fa-sitemap"></i> 新增子節點
                                                    </button>
                                                </div>

                                                {/* --- 水平子節點區域 --- */}
                                                {(node.children || []).length > 0 && (
                                                    <div className="mt-3 pt-3 border-t border-dashed border-slate-200">
                                                        <div className="text-xs text-slate-400 mb-2 font-medium flex items-center gap-1">
                                                            <i className="fas fa-layer-group"></i> 子節點方案
                                                        </div>
                                                        <div className="flex gap-3 overflow-x-auto children-scroll pb-2">
                                                            {(node.children || []).map(child => (
                                                                <div key={child.id} className="flex-shrink-0 w-52 bg-white border rounded-lg p-2.5 group/child hover:shadow transition-shadow" style={{ borderLeft: `3px solid ${nodeStyle.border}`, borderColor: '#e2e8f0' }}>
                                                                    <div className="flex justify-between items-center mb-1.5">
                                                                        <input 
                                                                            className="font-semibold text-sm text-slate-700 bg-transparent border-none focus:outline-none focus:ring-1 focus:ring-emerald-300 rounded px-1 w-full"
                                                                            value={child.title}
                                                                            onChange={(e) => updateChildTitle(activeDay.id, node.id, child.id, e.target.value)}
                                                                            placeholder="子節點名稱..."
                                                                        />
                                                                        <button onClick={() => deleteChildNode(activeDay.id, node.id, child.id)} className="text-slate-300 hover:text-red-500 opacity-0 group-hover/child:opacity-100 text-xs ml-1 flex-shrink-0">
                                                                            <i className="fas fa-times"></i>
                                                                        </button>
                                                                    </div>
                                                                    {/* 子節點的預估時間 */}
                                                                    {child.subtasks.length > 0 && (
                                                                        <div className="pl-2 border-l-2 border-dashed border-slate-200 space-y-1 mb-1.5">
                                                                            {child.subtasks.map(csub => (
                                                                                <div key={csub.id} className="flex items-start gap-1 group/csub">
                                                                                    <i className="far fa-clock text-[10px] text-slate-400 mt-1"></i>
                                                                                    <AutoResizeTextarea
                                                                                        className="text-xs text-slate-500 bg-transparent border-none focus:outline-none focus:bg-white w-full py-0.5 px-0.5 rounded"
                                                                                        value={csub.text}
                                                                                        onChange={(e) => updateChildSubtaskText(activeDay.id, node.id, child.id, csub.id, e.target.value)}
                                                                                        placeholder="預估時間..."
                                                                                    />
                                                                                    <button onClick={() => deleteChildSubtask(activeDay.id, node.id, child.id, csub.id)} className="text-slate-300 hover:text-red-500 opacity-0 group-hover/csub:opacity-100 text-[10px] flex-shrink-0">
                                                                                        <i className="fas fa-times"></i>
                                                                                    </button>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    )}
                                                                    <button onClick={() => addChildSubtask(activeDay.id, node.id, child.id)} className="text-[10px] text-blue-400 hover:text-blue-600 font-medium flex items-center gap-0.5 opacity-60 hover:opacity-100">
                                                                        <i className="fas fa-plus-circle"></i> 預估時間
                                                                    </button>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );})}
                                </div>

                                {/* 新增節點按鈕 */}
                                <div className="mt-4 relative">
                                    <div className="absolute -left-[1.65rem] md:-left-[3.65rem] top-2 w-3 h-3 rounded-full bg-slate-300 z-10"></div>
                                    <button onClick={() => addNode(activeDay.id)} className="border-2 border-dashed border-slate-300 text-slate-500 hover:border-blue-400 hover:text-blue-500 w-full py-2 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 transition-colors">
                                        <i className="fas fa-plus"></i> 新增行程節點
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 無選中天數的提示 */}
                        {!activeDay && activePlan && activeDayId !== 'checklist' && (
                            <div className="text-center py-20 text-slate-400">
                                <i className="far fa-calendar-plus text-4xl mb-4 block"></i>
                                <p className="text-lg font-medium mb-2">尚無行程天數</p>
                                <p className="text-sm mb-4">點擊上方「新增一天」開始規劃</p>
                                <button onClick={addDay} className="bg-slate-800 text-white px-6 py-2 rounded-full shadow-lg hover:bg-slate-700 font-semibold inline-flex items-center gap-2">
                                    <i className="far fa-calendar-plus"></i> 新增第一天
                                </button>
                            </div>
                        )}
                    </main>
                    {/* --- 結束：時間軸主內容區 --- */}

                    {/* --- 獨立呈現區：行前清單 (Checklist) --- */}
                    {activePlan && activeDayId === 'checklist' && (
                        <div className="max-w-4xl mx-auto mt-6 px-4 md:px-8 mb-12">
                            <div className="bg-white rounded-xl shadow-sm border border-amber-200/50 overflow-hidden">
                                {/* Header */}
                                <div className="bg-gradient-to-r from-amber-100 to-amber-50 px-6 py-5 border-b border-amber-200/50">
                                    <div className="flex items-center justify-between flex-wrap gap-4">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-amber-200 flex items-center justify-center text-amber-700 text-lg shadow-inner">
                                                <i className="fas fa-tasks"></i>
                                            </div>
                                            <div>
                                                <h2 className="text-xl font-bold text-amber-900 leading-tight">出發前準備清單</h2>
                                                <p className="text-sm text-amber-700/80 font-medium mt-0.5">出門前再確認一次，別讓小東西毀了旅行！</p>
                                            </div>
                                        </div>
                                        
                                        {/* Progress Bar */}
                                        <div className="min-w-[200px] flex-1 max-w-sm">
                                            <div className="flex justify-between text-xs font-bold text-amber-800 mb-1.5">
                                                <span>準備進度</span>
                                                <span>{getChecklistProgress()}%</span>
                                            </div>
                                            <div className="h-2.5 bg-amber-200/50 rounded-full overflow-hidden border border-amber-200 shadow-inner">
                                                <div 
                                                    className="h-full bg-amber-500 rounded-full transition-all duration-500 ease-out" 
                                                    style={{ width: `${getChecklistProgress()}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Body */}
                                <div className="p-6 md:p-8 space-y-8">
                                    {currentChecklists.length === 0 ? (
                                        <div className="text-center py-12 text-slate-400">
                                            <i className="fas fa-clipboard-list text-4xl mb-3 opacity-50 block"></i>
                                            <p className="text-sm">目前沒有任何清單項目。</p>
                                        </div>
                                    ) : (
                                        <div className="columns-1 md:columns-2 gap-8 space-y-8">
                                            {currentChecklists.map((category) => (
                                                <div key={category.id} className="break-inside-avoid bg-slate-50 rounded-lg p-5 border border-slate-200 shadow-sm relative group/cat">
                                                    <div className="flex items-center justify-between mb-4 pb-2 border-b border-slate-200">
                                                        <div className="flex items-center gap-2 w-full">
                                                            <i className="fas fa-folder-open text-amber-600/70"></i>
                                                            <input 
                                                                className="font-bold text-slate-800 bg-transparent border-b border-transparent hover:border-slate-300 focus:border-amber-400 focus:outline-none w-full"
                                                                value={category.category}
                                                                onChange={(e) => updateChecklistCategory(category.id, e.target.value)}
                                                                placeholder="輸入分類名稱..."
                                                            />
                                                        </div>
                                                        <button 
                                                            onClick={() => deleteChecklistCategory(category.id)} 
                                                            className="text-slate-300 hover:text-red-500 opacity-0 group-hover/cat:opacity-100 transition-opacity ml-2 shrink-0"
                                                            title="刪除整個分類"
                                                        >
                                                            <i className="fas fa-trash-alt text-sm"></i>
                                                        </button>
                                                    </div>

                                                    <div className="space-y-2.5">
                                                        {category.items.map((item) => (
                                                            <div key={item.id} className="flex items-start gap-3 group/item">
                                                                <input 
                                                                    type="checkbox" 
                                                                    className="mt-1 w-4 h-4 rounded border-slate-300 text-amber-600 focus:ring-amber-500 cursor-pointer"
                                                                    checked={item.isChecked}
                                                                    onChange={(e) => updateChecklistItem(category.id, item.id, { isChecked: e.target.checked })}
                                                                />
                                                                <AutoResizeTextarea
                                                                    className={`flex-1 bg-transparent border-none focus:outline-none focus:bg-white px-1 py-0.5 rounded text-sm transition-colors ${item.isChecked ? 'text-slate-400 line-through' : 'text-slate-700'}`}
                                                                    value={item.text}
                                                                    onChange={(e) => updateChecklistItem(category.id, item.id, { text: e.target.value })}
                                                                    placeholder="輸入準備事項..."
                                                                />
                                                                <button 
                                                                    onClick={() => deleteChecklistItem(category.id, item.id)} 
                                                                    className="text-slate-300 hover:text-red-500 opacity-0 group-hover/item:opacity-100 transition-opacity pt-0.5 shrink-0"
                                                                >
                                                                    <i className="fas fa-times"></i>
                                                                </button>
                                                            </div>
                                                        ))}
                                                        
                                                        <button 
                                                            onClick={() => addChecklistItem(category.id)} 
                                                            className="text-xs text-amber-600 hover:text-amber-800 font-medium flex items-center gap-1.5 mt-3 pt-2 opacity-70 hover:opacity-100 transition-opacity"
                                                        >
                                                            <i className="fas fa-plus"></i> 新增勾記項目
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* 新增分類按鈕 */}
                                    <div className="pt-4 mt-8 border-t border-slate-100 flex justify-center">
                                        <button 
                                            onClick={addChecklistCategory} 
                                            className="border-2 border-dashed border-amber-200 text-amber-700 hover:bg-amber-50 hover:border-amber-400 py-3 px-8 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors w-full md:w-auto justify-center"
                                        >
                                            <i className="fas fa-layer-group"></i> 新增檢查分類
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- PDF 設定 Modal --- */}
                    {showPdfSettings && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" onClick={() => setShowPdfSettings(false)}>
                            <div className="bg-white rounded-xl shadow-2xl w-96 max-w-[90vw] p-6" onClick={(e) => e.stopPropagation()}>
                                <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <i className="fas fa-file-pdf text-red-500"></i> PDF 匯出設定
                                </h2>

                                <div className="space-y-4">
                                    <div>
                                        <label className="text-sm font-semibold text-slate-600 block mb-1">紙張方向</label>
                                        <div className="flex gap-2">
                                            <button
                                                onClick={() => setPdfSettings(s => ({...s, orientation: 'portrait'}))}
                                                className={`flex-1 py-2 px-3 rounded-lg border text-sm font-medium transition-colors ${pdfSettings.orientation === 'portrait' ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}
                                            >
                                                <i className="fas fa-mobile-alt mr-1"></i> 直式
                                            </button>
                                            <button
                                                onClick={() => setPdfSettings(s => ({...s, orientation: 'landscape'}))}
                                                className={`flex-1 py-2 px-3 rounded-lg border text-sm font-medium transition-colors ${pdfSettings.orientation === 'landscape' ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}
                                            >
                                                <i className="fas fa-mobile-alt fa-rotate-90 mr-1"></i> 橫式
                                            </button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-sm font-semibold text-slate-600 block mb-1">紙張尺寸</label>
                                        <select
                                            className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
                                            value={pdfSettings.format}
                                            onChange={(e) => setPdfSettings(s => ({...s, format: e.target.value}))}
                                        >
                                            {Object.entries(PDF_FORMATS).map(([key, val]) => (
                                                <option key={key} value={key}>{val.name}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="text-sm font-semibold text-slate-600 block mb-1">邊界 (mm)</label>
                                        <input
                                            type="number"
                                            min="0"
                                            max="50"
                                            className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
                                            value={pdfSettings.margin}
                                            onChange={(e) => setPdfSettings(s => ({...s, margin: Number(e.target.value)}))}
                                        />
                                    </div>
                                </div>

                                <div className="flex gap-3 mt-6">
                                    <button
                                        onClick={() => setShowPdfSettings(false)}
                                        className="flex-1 py-2 px-4 border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors"
                                    >
                                        取消
                                    </button>
                                    <button
                                        onClick={() => exportHTML(pdfSettings)}
                                        className="flex-1 py-2 px-4 bg-orange-500 hover:bg-orange-400 text-white rounded-lg text-sm font-bold shadow transition-colors flex items-center justify-center gap-2"
                                    >
                                        <i className="fas fa-file-code"></i> 匯出 HTML
                                    </button>
                                    <button
                                        onClick={() => exportPDF(pdfSettings)}
                                        className="flex-1 py-2 px-4 bg-red-600 hover:bg-red-500 text-white rounded-lg text-sm font-bold shadow transition-colors flex items-center justify-center gap-2"
                                    >
                                        <i className="fas fa-file-pdf"></i> 開始匯出
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* --- 全域備忘錄黑板 (Corkboard) --- */}
                    {showCorkboard && (
                        <div className="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm overflow-y-auto pb-20">
                            <div className="sticky top-0 bg-slate-900/90 shadow p-4 flex justify-between items-center z-10 border-b border-slate-700">
                                <h2 className="text-xl font-bold text-white flex items-center gap-2">
                                    <i className="fas fa-thumbtack text-purple-400"></i> 全域備忘錄黑板
                                    <span className="text-sm font-normal text-slate-400 ml-2 hidden sm:inline">縱覽方案中的所有備忘錄</span>
                                </h2>
                                <button onClick={() => setShowCorkboard(false)} className="text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 p-2 rounded-full transition-colors flex items-center justify-center w-10 h-10 shadow">
                                    <i className="fas fa-times text-xl"></i>
                                </button>
                            </div>
                            <div className="p-6">
                                <div className="columns-1 sm:columns-2 md:columns-3 lg:columns-4 xl:columns-5 gap-6 max-w-[1600px] mx-auto space-y-6">
                                    {activePlan.days.flatMap(day => (day.memos || []).map(memo => ({...memo, dayTitle: day.title + (day.subtitle ? ` - ${day.subtitle}` : '')}))).length === 0 ? (
                                        <div className="text-center text-slate-400 font-medium py-20 col-span-full">
                                            此方案目前沒有任何備忘錄
                                        </div>
                                    ) : (
                                        activePlan.days.flatMap(day => (day.memos || []).map(memo => ({...memo, dayTitle: day.title + (day.subtitle ? ` - ${day.subtitle}` : '')})))
                                        .map(memo => {
                                            const ms = EXPORT_MEMO_COLORS[memo.color] || EXPORT_DEFAULT_MEMO;
                                            return (
                                                <div key={memo.id} className="break-inside-avoid w-full rounded-lg shadow-lg hover:shadow-xl transition-shadow transform hover:-translate-y-1 duration-200" style={{ backgroundColor: ms.bg, border: `1px solid ${ms.border}` }}>
                                                    <div className="px-3 py-2 flex justify-between items-start rounded-t-[7px]" style={{ backgroundColor: ms.titleBg }}>
                                                        <div 
                                                            className="font-bold text-sm bg-transparent border-none focus:outline-none w-full"
                                                            style={{ color: ms.text }}
                                                        >{memo.title || 'MEMO'}</div>
                                                        <span className="text-[10px] font-bold px-1.5 py-0.5 rounded ml-2 whitespace-nowrap bg-white/50" style={{ color: ms.text }}>{memo.dayTitle}</span>
                                                    </div>
                                                    <div className="p-3">
                                                        <div className="text-sm whitespace-pre-wrap outline-none" style={{ color: ms.text }}>
                                                            {memo.text || <span className="opacity-50 italic">無內容</span>}
                                                        </div>
                                                        {memo.image && (
                                                            <div className="mt-3 w-full">
                                                                <img src={memo.image} alt="Memo snapshot" className="w-full rounded shadow-sm border" style={{ borderColor: ms.border }} />
                                                            </div>
                                                        )}
                                                        {memo.linkedNodeId && (() => {
                                                            let linkedDay, linkedNode;
                                                            for (let d of activePlan.days) {
                                                                const nd = d.nodes.find(n => n.id === memo.linkedNodeId);
                                                                if (nd) { linkedDay = d; linkedNode = nd; break; }
                                                            }
                                                            if (linkedNode) return (
                                                                <div className="mt-3 pt-2 text-[10px] font-bold border-t flex items-center gap-1 opacity-70" style={{ color: ms.text, borderColor: ms.border }}>
                                                                    <i className="fas fa-link"></i> {linkedDay?.title} - {linkedNode.title || '無標題節點'}
                                                                </div>
                                                            );
                                                            return null;
                                                        })()}
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
