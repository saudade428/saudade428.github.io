${n.cost ? `<div class="node-cost">${n.currency || ''} ${parseFloat(n.cost).toLocaleString()}</div>` : ''}
</div>`).join('')}
${day.journal ? `<div class="journal">📖 ${day.journal}</div>` : ''}
</div>`).join('')}
<div class="footer">由 TravelItinerary_Pro 產生</div>
</div></body></html>`;
                const blob = new Blob([html], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${activePlan.name}_分享.html`;
                a.click();
                URL.revokeObjectURL(a.href);
            };

            return (
                <div className="min-h-screen relative pb-20">
                    {/* --- 浮動備忘錄（綁定至當前天數） --- */}
                    {currentMemos.map(memo => (
                        <DraggableMemo key={memo.id} memo={memo} updateMemo={updateMemo} deleteMemo={deleteMemo} dayNodes={activeDay?.nodes || []} />
                    ))}

                    {/* --- 頂部統計指標與設定區 --- */}
    <header className="bg-slate-800 text-slate-100 p-3 sm:p-4 shadow-lg sticky top-0 z-40">
        <div className="max-w-6xl mx-auto flex flex-col lg:flex-row justify-between items-center lg:items-start gap-4">
            {/* 左側：Logo 標題 */}
            <div className="w-full lg:w-auto text-center lg:text-left shrink-0">
                <h1 className="text-xl sm:text-2xl font-black tracking-tight text-white flex items-center justify-center lg:justify-start gap-2">
                    <i className="fas fa-plane-departure text-blue-400"></i>
                    TravelItinerary_Pro
                    <span className="bg-blue-500 text-[10px] px-1.5 py-0.5 rounded ml-2">v3.0</span>
                </h1>
                <p className="text-xs text-slate-400 mt-1">拖曳備忘錄、新增節點、跨日排序與追蹤預算</p>
            </div>
            
            {/* 右側：上下分區 (上：花費，下：按鈕) */}
            <div className="flex flex-col items-center lg:items-end gap-3 w-full lg:w-auto flex-1">
                {/* --- 全域預算統計看板 --- */}
                {activePlan && (
                    <div className="flex items-center gap-4 bg-slate-900/60 rounded-xl px-4 py-2 border border-slate-700/50 shadow-inner w-full lg:w-auto justify-center lg:justify-start overflow-x-auto hide-scrollbar">
                        <div className="text-xs text-slate-400 flex items-center font-medium gap-2 border-r border-slate-700 pr-4 shrink-0">
                            <div className="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-blue-400 shadow-sm border border-slate-700">
                                <i className="fas fa-wallet text-sm"></i>
                            </div>
                            <span className="leading-tight text-blue-300">方案<br/>總花費</span>
                        </div>
                        <div className="flex gap-4 min-w-[120px] flex-nowrap items-center">
                            {Object.entries(
                                activePlan.days.flatMap(d => d.nodes).reduce((acc, node) => {
                                    if (node.cost && node.currency) {
                                        acc[node.currency] = (acc[node.currency] || 0) + Number(node.cost);
                                    }
                                    return acc;
                                }, {})
                            ).map(([currency, total]) => (
                                <div key={currency} className="flex items-baseline gap-1.5 shrink-0 bg-blue-900/20 px-2 py-1 rounded">
                                    <span className="text-[10px] font-bold text-blue-300">{currency}</span>
                                    <span className="text-base font-bold font-mono text-white tracking-tight">{total.toLocaleString()}</span>
                                </div>
                            ))}
                            {activePlan.days.flatMap(d => d.nodes).filter(n => n.cost && n.currency).length === 0 && (
                                <span className="text-slate-500 text-xs italic flex items-center h-full shrink-0">尚未新增花費</span>
                            )}
                        </div>
                    </div>
                )}

                {/* --- 按鈕列 --- */}
                <div className="flex gap-2 relative flex-wrap justify-center lg:justify-end w-full lg:w-auto">
                    {/* Undo / Redo 按鈕 */}
                    <button onClick={undo} disabled={!canUndo} className={`px-2.5 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0 ${canUndo ? 'bg-slate-600 hover:bg-slate-500 text-white' : 'bg-slate-700/50 text-slate-500 cursor-not-allowed'}`} title="復原 (Ctrl+Z)">
                        <i className="fas fa-undo"></i>
                    </button>
                    <button onClick={redo} disabled={!canRedo} className={`px-2.5 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0 ${canRedo ? 'bg-slate-600 hover:bg-slate-500 text-white' : 'bg-slate-700/50 text-slate-500 cursor-not-allowed'}`} title="重做 (Ctrl+Y)">
                        <i className="fas fa-redo"></i>
                    </button>
                    <div className="w-[1px] h-6 bg-slate-600 self-center shrink-0"></div>
                    <button onClick={() => setShowCorkboard(true)} className="bg-purple-600 hover:bg-purple-500 text-white px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0">
                        <i className="fas fa-thumbtack"></i> 備忘錄黑板
                    </button>
                    <button onClick={addMemo} className="bg-yellow-500 hover:bg-yellow-600 text-slate-900 px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0">
                        <i className="fas fa-sticky-note"></i> 新增備忘錄
                    </button>

                    <button 
                        onClick={activeDayId === 'checklist' ? () => alert('行前清單模式下無法儲存為圖片，請切換至一般行程') : exportHTML} 
                        className={`px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0 ${activeDayId === 'checklist' ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100'}`}
                    >
                        <i className="fas fa-camera"></i> 儲存為圖片
                    </button>

                    <label className="bg-slate-600 hover:bg-slate-500 cursor-pointer text-white px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0">
                        <i className="fas fa-upload"></i> 匯入
                        <input type="file" accept=".json" onChange={importJSON} className="hidden" />
                    </label>
                    <button onClick={exportJSON} className="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0">
                        <i className="fas fa-download"></i> 匯出 JSON
                    </button>
                    <button onClick={() => setShowMapModal(true)} className="bg-sky-600 hover:bg-sky-500 text-white px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0">
                        <i className="fas fa-map-marked-alt"></i> 地圖
                    </button>
                    <button onClick={() => setShowCompare(true)} className="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0">
                        <i className="fas fa-columns"></i> 對比
                    </button>
                    <button onClick={shareExport} className="bg-teal-600 hover:bg-teal-500 text-white px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0">
                        <i className="fas fa-share-alt"></i> 分享
                    </button>
                    <button 
                        onClick={activeDayId === 'checklist' ? () => alert('行前清單模式下無法匯出 PDF，請切換至一般行程') : () => setShowPdfSettings(true)} 
                        disabled={isExporting || activeDayId === 'checklist'} 
                        className={`px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0 ${activeDayId === 'checklist' ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : isExporting ? 'bg-slate-500 text-white cursor-wait' : 'bg-red-600 hover:bg-red-500 text-white'}`}
                    >
                        <i className={`fas ${isExporting ? 'fa-spinner fa-spin' : 'fa-file-pdf'}`}></i> {isExporting ? '產生中...' : '匯出 PDF'}
                    </button>
                </div>
            </div>
        </div>
    </header>

                    {/* --- 方案切換標籤 (A/B 方案) --- */}
                    <div className="bg-slate-200 px-6 pt-3 flex gap-2 overflow-x-auto hide-scrollbar border-b border-slate-300 items-end">
                        {data.plans.map(plan => (
                            <div 
                                key={plan.id}
                                className={`group/plan px-4 py-2 rounded-t-lg font-medium text-sm transition-colors whitespace-nowrap cursor-pointer flex items-center gap-1.5 ${activePlanId === plan.id ? 'bg-white text-slate-800 border-t border-l border-r border-slate-300 shadow-[0_2px_0_0_white]' : 'bg-slate-300 text-slate-600 hover:bg-slate-400'}`}
                                onClick={() => switchPlan(plan.id)}
                            >
                                {activePlanId === plan.id ? (
                                    <>
                                        <input
                                            className="bg-transparent border-none focus:outline-none focus:bg-white/50 rounded px-1 w-32 font-medium text-sm"
                                            value={plan.name}
                                            onClick={(e) => e.stopPropagation()}
                                            onChange={(e) => {
                                                setData(prev => ({
                                                    ...prev,
                                                    plans: prev.plans.map(p => p.id === plan.id ? { ...p, name: e.target.value } : p)
                                                }));
                                            }}
                                            placeholder="方案名稱..."
                                        />
                                        {data.plans.length > 1 && (
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); deletePlan(plan.id); }} 
                                                className="text-slate-400 hover:text-red-500 transition-colors ml-1"
                                                title="刪除方案"
                                            >
                                                <i className="fas fa-trash-alt text-[10px]"></i>
                                            </button>
                                        )}
                                    </>
                                ) : (
                                    <>
                                        <span>{plan.name}</span>
                                        {data.plans.length > 1 && (
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); deletePlan(plan.id); }} 
                                                className="text-slate-400 hover:text-red-500 opacity-0 group-hover/plan:opacity-100 transition-opacity ml-1"
                                                title="刪除"
                                            >
                                                <i className="fas fa-times text-xs"></i>
                                            </button>
                                        )}
                                    </>
                                )}
                            </div>
                        ))}
                        <button onClick={addPlan} className="px-3 py-2 text-slate-500 hover:text-slate-800 text-sm flex items-center gap-1 whitespace-nowrap">
                            <i className="fas fa-plus"></i> 新增方案
                        </button>
                    </div>

                    {/* --- Day 分頁列 --- */}
                    {activePlan && (
                        <div className="bg-white px-6 py-2 pb-3 mb-2 flex gap-2 flex-wrap border-b border-slate-200 shadow-sm items-center relative z-20">
                            {/* 行前清單專屬 Tab */}
                            <button 
                                onClick={() => setActiveDayId('checklist')}
                                className={`group/day px-4 py-1.5 rounded-full text-sm font-bold transition-colors whitespace-nowrap flex items-center gap-1.5 mr-2 ${activeDayId === 'checklist' ? 'bg-amber-100 text-amber-700 shadow border border-amber-200' : 'bg-slate-50 text-slate-500 hover:bg-slate-100 border border-slate-200'}`}
                            >
                                <i className="fas fa-clipboard-check"></i>
                                行前清單
                            </button>
                            <button
                                onClick={() => setActiveDayId('split')}
                                className={`group/day px-4 py-1.5 rounded-full text-sm font-bold transition-colors whitespace-nowrap flex items-center gap-1.5 mr-1 ${activeDayId === 'split' ? 'bg-emerald-100 text-emerald-700 shadow border border-emerald-200' : 'bg-slate-50 text-slate-500 hover:bg-slate-100 border border-slate-200'}`}
                            >
                                <i className="fas fa-calculator"></i>
                                分帳
                            </button>
                            <button
                                onClick={() => setActiveDayId('budget')}
                                className={`group/day px-4 py-1.5 rounded-full text-sm font-bold transition-colors whitespace-nowrap flex items-center gap-1.5 mr-1 ${activeDayId === 'budget' ? 'bg-indigo-100 text-indigo-700 shadow border border-indigo-200' : 'bg-slate-50 text-slate-500 hover:bg-slate-100 border border-slate-200'}`}
                            >
                                <i className="fas fa-chart-pie"></i>
                                預算
                            </button>
                            <button
                                onClick={() => setActiveDayId('gantt')}
                                className={`group/day px-4 py-1.5 rounded-full text-sm font-bold transition-colors whitespace-nowrap flex items-center gap-1.5 mr-1 ${activeDayId === 'gantt' ? 'bg-orange-100 text-orange-700 shadow border border-orange-200' : 'bg-slate-50 text-slate-500 hover:bg-slate-100 border border-slate-200'}`}
                            >
                                <i className="fas fa-stream"></i>
                                甘特圖
                            </button>
                            <div className="w-[1px] h-6 bg-slate-300 mr-1"></div>

                            {activePlan.days.map((day, idx) => (
                                <div key={day.id} className="flex items-center gap-0.5 relative group/daywrapper">
                                    <button 
                                        onClick={() => setActiveDayId(day.id)}
                                        className={`group/day px-3 py-1.5 rounded-full text-sm font-medium transition-all whitespace-nowrap max-w-[200px] flex items-center gap-1 ${activeDayId === day.id ? 'bg-slate-800 text-white shadow' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'} ${dragOverDayId === day.id ? 'ring-2 ring-blue-400 ring-offset-1 scale-105' : ''}`}
                                        title={day.subtitle ? `${day.title} ${day.subtitle}` : day.title}
                                        onDragOver={(e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setDragOverDayId(day.id); }}
                                        onDragLeave={() => setDragOverDayId(null)}
                                        onDrop={(e) => { e.preventDefault(); if (dragNodeId && activeDay && activeDay.id !== day.id) { moveNodeToDay(dragNodeId, activeDay.id, day.id); } setDragOverDayId(null); handleDragEnd(); }}
                                    >
                                        <i className="far fa-calendar-alt"></i>
                                        <span className="truncate">{day.title}{day.subtitle ? ` ${day.subtitle}` : ''}</span>
                                        {activePlan.days.length > 1 && (
                                            <div 
                                                onClick={(e) => { e.stopPropagation(); deleteDay(day.id); }} 
                                                className="text-slate-400 hover:text-red-400 opacity-0 group-hover/day:opacity-100 transition-opacity ml-1 cursor-pointer"
                                                title="刪除天數"
                                            >
                                                <i className="fas fa-times text-[10px]"></i>
                                            </div>
                                        )}
                                    </button>
                                    
                                    {/* 互換天數的小按鈕列 (Hover 出現) */}
                                    {activePlan.days.length > 1 && (
                                        <div className="absolute -top-7 left-1/2 -translate-x-1/2 bg-white border border-slate-300 shadow-lg rounded flex items-center p-0.5 opacity-0 group-hover/daywrapper:opacity-100 transition-opacity pointer-events-none group-hover/daywrapper:pointer-events-auto z-20">
                                            <div className="text-[10px] text-slate-500 font-bold px-1 whitespace-nowrap bg-slate-100 rounded-sm mr-1">整天互換此日與:</div>
                                            {activePlan.days.filter(d => d.id !== day.id).map(targetDay => (
                                                <button
                                                    key={targetDay.id}
                                                    onClick={(e) => { e.stopPropagation(); swapDays(day.id, targetDay.id); }}
                                                    className="text-[10px] font-bold px-1.5 py-0.5 mx-0.5 rounded bg-blue-50 text-blue-600 hover:bg-blue-500 hover:text-white transition-colors"
                                                    title={`與 ${targetDay.title} 互換`}
                                                >
                                                    {targetDay.title.replace('Day ', '')}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                            <button onClick={addDay} className="px-3 py-1.5 text-blue-500 hover:text-blue-700 text-sm flex items-center gap-1 font-medium whitespace-nowrap ml-2">
                                <i className="fas fa-plus-circle"></i> 新增一天
                            </button>
                        </div>
                    )}

                        {/* --- 主要內容區：時間軸與節點（只渲染當前選中天數） --- */}
                        <main className="max-w-4xl mx-auto mt-6 px-4 pl-16 md:pl-24 relative">
                            {/* 貫穿全域的時間軸線 */}
                            <div className="timeline-line"></div>
    
                            {activeDay && (
                                <div className="mb-12 relative">
                                {/* 天數主標題 + 副標題 */}
                                <div className="flex flex-col sm:flex-row items-start sm:items-baseline gap-2 sm:gap-3 mb-4">
                                    <div className="w-full sm:flex-1 min-w-[200px] flex items-center gap-2">
                                        <div className="font-bold text-2xl text-slate-800 break-words">{activePlan.title}</div>
                                    </div>
                                </div>
                                
                                {/* --- 全域預算統計看板 (Mobile/Tablet 顯示原本有，現在移除避免重複，因為上方 Header 已合併) --- */}
                                
                                <div className="flex items-baseline gap-3 mb-4">
                                    <input 
                                        className="text-2xl font-bold bg-transparent border-b border-transparent hover:border-slate-300 focus:border-blue-500 focus:outline-none"
                                        value={activeDay.title}
                                        onChange={(e) => {
                                            updatePlans(p => ({
                                                ...p, days: p.days.map(d => d.id === activeDay.id ? { ...d, title: e.target.value } : d)
                                            }));
                                        }}
                                        placeholder="Day X"
                                    />
                                    <input 
                                        className="text-lg text-slate-500 bg-transparent border-b border-transparent hover:border-slate-300 focus:border-blue-500 focus:outline-none flex-1"
                                        value={activeDay.subtitle || ''}
                                        onChange={(e) => {
                                            updatePlans(p => ({
                                                ...p, days: p.days.map(d => d.id === activeDay.id ? { ...d, subtitle: e.target.value } : d)
                                            }));
                                        }}
                                        placeholder="副標題（例：機場 - 飯店）"
                                    />
                                </div>
                                {/* C3: 天氣速查卡片 */}
                                <div className="flex items-center gap-2 mb-3 bg-gradient-to-r from-blue-50 to-sky-50 border border-blue-100 rounded-lg px-3 py-2">
                                    <select
                                        className="text-lg bg-transparent border-none outline-none cursor-pointer"
                                        value={activeDay.weather?.condition || ''}
                                        onChange={(e) => updatePlans(p => ({ ...p, days: p.days.map(d => d.id === activeDay.id ? { ...d, weather: { ...d.weather, condition: e.target.value } } : d) }))}
                                    >
                                        <option value="">☁️</option>
                                        {WEATHER_CONDITIONS.map(w => <option key={w.value} value={w.value}>{w.icon} {w.label}</option>)}
                                    </select>
                                    <div className="flex items-center gap-1">
                                        <i className="fas fa-temperature-high text-red-400 text-xs"></i>
                                        <input
                                            className="w-12 text-sm text-center bg-white/70 border border-blue-200 rounded px-1 py-0.5 focus:outline-none focus:border-blue-400"
                                            value={activeDay.weather?.tempHigh || ''}
                                            onChange={(e) => updatePlans(p => ({ ...p, days: p.days.map(d => d.id === activeDay.id ? { ...d, weather: { ...d.weather, tempHigh: e.target.value } } : d) }))}
                                            placeholder="高°C"
                                        />
                                    </div>
                                    <span className="text-slate-300 text-xs">/</span>
                                    <div className="flex items-center gap-1">
                                        <i className="fas fa-temperature-low text-blue-400 text-xs"></i>
                                        <input
                                            className="w-12 text-sm text-center bg-white/70 border border-blue-200 rounded px-1 py-0.5 focus:outline-none focus:border-blue-400"
                                            value={activeDay.weather?.tempLow || ''}
                                            onChange={(e) => updatePlans(p => ({ ...p, days: p.days.map(d => d.id === activeDay.id ? { ...d, weather: { ...d.weather, tempLow: e.target.value } } : d) }))}
                                            placeholder="低°C"
                                        />
                                    </div>
                                    {activeDay.weather?.condition && (
                                        <span className="ml-auto text-xs text-sky-600 font-medium">
                                            {WEATHER_CONDITIONS.find(w => w.value === activeDay.weather.condition)?.label || ''}
                                        </span>
                                    )}
                                </div>
                                {/* A1: 收合/展開工具列 & C3 導航按鈕 */}
                                <div className="flex items-center gap-2 mb-3 flex-wrap">
                                    <button onClick={collapseAll} className="text-xs text-slate-500 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 px-2.5 py-1 rounded-full font-medium flex items-center gap-1 transition-colors border border-slate-200">
                                        <i className="fas fa-compress-alt text-[10px]"></i> 全部收合
                                    </button>
                                    <button onClick={expandAll} className="text-xs text-slate-500 hover:text-slate-700 bg-slate-100 hover:bg-slate-200 px-2.5 py-1 rounded-full font-medium flex items-center gap-1 transition-colors border border-slate-200">
                                        <i className="fas fa-expand-alt text-[10px]"></i> 全部展開
                                    </button>
                                    <button onClick={() => openGoogleMapsRoute(activeDay)} className="text-xs text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 px-2.5 py-1 rounded-full font-medium flex items-center gap-1 transition-colors border border-blue-200 ml-auto sm:ml-2 shadow-sm">
                                        🗺️ 開啟本日導航 <i className="fas fa-external-link-alt text-[10px] ml-0.5"></i>
                                    </button>
                                    <span className="text-[10px] text-slate-400 ml-auto sm:ml-0 hidden sm:inline">│ {activeDay.nodes.length} 個節點</span>
                                </div>
                                <div className="space-y-4">
                                    {activeDay.nodes.map((node, nodeIndex) => {
                                        const nodeStyle = NODE_STYLES[node.type] || DEFAULT_NODE_STYLE;
                                        return (
                                        <div 
                                            key={node.id} 
                                            className={`relative group ${dragNodeId === node.id ? 'node-dragging' : ''} ${dragOverNodeId === node.id && dragOverPosition === 'top' ? 'node-drag-over' : ''} ${dragOverNodeId === node.id && dragOverPosition === 'bottom' ? 'node-drag-over-bottom' : ''}`}
                                            draggable="true"
                                            onDragStart={(e) => handleDragStart(e, node.id)}
                                            onDragOver={(e) => handleDragOver(e, node.id)}
                                            onDragLeave={() => { if (dragOverNodeId === node.id) { setDragOverNodeId(null); setDragOverPosition(null); } }}
                                            onDrop={(e) => handleDrop(e, node.id)}
                                            onDragEnd={handleDragEnd}
                                        >
                                            {/* 時間軸上的點與時間輸入 */}
                                            <div className="absolute -left-[2.5rem] md:-left-[4.5rem] top-3 flex flex-col items-center z-0 w-16 group/time">
                                                <div 
                                                    className="relative w-full mb-1 cursor-pointer"
                                                    onClick={(e) => {
                                                        const input = e.currentTarget.querySelector('input[type="time"]');
                                                        if (input && input.showPicker) {
                                                            input.showPicker();
                                                        } else if (input) {
                                                            input.focus();
                                                        }
                                                    }}
                                                >
                                                    {/* 隱藏的原生下拉選單觸發器 */}
                                                    <input 
                                                        type="time" 
                                                        className="absolute inset-0 w-full h-full opacity-0 pointer-events-none z-10"
                                                        value={node.time || ''}
                                                        onChange={(e) => updateNodeTime(activeDay.id, node.id, e.target.value)}
                                                    />
