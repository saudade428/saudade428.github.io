                                </div>

                                {/* --- B3: 單日花費統計列 --- */}
                                {(() => {
                                    const allNodes = activeDay.nodes.reduce((acc, n) => acc.concat([n], n.children || []), []);
                                    const totalNodes = allNodes.length;
                                    if (totalNodes === 0) return null;

                                    const typeCounts = allNodes.reduce((acc, n) => { acc[n.type] = (acc[n.type] || 0) + 1; return acc; }, {});
                                    const totalSubtasks = allNodes.reduce((sum, n) => sum + (n.subtasks?.length || 0), 0);
                                    const dayMemos = currentMemos.filter(m => m.dayId === activeDay.id).length;
                                    
                                    const currencyTotals = allNodes.reduce((acc, n) => {
                                        if (n.cost && n.currency) acc[n.currency] = (acc[n.currency] || 0) + parseFloat(n.cost);
                                        return acc;
                                    }, {});

                                    return (
                                        <div className="mt-8 bg-slate-50 border border-slate-200 rounded-xl p-4 shadow-sm flex flex-col md:flex-row gap-4 items-center justify-between text-sm">
                                            <div className="flex flex-wrap items-center gap-4 text-slate-600">
                                                <div className="flex items-center gap-1.5 font-medium">
                                                    <i className="fas fa-layer-group text-blue-500"></i> {totalNodes} 節點
                                                </div>
                                                <div className="h-4 w-px bg-slate-300 hidden sm:block"></div>
                                                <div className="flex gap-2.5">
                                                    {Object.entries(typeCounts).map(([type, count]) => {
                                                        const style = NODE_STYLES[type] || DEFAULT_NODE_STYLE;
                                                        return (
                                                            <div key={type} className="flex items-center gap-1" title={style.label}>
                                                                <i className={`${style.icon} text-[10px]`} style={{color: style.border}}></i>
                                                                <span className="font-mono">{count}</span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                                <div className="h-4 w-px bg-slate-300 hidden sm:block"></div>
                                                <div className="flex items-center gap-3 text-xs">
                                                    {totalSubtasks > 0 && <span title="子任務"><i className="fas fa-tasks text-slate-400"></i> {totalSubtasks}</span>}
                                                    {dayMemos > 0 && <span title="備忘錄"><i className="fas fa-thumbtack text-amber-500"></i> {dayMemos}</span>}
                                                </div>
                                            </div>
                                            
                                            {Object.keys(currencyTotals).length > 0 && (
                                                <div className="flex flex-wrap justify-end gap-2 shrink-0">
                                                    {Object.entries(currencyTotals).map(([cur, amount]) => (
                                                        <div key={cur} className="bg-white border rounded px-2.5 py-1 text-slate-700 font-bold flex items-center gap-1.5 shadow-sm">
                                                            <span className="text-xs text-slate-400">{cur}</span>
                                                            <span className="text-blue-600 tracking-tight">{amount.toLocaleString()}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })()}

                                {/* C4: 旅行日誌 */}
                                <div className="mt-6 border border-dashed border-amber-300 rounded-lg bg-amber-50/50 overflow-hidden">
                                    <div className="flex items-center gap-2 px-4 py-2 bg-amber-100/60 border-b border-dashed border-amber-200">
                                        <i className="fas fa-book-open text-amber-600 text-sm"></i>
                                        <span className="text-sm font-semibold text-amber-800">旅行日誌</span>
                                        <span className="text-[10px] text-amber-500">記錄今天的故事與感想...</span>
                                    </div>
                                    <textarea
                                        className="w-full px-4 py-3 bg-transparent text-sm text-slate-700 placeholder-amber-300/80 resize-y focus:outline-none min-h-[80px]"
                                        value={activeDay.journal || ''}
                                        onChange={(e) => updatePlans(p => ({ ...p, days: p.days.map(d => d.id === activeDay.id ? { ...d, journal: e.target.value } : d) }))}
                                        placeholder="今天到了...看到了...吃了...感受悟到..."
                                    />
                                </div>

                            </div>
                        )}

                        {/* 無選中天數的提示 */}
                        {!activeDay && activePlan && activeDayId !== 'checklist' && activeDayId !== 'split' && activeDayId !== 'budget' && activeDayId !== 'gantt' && (
                            <div className="text-center py-20 text-slate-400">
                                <i className="far fa-calendar-plus text-4xl mb-4 block"></i>
                                <p className="text-lg font-medium mb-2">尚無行程天數</p>
                                <p className="text-sm mb-4">點擊上方「新增一天」開始規劃</p>
                                <button onClick={addDay} className="bg-slate-800 text-white px-6 py-2 rounded-full shadow-lg hover:bg-slate-700 font-semibold inline-flex items-center gap-2">
                                    <i className="far fa-calendar-plus"></i> 新增第一天
                                </button>
                            </div>
                        )}
                    </main>
                    {/* --- 結束：時間軸主內容區 --- */}

                    {/* --- 獨立呈現區：行前清單 (Checklist) --- */}
                    {activePlan && activeDayId === 'checklist' && (
                        <div className="max-w-4xl mx-auto mt-6 px-4 md:px-8 mb-12">
                            <div className="bg-white rounded-xl shadow-sm border border-amber-200/50 overflow-hidden">
                                {/* Header */}
                                <div className="bg-gradient-to-r from-amber-100 to-amber-50 px-6 py-5 border-b border-amber-200/50">
                                    <div className="flex items-center justify-between flex-wrap gap-4">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-amber-200 flex items-center justify-center text-amber-700 text-lg shadow-inner">
                                                <i className="fas fa-tasks"></i>
                                            </div>
                                            <div>
                                                <h2 className="text-xl font-bold text-amber-900 leading-tight">出發前準備清單</h2>
                                                <p className="text-sm text-amber-700/80 font-medium mt-0.5">出門前再確認一次，別讓小東西毀了旅行！</p>
                                            </div>
                                        </div>
                                        
                                        {/* Progress Bar */}
                                        <div className="min-w-[200px] flex-1 max-w-sm">
                                            <div className="flex justify-between text-xs font-bold text-amber-800 mb-1.5">
                                                <span>準備進度</span>
                                                <span>{getChecklistProgress()}%</span>
                                            </div>
                                            <div className="h-2.5 bg-amber-200/50 rounded-full overflow-hidden border border-amber-200 shadow-inner">
                                                <div 
                                                    className="h-full bg-amber-500 rounded-full transition-all duration-500 ease-out" 
                                                    style={{ width: `${getChecklistProgress()}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Body */}
                                <div className="p-6 md:p-8 space-y-8">
                                    {currentChecklists.length === 0 ? (
                                        <div className="text-center py-12 text-slate-400">
                                            <i className="fas fa-clipboard-list text-4xl mb-3 opacity-50 block"></i>
                                            <p className="text-sm">目前沒有任何清單項目。</p>
                                        </div>
                                    ) : (
                                        <div className="columns-1 md:columns-2 gap-8 space-y-8">
                                            {currentChecklists.map((category) => (
                                                <div key={category.id} className="break-inside-avoid bg-slate-50 rounded-lg p-5 border border-slate-200 shadow-sm relative group/cat">
                                                    <div className="flex items-center justify-between mb-4 pb-2 border-b border-slate-200">
                                                        <div className="flex items-center gap-2 w-full">
                                                            <i className="fas fa-folder-open text-amber-600/70"></i>
                                                            <input 
                                                                className="font-bold text-slate-800 bg-transparent border-b border-transparent hover:border-slate-300 focus:border-amber-400 focus:outline-none w-full"
                                                                value={category.category}
                                                                onChange={(e) => updateChecklistCategory(category.id, e.target.value)}
                                                                placeholder="輸入分類名稱..."
                                                            />
                                                        </div>
                                                        <button 
                                                            onClick={() => deleteChecklistCategory(category.id)} 
                                                            className="text-slate-300 hover:text-red-500 opacity-0 group-hover/cat:opacity-100 transition-opacity ml-2 shrink-0"
                                                            title="刪除整個分類"
                                                        >
                                                            <i className="fas fa-trash-alt text-sm"></i>
                                                        </button>
                                                    </div>

                                                    <div className="space-y-2.5">
                                                        {category.items.map((item) => (
                                                            <div key={item.id} className="flex items-start gap-3 group/item">
                                                                {item.isNote ? (
                                                                    <div className="mt-1 flex items-center justify-center w-4 h-4 shrink-0 text-amber-500">
                                                                        <i className="fas fa-thumbtack text-[10px] transform -rotate-45"></i>
                                                                    </div>
                                                                ) : (
                                                                    <input 
                                                                        type="checkbox" 
                                                                        className="mt-1 w-4 h-4 shrink-0 rounded border-slate-300 text-amber-600 focus:ring-amber-500 cursor-pointer"
                                                                        checked={item.isChecked}
                                                                        onChange={(e) => updateChecklistItem(category.id, item.id, { isChecked: e.target.checked })}
                                                                    />
                                                                )}
                                                                <AutoResizeTextarea
                                                                    className={`flex-1 bg-transparent border-none focus:outline-none focus:bg-white px-1 py-0.5 rounded text-sm transition-colors ${item.isNote ? 'text-slate-800 font-semibold bg-amber-50/50' : item.isChecked ? 'text-slate-400 line-through' : 'text-slate-700'}`}
                                                                    value={item.text}
                                                                    onChange={(e) => updateChecklistItem(category.id, item.id, { text: e.target.value })}
                                                                    placeholder={item.isNote ? "純文字備註/提醒..." : "輸入準備事項..."}
                                                                />
                                                                <div className="flex items-center opacity-0 group-hover/item:opacity-100 transition-opacity pt-0.5 shrink-0 pl-2">
                                                                    <button 
                                                                        onClick={() => updateChecklistItem(category.id, item.id, { isNote: !item.isNote })} 
                                                                        className={`mr-3 text-xs ${item.isNote ? 'text-amber-600 hover:text-amber-800' : 'text-slate-400 hover:text-amber-600'}`}
                                                                        title={item.isNote ? "切換為待辦狀態" : "切換為純文字備註"}
                                                                    >
                                                                        <i className={`fas ${item.isNote ? 'fa-check-square' : 'fa-sticky-note'}`}></i>
                                                                    </button>
                                                                    <button 
                                                                        onClick={() => deleteChecklistItem(category.id, item.id)} 
                                                                        className="text-slate-300 hover:text-red-500"
                                                                        title="刪除"
                                                                    >
                                                                        <i className="fas fa-times"></i>
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        ))}
                                                        
                                                        <button 
                                                            onClick={() => addChecklistItem(category.id)} 
                                                            className="text-xs text-amber-600 hover:text-amber-800 font-medium flex items-center gap-1.5 mt-3 pt-2 opacity-70 hover:opacity-100 transition-opacity"
                                                        >
                                                            <i className="fas fa-plus"></i> 新增勾記項目
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* 新增分類按鈕 */}
                                    <div className="pt-4 mt-8 border-t border-slate-100 flex justify-center">
                                        <button 
                                            onClick={addChecklistCategory} 
                                            className="border-2 border-dashed border-amber-200 text-amber-700 hover:bg-amber-50 hover:border-amber-400 py-3 px-8 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors w-full md:w-auto justify-center"
                                        >
                                            <i className="fas fa-layer-group"></i> 新增檢查分類
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- C1: 分帳結算視圖 --- */}
                    {activePlan && activeDayId === 'split' && (() => {
                        const companions = activePlan.companions || [];
                        const allNodes = activePlan.days.flatMap(d => d.nodes.filter(n => n.cost && parseFloat(n.cost) > 0));
                        // 計算每人付款與分攝
                        const summary = companions.map(comp => {
                            const paid = allNodes.filter(n => n.paidBy === comp.id).reduce((s, n) => s + parseFloat(n.cost || 0), 0);
                            const shouldPay = allNodes.reduce((s, n) => {
                                const splitList = (n.splitAmong || []).length > 0 ? n.splitAmong : companions.map(c => c.id);
                                return s + (splitList.includes(comp.id) ? parseFloat(n.cost || 0) / splitList.length : 0);
                            }, 0);
                            return { ...comp, paid, shouldPay, diff: paid - shouldPay };
                        });
                        return (
                        <div className="max-w-3xl mx-auto mt-6 px-4">
                            <div className="bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden">
                                {/* Header */}
                                <div className="bg-gradient-to-r from-emerald-500 to-teal-500 text-white px-6 py-4">
                                    <h2 className="text-xl font-bold flex items-center gap-2">
                                        <i className="fas fa-calculator"></i> 旅伴分帳
                                    </h2>
                                    <p className="text-emerald-100 text-sm mt-1">自動計算每人應付/應收金額</p>
                                </div>
                                <div className="p-6">
                                    {/* 旅伴管理 */}
                                    <div className="mb-6">
                                        <h3 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-1.5"><i className="fas fa-users text-emerald-500"></i> 旅伴名單</h3>
                                        <div className="flex flex-wrap gap-2 mb-3">
                                            {companions.map(comp => (
                                                <div key={comp.id} className="flex items-center gap-1.5 bg-slate-50 border rounded-full px-3 py-1 group/comp">
                                                    <div className="w-3 h-3 rounded-full" style={{ backgroundColor: comp.color }}></div>
                                                    <input
                                                        className="text-sm bg-transparent border-none focus:outline-none w-20"
                                                        value={comp.name}
                                                        onChange={(e) => renameCompanion(comp.id, e.target.value)}
                                                    />
                                                    <button onClick={() => deleteCompanion(comp.id)} className="text-slate-300 hover:text-red-500 opacity-0 group-hover/comp:opacity-100 transition-opacity text-xs">
                                                        <i className="fas fa-times"></i>
                                                    </button>
                                                </div>
                                            ))}
                                            <button
                                                onClick={() => { const n = prompt('輸入旅伴名稱'); if (n) addCompanion(n); }}
                                                className="flex items-center gap-1 text-emerald-600 hover:text-emerald-700 text-sm font-medium border border-dashed border-emerald-300 rounded-full px-3 py-1 hover:bg-emerald-50 transition-colors"
                                            >
                                                <i className="fas fa-plus-circle"></i> 新增旅伴
                                            </button>
                                        </div>
                                    </div>

                                    {companions.length === 0 ? (
                                        <div className="text-center py-12 text-slate-400">
                                            <i className="fas fa-user-friends text-4xl mb-3 block"></i>
                                            <p className="font-medium">尚未新增旅伴</p>
                                            <p className="text-sm mt-1">請先新增旅伴，再到各節點指定付款人</p>
                                        </div>
                                    ) : (
                                    <>
                                    {/* 結算總覽 */}
                                    <div className="mb-6">
                                        <h3 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-1.5"><i className="fas fa-chart-pie text-emerald-500"></i> 結算總覽</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                            {summary.map(s => (
                                                <div key={s.id} className="bg-slate-50 rounded-lg p-3 border">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <div className="w-4 h-4 rounded-full" style={{ backgroundColor: s.color }}></div>
                                                        <span className="font-semibold text-sm">{s.name}</span>
                                                    </div>
                                                    <div className="space-y-1 text-xs">
                                                        <div className="flex justify-between"><span className="text-slate-500">已付款</span><span className="font-bold text-blue-600">{s.paid.toLocaleString()}</span></div>
                                                        <div className="flex justify-between"><span className="text-slate-500">應分攝</span><span className="font-bold">{s.shouldPay.toLocaleString(undefined, { maximumFractionDigits: 0 })}</span></div>
                                                        <div className="border-t pt-1 mt-1 flex justify-between">
                                                            <span className="text-slate-500">{s.diff >= 0 ? '應收' : '應付'}</span>
                                                            <span className={`font-bold ${s.diff >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>{Math.abs(s.diff).toLocaleString(undefined, { maximumFractionDigits: 0 })}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 明細表 */}
                                    <div>
                                        <h3 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-1.5"><i className="fas fa-list-alt text-emerald-500"></i> 花費明細</h3>
                                        {allNodes.length === 0 ? (
                                            <p className="text-center text-slate-400 text-sm py-6">尚無已設定花費的節點</p>
                                        ) : (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm">
                                                <thead><tr className="border-b text-left text-slate-500">
                                                    <th className="pb-2 font-medium">項目</th>
                                                    <th className="pb-2 font-medium">金額</th>
                                                    <th className="pb-2 font-medium">付款人</th>
                                                    <th className="pb-2 font-medium">分攝</th>
                                                </tr></thead>
                                                <tbody>
                                                    {activePlan.days.flatMap(d => d.nodes.filter(n => n.cost && parseFloat(n.cost) > 0).map(n => (
                                                        <tr key={n.id} className="border-b border-slate-50 hover:bg-slate-50">
                                                            <td className="py-2 font-medium">{n.title || '未命名'}</td>
                                                            <td className="py-2 text-blue-600 font-mono">{parseFloat(n.cost).toLocaleString()} {n.currency || ''}</td>
                                                            <td className="py-2">
                                                                <select className="text-xs border rounded px-1.5 py-0.5 bg-white" value={n.paidBy || ''} onChange={(e) => updateNodePaidBy(d.id, n.id, e.target.value)}>
                                                                    <option value="">未指定</option>
                                                                    {companions.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                                                </select>
                                                            </td>
                                                            <td className="py-2">
                                                                <div className="flex gap-1 flex-wrap">
                                                                    {companions.map(c => {
                                                                        const isIn = (n.splitAmong || []).length === 0 || (n.splitAmong || []).includes(c.id);
                                                                        return (
                                                                            <button key={c.id} onClick={() => toggleNodeSplitAmong(d.id, n.id, c.id)}
                                                                                className={`text-[10px] px-1.5 py-0.5 rounded-full border font-medium transition-colors ${isIn ? 'text-white' : 'text-slate-400 border-slate-200 hover:border-slate-300'}`}
                                                                                style={isIn ? { backgroundColor: c.color, borderColor: c.color } : {}}
                                                                            >{c.name}</button>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    )))
                                                    }
                                                </tbody>
                                            </table>
                                        </div>
                                        )}
                                    </div>
                                    </>
                                    )}
                                </div>
                            </div>
                        </div>
                        );
                    })()}

                    {/* --- B1: 預算儀表板 --- */}
                    {activePlan && activeDayId === 'budget' && (() => {
                        const allNodes = activePlan.days.flatMap(d => d.nodes);
                        const costNodes = allNodes.filter(n => n.cost && parseFloat(n.cost) > 0);
                        if (costNodes.length === 0) {
                            return (
                                <div className="text-center py-20 text-slate-400">
                                    <i className="fas fa-wallet text-4xl mb-4 block text-slate-300"></i>
                                    <p className="text-lg font-medium">尚無任何花費紀錄</p>
                                    <p className="text-sm mt-2">請在節點中填寫預估花費，這裡將自動產生分析圖表</p>
                                </div>
                            );
                        }

                        // 依據類型統計花費
                        const pieData = costNodes.reduce((acc, n) => {
                            // 這裡簡化處理：全部轉換為數字相加（實務上需考慮多幣別匯率，這裡暫時忽略多幣別混雜）
                            const amount = parseFloat(n.cost) || 0;
                            acc[n.type] = (acc[n.type] || 0) + amount;
                            return acc;
                        }, {});
                        const totalCost = Object.values(pieData).reduce((a, b) => a + b, 0);

                        // 依據天數統計花費
                        const dailyCosts = activePlan.days.map(d => {
                            const cost = d.nodes.reduce((sum, n) => sum + (parseFloat(n.cost) || 0), 0);
                            return { id: d.id, title: d.title, cost };
                        });
                        const maxDailyCost = Math.max(...dailyCosts.map(d => d.cost), 1);

                        // Canvas 繪製圓餅圖 Component
                        const PieChart = ({ data, total }) => {
                            const canvasRef = useRef(null);
                            useEffect(() => {
                                const canvas = canvasRef.current;
                                if (!canvas) return;
                                const ctx = canvas.getContext('2d');
                                const w = canvas.width;
                                const h = canvas.height;
                                const cx = w / 2;
                                const cy = h / 2;
                                const r = Math.min(w, h) / 2 - 10;
                                
                                ctx.clearRect(0, 0, w, h);
                                let startAngle = -Math.PI / 2;
                                
                                Object.entries(data).forEach(([type, value]) => {
                                    if (value <= 0) return;
                                    const sliceAngle = (value / total) * 2 * Math.PI;
                                    const style = NODE_STYLES[type] || DEFAULT_NODE_STYLE;
                                    
                                    ctx.beginPath();
                                    ctx.moveTo(cx, cy);
                                    ctx.arc(cx, cy, r, startAngle, startAngle + sliceAngle);
                                    ctx.closePath();
                                    ctx.fillStyle = style.bg; // 使用較淡的背景色
                                    ctx.fill();
                                    ctx.lineWidth = 1.5;
                                    ctx.strokeStyle = style.border; // 使用較深的邊框色
                                    ctx.stroke();

                                    startAngle += sliceAngle;
                                });
                                
                                // 畫內圓 (Donut chart 效果)
                                ctx.beginPath();
                                ctx.arc(cx, cy, r * 0.5, 0, 2 * Math.PI);
                                ctx.fillStyle = 'white';
                                ctx.fill();
                            }, [data, total]);
                            
                            return <canvas ref={canvasRef} width="200" height="200" className="mx-auto block" />;
                        };

                        return (
                        <div className="max-w-4xl mx-auto mt-6 px-4 mb-20">
                            <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                <i className="fas fa-chart-pie text-indigo-500"></i> 行程預算分析
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {/* 左側：花費類別圓餅圖 */}
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                                    <h3 className="text-sm font-bold text-slate-600 mb-4 text-center">花費類別佔比</h3>
                                    <PieChart data={pieData} total={totalCost} />
                                    <div className="mt-6 flex flex-wrap justify-center gap-3">
                                        {Object.entries(pieData).sort((a,b)=>b[1]-a[1]).map(([type, val]) => {
                                            const style = NODE_STYLES[type] || DEFAULT_NODE_STYLE;
                                            const pct = Math.round((val / totalCost) * 100);
                                            return (
                                                <div key={type} className="flex items-center gap-1.5 text-xs bg-slate-50 border rounded px-2 py-1">
                                                    <i className={style.icon} style={{color: style.border}}></i>
                                                    <span className="font-medium">{style.label}</span>
                                                    <span className="font-bold text-slate-700">{pct}%</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                                
                                {/* 右側：每日花費橫條圖 */}
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                                    <h3 className="text-sm font-bold text-slate-600 mb-4">每日花費落點</h3>
                                    <div className="space-y-4">
                                        {dailyCosts.map(d => {
                                            const pct = (d.cost / maxDailyCost) * 100;
                                            return (
                                                <div key={d.id} className="relative">
                                                    <div className="flex justify-between text-xs font-medium text-slate-500 mb-1">
                                                        <span>{d.title}</span>
                                                        <span className="text-indigo-600 font-mono font-bold">{d.cost.toLocaleString()}</span>
                                                    </div>
                                                    <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                                        <div 
                                                            className="h-full bg-gradient-to-r from-indigo-300 to-indigo-500 rounded-full transition-all duration-500"
                                                            style={{ width: `${pct}%` }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>
                        );
                    })()}

                    {/* --- B2: 甘特圖時間軸視圖 --- */}
                    {activePlan && activeDayId === 'gantt' && (() => {
                        const START_HOUR = 6;
                        const END_HOUR = 24;
                        const TOTAL_HOURS = END_HOUR - START_HOUR;
                        
                        // 生成時間刻度
                        const timeLabels = [];
                        for (let i = START_HOUR; i <= END_HOUR; i++) {
                            timeLabels.push(`${i.toString().padStart(2, '0')}:00`);
                        }

                        // 將時間字串 "HH:MM" 轉為 0-1 的比例
                        const timeToRatio = (timeStr) => {
                            if (!timeStr) return null;
                            const [h, m] = timeStr.split(':').map(Number);
                            if (isNaN(h) || isNaN(m)) return null;
                            let hour = h;
                            // 處理跨夜 (00:00 ~ 05:59 視為 24:00 之後)
                            if (hour < START_HOUR) hour += 24;
                            if (hour > END_HOUR && hour < 24 + START_HOUR) return 1; // 超出範圍當作最後
                            const totalMins = (hour - START_HOUR) * 60 + m;
                            return Math.max(0, Math.min(1, totalMins / (TOTAL_HOURS * 60)));
                        };

                        return (
                        <div className="max-w-6xl mx-auto mt-6 px-4 mb-20 overflow-x-auto">
                            <div className="bg-white rounded-2xl shadow-lg border border-slate-100 p-6 min-w-[800px]">
                                <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                    <i className="fas fa-stream text-orange-500"></i> 行程甘特圖
                                </h2>

                                <div className="space-y-6">
                                    {activePlan.days.map(day => {
                                        // 分析節點時間
                                        const timedNodes = [];
                                        const untimedNodes = [];
                                        day.nodes.forEach(n => {
                                            const ratio = timeToRatio(n.time);
                                            if (ratio !== null) timedNodes.push({ ...n, ratio });
                                            else untimedNodes.push(n);
                                        });

                                        return (
                                            <div key={day.id} className="border border-slate-200 rounded-xl overflow-hidden">
                                                <div className="bg-slate-50 px-4 py-2 border-b border-slate-200 font-bold text-sm text-slate-700">
                                                    {day.title} {day.subtitle && <span className="font-normal text-slate-500">{day.subtitle}</span>}
                                                </div>
                                                <div className="p-4 relative">
                                                    {/* 時間刻度背景 */}
                                                    <div className="flex justify-between text-[10px] text-slate-400 mb-2 px-2 relative z-0">
                                                        {timeLabels.map((lbl, i) => (
                                                            <div key={i} className="flex flex-col items-center" style={{ width: i===0||i===timeLabels.length-1?'auto':'0' }}>
                                                                <span>{lbl}</span>
                                                                <div className="h-24 w-px bg-slate-100 mt-1 absolute top-4"></div>
                                                            </div>
                                                        ))}
                                                    </div>

                                                    {/* 有時間的節點 (放置在時間軸上) */}
                                                    <div className="relative h-16 mt-2 mb-4 bg-slate-50/50 rounded border border-slate-100 mx-2">
                                                        {timedNodes.map(n => {
                                                            const style = NODE_STYLES[n.type] || DEFAULT_NODE_STYLE;
                                                            return (
                                                                <div 
                                                                    key={n.id} 
                                                                    className="absolute top-2 h-12 rounded shadow-sm border px-2 py-1 overflow-hidden transition-transform hover:scale-105 hover:z-10 bg-white group/gnode cursor-default"
                                                                    style={{ 
                                                                        left: `calc(${n.ratio * 100}% - 14px)`,
                                                                        borderLeftWidth: '4px',
                                                                        borderLeftColor: style.border,
                                                                        minWidth: '28px',
                                                                        maxWidth: '120px'
                                                                    }}
                                                                    title={`${n.time} ${n.title || '未命名'}`}
                                                                >
                                                                    <div className="flex items-center gap-1 opacity-80 group-hover/gnode:opacity-100">
                                                                        <i className={`${style.icon} text-[10px]`} style={{color: style.border}}></i>
                                                                        <span className="text-[10px] font-bold text-blue-600 truncate">{n.time}</span>
                                                                    </div>
                                                                    <div className="text-xs font-semibold text-slate-700 truncate">{n.title || '未命名'}</div>
                                                                </div>
                                                            );
                                                        })}
                                                        {timedNodes.length === 0 && <div className="absolute inset-0 flex items-center justify-center text-xs text-slate-400">無安排時間的行程</div>}
                                                    </div>

                                                    {/* 無時間的節點 */}
                                                    {untimedNodes.length > 0 && (
                                                        <div className="mt-4 pt-4 border-t border-dashed border-slate-200 mx-2">
                                                            <div className="text-xs text-slate-500 mb-2 font-medium">未指定時間</div>
                                                            <div className="flex flex-wrap gap-2">
                                                                {untimedNodes.map(n => {
                                                                    const style = NODE_STYLES[n.type] || DEFAULT_NODE_STYLE;
                                                                    return (
                                                                        <div key={n.id} className="text-xs bg-white border border-slate-200 rounded py-1 px-2 flex items-center gap-1 shadow-sm" style={{ borderLeft: `3px solid ${style.border}` }}>
                                                                            <span className="truncate max-w-[150px]">{n.title || '未命名'}</span>
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                        );
                    })()}

                    {/* --- PDF 設定 Modal --- */}
                    {showPdfSettings && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" onClick={() => setShowPdfSettings(false)}>
                            <div className="bg-white rounded-xl shadow-2xl w-96 max-w-[90vw] p-6" onClick={(e) => e.stopPropagation()}>
                                <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <i className="fas fa-file-pdf text-red-500"></i> PDF 匯出設定
                                </h2>

                                <div className="space-y-4">
                                    <div>
                                        <label className="text-sm font-semibold text-slate-600 block mb-1">紙張方向</label>
                                        <div className="flex gap-2">
                                            <button
                                                onClick={() => setPdfSettings(s => ({...s, orientation: 'portrait'}))}
                                                className={`flex-1 py-2 px-3 rounded-lg border text-sm font-medium transition-colors ${pdfSettings.orientation === 'portrait' ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}
                                            >
                                                <i className="fas fa-mobile-alt mr-1"></i> 直式
                                            </button>
                                            <button
                                                onClick={() => setPdfSettings(s => ({...s, orientation: 'landscape'}))}
                                                className={`flex-1 py-2 px-3 rounded-lg border text-sm font-medium transition-colors ${pdfSettings.orientation === 'landscape' ? 'bg-blue-50 border-blue-400 text-blue-700' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}
                                            >
                                                <i className="fas fa-mobile-alt fa-rotate-90 mr-1"></i> 橫式
                                            </button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-sm font-semibold text-slate-600 block mb-1">紙張尺寸</label>
                                        <select
                                            className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
                                            value={pdfSettings.format}
                                            onChange={(e) => setPdfSettings(s => ({...s, format: e.target.value}))}
                                        >
                                            {Object.entries(PDF_FORMATS).map(([key, val]) => (
                                                <option key={key} value={key}>{val.name}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="text-sm font-semibold text-slate-600 block mb-1">邊界 (mm)</label>
                                        <input
                                            type="number"
                                            min="0"
                                            max="50"
                                            className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
                                            value={pdfSettings.margin}
                                            onChange={(e) => setPdfSettings(s => ({...s, margin: Number(e.target.value)}))}
                                        />
                                    </div>
                                </div>

                                <div className="flex gap-3 mt-6">
                                    <button
                                        onClick={() => setShowPdfSettings(false)}
                                        className="flex-1 py-2 px-4 border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors"
                                    >
                                        取消
                                    </button>
                                    <button
                                        onClick={() => exportHTML(pdfSettings)}
                                        className="flex-1 py-2 px-4 bg-orange-500 hover:bg-orange-400 text-white rounded-lg text-sm font-bold shadow transition-colors flex items-center justify-center gap-2"
                                    >
                                        <i className="fas fa-file-code"></i> 匯出 HTML
                                    </button>
                                    <button
                                        onClick={() => exportPDF(pdfSettings)}
                                        className="flex-1 py-2 px-4 bg-red-600 hover:bg-red-500 text-white rounded-lg text-sm font-bold shadow transition-colors flex items-center justify-center gap-2"
                                    >
                                        <i className="fas fa-file-pdf"></i> 開始匯出
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- C5: 行程對比 Modal --- */}
                    {showCompare && (() => {
                        const allDays = data.plans.flatMap(p => p.days.map(d => ({ ...d, planName: p.name, planId: p.id })));
                        const dayA = allDays.find(d => d.id === compareDays[0]);
                        const dayB = allDays.find(d => d.id === compareDays[1]);
                        const renderDayCol = (day) => {
                            if (!day) return <div className="flex-1 flex items-center justify-center text-slate-400 py-20"><i className="far fa-hand-pointer mr-2"></i>請選擇天數</div>;
                            const w = WEATHER_CONDITIONS.find(wc => wc.value === day.weather?.condition);
                            return (
                                <div className="flex-1 min-w-0">
                                    <div className="font-bold text-lg mb-1">{day.title} <span className="text-sm font-normal text-slate-400">{day.subtitle || ''}</span></div>
                                    {w && <div className="text-sm mb-2">{w.icon} {w.label} {day.weather?.tempHigh && `${day.weather.tempHigh}°`}{day.weather?.tempLow && `/${day.weather.tempLow}°`}</div>}
                                    <div className="space-y-2">
                                        {day.nodes.map(n => {
                                            const ns = NODE_STYLES[n.type] || DEFAULT_NODE_STYLE;
                                            return (
                                                <div key={n.id} className="border rounded-lg p-2 text-sm" style={{ borderLeft: `4px solid ${ns.border}`, backgroundColor: ns.bg }}>
                                                    <div className="flex items-center gap-2">
                                                        {n.time && <span className="text-xs text-blue-600 font-mono font-bold">{n.time}</span>}
                                                        <span className="font-semibold">{n.title || '未命名'}</span>
                                                    </div>
                                                    {n.tags && <div className="text-xs text-slate-500 mt-0.5"><i className="fas fa-tags mr-1"></i>{n.tags}</div>}
                                                    {n.cost && <div className="text-xs text-blue-500 mt-0.5">{n.currency || ''} {parseFloat(n.cost).toLocaleString()}</div>}
                                                </div>
                                            );
                                        })}
                                        {day.nodes.length === 0 && <p className="text-slate-400 text-sm text-center py-4">無行程節點</p>}
                                    </div>
                                    {day.journal && <div className="mt-3 bg-amber-50 border border-amber-200 rounded p-2 text-xs text-amber-800"><i className="fas fa-book-open mr-1"></i>{day.journal}</div>}
                                </div>
                            );
                        };
                        return (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-start justify-center overflow-y-auto p-4" onClick={() => setShowCompare(false)}>
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl mt-8 overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-6 py-4 flex justify-between items-center">
                                    <h2 className="text-xl font-bold flex items-center gap-2"><i className="fas fa-columns"></i> 行程對比</h2>
                                    <button onClick={() => setShowCompare(false)} className="text-white/80 hover:text-white text-xl"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="p-6">
                                    <div className="grid grid-cols-2 gap-6 mb-6">
                                        {[0, 1].map(i => (
                                            <select key={i} className="border rounded-lg px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-indigo-300" value={compareDays[i] || ''} onChange={e => setCompareDays(prev => { const n = [...prev]; n[i] = e.target.value; return n; })}>
                                                <option value="">-- 選擇天數 --</option>
                                                {data.plans.map(p => (
                                                    <optgroup key={p.id} label={p.name}>
                                                        {p.days.map(d => <option key={d.id} value={d.id}>{d.title}{d.subtitle ? ` ${d.subtitle}` : ''}</option>)}
                                                    </optgroup>
                                                ))}
                                            </select>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        {renderDayCol(dayA)}
                                        {renderDayCol(dayB)}
                                    </div>
                                </div>
                            </div>
                        </div>
                        );
                    })()}
                    
                    {/* --- B4: 地圖總覽 Modal --- */}
                    <MapModal 
                        isOpen={showMapModal} 
                        onClose={() => setShowMapModal(false)} 
                        activePlan={activePlan} 
                    />

                    {/* --- B5: 單點地圖選取 Modal --- */}
                    <LocationPickerModal 
                        isOpen={!!locationPickerNode}
                        nodeData={locationPickerNode}
                        onClose={() => setLocationPickerNode(null)}
                        onConfirm={(lat, lng) => {
                            if (lat !== undefined && lng !== undefined) {
                                updatePlans(p => ({
                                    ...p, days: p.days.map(d => d.id === locationPickerNode.dayId ? { 
                                        ...d, nodes: d.nodes.map(n => n.id === locationPickerNode.nodeId ? { ...n, lat: lat.toString(), lng: lng.toString() } : n) 
                                    } : d)
                                }));
                            }
                            setLocationPickerNode(null);
                        }}
                    />

                    {/* --- 全域備忘錄黑板 (Corkboard) --- */}
                    {showCorkboard && (
                        <div className="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm overflow-y-auto pb-20">
                            <div className="sticky top-0 bg-slate-900/90 shadow p-4 flex justify-between items-center z-10 border-b border-slate-700">
                                <h2 className="text-xl font-bold text-white flex items-center gap-2">
                                    <i className="fas fa-thumbtack text-purple-400"></i> 全域備忘錄黑板
                                    <span className="text-sm font-normal text-slate-400 ml-2 hidden sm:inline">縱覽方案中的所有備忘錄</span>
                                </h2>
                                <button onClick={() => setShowCorkboard(false)} className="text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 p-2 rounded-full transition-colors flex items-center justify-center w-10 h-10 shadow">
                                    <i className="fas fa-times text-xl"></i>
                                </button>
                            </div>
                            <div className="p-6">
                                <div className="columns-1 sm:columns-2 md:columns-3 lg:columns-4 xl:columns-5 gap-6 max-w-[1600px] mx-auto space-y-6">
                                    {activePlan.days.flatMap(day => (day.memos || []).map(memo => ({...memo, dayTitle: day.title + (day.subtitle ? ` - ${day.subtitle}` : '')}))).length === 0 ? (
                                        <div className="text-center text-slate-400 font-medium py-20 col-span-full">
                                            此方案目前沒有任何備忘錄
                                        </div>
                                    ) : (
                                        activePlan.days.flatMap(day => (day.memos || []).map(memo => ({...memo, dayTitle: day.title + (day.subtitle ? ` - ${day.subtitle}` : '')})))
                                        .map(memo => {
                                            const ms = EXPORT_MEMO_COLORS[memo.color] || EXPORT_DEFAULT_MEMO;
                                            return (
                                                <div key={memo.id} className="break-inside-avoid w-full rounded-lg shadow-lg hover:shadow-xl transition-shadow transform hover:-translate-y-1 duration-200" style={{ backgroundColor: ms.bg, border: `1px solid ${ms.border}` }}>
                                                    <div className="px-3 py-2 flex justify-between items-start rounded-t-[7px]" style={{ backgroundColor: ms.titleBg }}>
                                                        <div 
                                                            className="font-bold text-sm bg-transparent border-none focus:outline-none w-full"
                                                            style={{ color: ms.text }}
                                                        >{memo.title || 'MEMO'}</div>
                                                        <span className="text-[10px] font-bold px-1.5 py-0.5 rounded ml-2 whitespace-nowrap bg-white/50" style={{ color: ms.text }}>{memo.dayTitle}</span>
                                                    </div>
                                                    <div className="p-3">
                                                        <div className="text-sm whitespace-pre-wrap outline-none" style={{ color: ms.text }}>
                                                            {memo.text || <span className="opacity-50 italic">無內容</span>}
                                                        </div>
                                                        {memo.image && (
                                                            <div className="mt-3 w-full">
                                                                <img src={memo.image} alt="Memo snapshot" className="w-full rounded shadow-sm border" style={{ borderColor: ms.border }} />
                                                            </div>
                                                        )}
                                                        {memo.linkedNodeId && (() => {
                                                            let linkedDay, linkedNode;
                                                            for (let d of activePlan.days) {
                                                                const nd = d.nodes.find(n => n.id === memo.linkedNodeId);
                                                                if (nd) { linkedDay = d; linkedNode = nd; break; }
                                                            }
                                                            if (linkedNode) return (
                                                                <div className="mt-3 pt-2 text-[10px] font-bold border-t flex items-center gap-1 opacity-70" style={{ color: ms.text, borderColor: ms.border }}>
                                                                    <i className="fas fa-link"></i> {linkedDay?.title} - {linkedNode.title || '無標題節點'}
                                                                </div>
                                                            );
                                                            return null;
                                                        })()}
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
