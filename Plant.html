<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 旅遊動態規劃系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (改用 cdnjs 提高本地檔案相容性) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <!-- FontAwesome Icons (取代 Lucide，避免 React DOM 衝突) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Leaflet JS & CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- html2canvas + jsPDF (PDF 匯出) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .timeline-line { position: absolute; left: 1.25rem; top: 0; bottom: 0; width: 2px; background-color: #cbd5e1; z-index: 0; }
        .memo-drag-handle { cursor: grab; }
        .memo-drag-handle:active { cursor: grabbing; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 自動增高 textarea */
        .auto-resize-textarea {
            overflow: hidden;
            resize: none;
            min-height: 1.5em;
        }
        /* 子節點水平捲動區 */
        .children-scroll::-webkit-scrollbar { height: 4px; }
        .children-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        /* 色票圓點 */
        .color-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
        .color-dot:hover, .color-dot.active { border-color: rgba(0,0,0,0.5); }
        /* 備忘錄圖片 */
        .memo-image { max-width: 100%; max-height: 120px; object-fit: cover; border-radius: 4px; }
        /* 拖曳排序 */
        .node-drag-handle { cursor: grab; color: #94a3b8; transition: color 0.15s; }
        .node-drag-handle:hover { color: #475569; }
        .node-drag-handle:active { cursor: grabbing; }
        .node-dragging { opacity: 0.4; }
        .node-drag-over { box-shadow: 0 -3px 0 0 #3b82f6; }
        .node-drag-over-bottom { box-shadow: 0 3px 0 0 #3b82f6; }
        /* 備忘錄調整大小把手 */
        .memo-resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.15) 50%);
            border-radius: 0 0 6px 0;
        }
        .memo-resize-handle:hover {
            background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.3) 50%);
        }
        /* 時間選擇器優化 */
        input[type="time"] { 
            appearance: none; 
            -moz-appearance: textfield;
            font-family: inherit;
        }
        input[type="time"]::-webkit-datetime-edit {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        input[type="time"]::-webkit-datetime-edit-ampm-field {
            font-size: 0.8em;
            margin-bottom: -2px;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- 防呆提示：如果在編譯前看到這個，代表腳本還在載入或被阻擋 -->
        <div style="text-align: center; margin-top: 20vh; color: #64748b; font-family: sans-serif;">
            <h2 style="font-size: 1.5rem; margin-bottom: 10px;">系統載入中，請稍候...</h2>
            <p>如果畫面持續停留在這裡，請確保您的網路連線正常，且瀏覽器允許執行 JavaScript。</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- C3: 天氣圖示選項 ---
        const WEATHER_CONDITIONS = [
            { value: 'sunny', icon: '☀️', label: '晴天' },
            { value: 'partly_cloudy', icon: '⛅', label: '多雲' },
            { value: 'cloudy', icon: '☁️', label: '陰天' },
            { value: 'rainy', icon: '🌧️', label: '雨天' },
            { value: 'stormy', icon: '⛈️', label: '雷雨' },
            { value: 'snowy', icon: '❄️', label: '下雪' },
            { value: 'windy', icon: '🌬️', label: '強風' },
            { value: 'hot', icon: '🌡️', label: '酷熱' },
        ];

        // --- C1: 旅伴顏色 ---
        const COMPANION_COLORS = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];

        // --- 預設初始資料 ---
        const initialData = {
            plans: [
                {
                    id: "plan-a",
                    name: "我的旅程",
                    companions: [],
                    days: [
                        {
                            id: "day-1",
                            title: "第一天",
                            subtitle: "美好的開始",
                            journal: "",
                            weather: { condition: '', tempHigh: '', tempLow: '' },
                            nodes: [
                                { id: "n1", title: "抵達機場", type: "location", time: "10:00", tags: "第一站", subtasks: [], children: [] },
                                { id: "n2", title: "飯店 Check-in", type: "hotel", time: "15:00", tags: "住宿", subtasks: [], children: [] }
                            ],
                            memos: [
                                { id: "memo-1", x: 50, y: 250, width: 224, height: null, title: "教學小提示", text: "您可以自由拖曳這個備忘錄，或點擊右上角更換顏色。也可以從右下角拖曳改變大小！", color: "bg-yellow-200", image: null, linkedNodeId: null, isMinimized: false },
                            ]
                        }
                    ],
                    checklists: [
                        { id: "cl-1", category: "文件與財務", items: [{ id: "cli-1", text: "護照 (確認效期6個月以上)", isChecked: false }, { id: "cli-2", text: "日幣現金與信用卡", isChecked: true }] },
                        { id: "cl-2", category: "電子產品", items: [{ id: "cli-3", text: "esim 網卡或 Wifi 機", isChecked: false }, { id: "cli-4", text: "行動電源與充電線", isChecked: false }] },
                        { id: "cl-3", category: "生活衣物", items: [{ id: "cli-5", text: "換洗衣物與外套", isChecked: false }, { id: "cli-6", text: "個人常備藥品", isChecked: false }] }
                    ]
                }
            ]
        };

        // --- 備忘錄可用顏色 ---
        const MEMO_COLORS = [
            { name: "bg-yellow-200", hex: "#fef08a" },
            { name: "bg-pink-200",   hex: "#fbcfe8" },
            { name: "bg-blue-200",   hex: "#bfdbfe" },
            { name: "bg-green-200",  hex: "#bbf7d0" },
            { name: "bg-purple-200", hex: "#e9d5ff" },
            { name: "bg-orange-200", hex: "#fed7aa" }
        ];

        // --- 節點可用樣式 ---
        const NODE_STYLES = {
            hotel:    { border: '#8b5cf6', bg: '#f5f3ff', icon: '🏨', label: '住宿' },
            meal:     { border: '#f59e0b', bg: '#fffbeb', icon: '🍽️', label: '餐食' },
            location: { border: '#3b82f6', bg: '#eff6ff', icon: '📍', label: '地點' },
            activity: { border: '#10b981', bg: '#ecfdf5', icon: '🎯', label: '活動' },
            transit:  { border: '#6366f1', bg: '#eef2ff', icon: '🚃', label: '交通' }
        };
        const DEFAULT_NODE_STYLE = { border: '#64748b', bg: '#f8fafc', icon: '📌', label: '其他' };

        // --- 產生隨機 ID ---
        const generateId = () => Math.random().toString(36).substr(2, 9);

        // --- 自動增高 Textarea 元件 ---
        const AutoResizeTextarea = ({ value, onChange, className, placeholder }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.style.height = 'auto';
                    ref.current.style.height = ref.current.scrollHeight + 'px';
                }
            }, [value]);
            return (
                <textarea
                    ref={ref}
                    className={`auto-resize-textarea ${className}`}
                    value={value}
                    onChange={onChange}
                    placeholder={placeholder}
                    rows={1}
                />
            );
        };

        // --- 元件：可拖曳的備忘錄 (Memo) ---
        const DraggableMemo = ({ memo, updateMemo, deleteMemo, dayNodes }) => {
            const [isDragging, setIsDragging] = useState(false);
            const [isResizing, setIsResizing] = useState(false);
            const [pos, setPos] = useState({ x: memo.x, y: memo.y });
            const [size, setSize] = useState({ width: memo.width || 224, height: memo.height || null });
            const [text, setText] = useState(memo.text);
            const [title, setTitle] = useState(memo.title || "MEMO");
            const [isMinimized, setIsMinimized] = useState(memo.isMinimized || false);
            const [showColorPicker, setShowColorPicker] = useState(false);
            const dragRef = useRef(null);
            const resizeRef = useRef(null);

            // 同步外部 props（匯入 JSON 或切換 Day 時）
            useEffect(() => {
                setPos({ x: memo.x, y: memo.y });
                setSize({ width: memo.width || 224, height: memo.height || null });
                setText(memo.text);
                setTitle(memo.title || 'MEMO');
                setIsMinimized(memo.isMinimized || false);
            }, [memo.id, memo.x, memo.y, memo.width, memo.height, memo.text, memo.title, memo.isMinimized]);

            const handlePointerDown = (e) => {
                const tag = e.target.tagName.toLowerCase();
                if (tag === 'textarea' || tag === 'button' || tag === 'input' || tag === 'label' || tag === 'select') return;
                if (e.target.closest('.color-picker-area') || e.target.closest('.memo-actions') || e.target.closest('.memo-resize-handle')) return;
                setIsDragging(true);
                dragRef.current = { startX: e.clientX, startY: e.clientY, initialX: pos.x, initialY: pos.y };
                e.target.setPointerCapture(e.pointerId);
            };

            const handlePointerMove = (e) => {
                if (!isDragging) return;
                const dx = e.clientX - dragRef.current.startX;
                const dy = e.clientY - dragRef.current.startY;
                
                const rawX = dragRef.current.initialX + dx;
                // 限制最左 (0) 與最右 (螢幕寬度減 100) 以防消失
                const newX = Math.max(0, Math.min(window.innerWidth - 100, rawX));
                
                // 限制最低 Y 軸 (130)，避免被頂部選單蓋住無法再拖曳
                const newY = Math.max(130, dragRef.current.initialY + dy); 
                setPos({ x: newX, y: newY });
            };

            const handlePointerUp = (e) => {
                if (!isDragging) return;
                setIsDragging(false);
                updateMemo(memo.id, { ...memo, x: pos.x, y: pos.y, text, title, isMinimized });
                e.target.releasePointerCapture(e.pointerId);
            };

            // --- Resize handlers ---
            const handleResizeDown = (e) => {
                e.stopPropagation();
                setIsResizing(true);
                resizeRef.current = { startX: e.clientX, startY: e.clientY, initialW: size.width, initialH: e.target.closest('.memo-card').offsetHeight };
                e.target.setPointerCapture(e.pointerId);
            };

            const handleResizeMove = (e) => {
                if (!isResizing) return;
                const dw = e.clientX - resizeRef.current.startX;
                const dh = e.clientY - resizeRef.current.startY;
                const newW = Math.max(180, resizeRef.current.initialW + dw);
                const newH = Math.max(120, resizeRef.current.initialH + dh);
                setSize({ width: newW, height: newH });
            };

            const handleResizeUp = (e) => {
                if (!isResizing) return;
                setIsResizing(false);
                updateMemo(memo.id, { ...memo, width: size.width, height: size.height });
                e.target.releasePointerCapture(e.pointerId);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    updateMemo(memo.id, { ...memo, image: ev.target.result });
                };
                reader.readAsDataURL(file);
            };

            const removeImage = () => {
                updateMemo(memo.id, { ...memo, image: null });
            };

            return (
                <div 
                    className={`memo-card absolute shadow-lg rounded-md overflow-visible ${memo.color} border border-black/10`}
                    style={{ 
                        left: pos.x, 
                        top: pos.y, 
                        width: size.width, 
                        height: isMinimized ? 'auto' : (size.height || 'auto'), 
                        zIndex: (isDragging || isResizing) ? 20 : 10, 
                        display: 'flex', 
                        flexDirection: 'column' 
                    }}
                >
                    {/* 拖曳把手 + 標題 */}
                    <div 
                        className="bg-black/10 memo-drag-handle flex justify-between items-center px-2 py-1"
                        onPointerDown={handlePointerDown}
                        onPointerMove={handlePointerMove}
                        onPointerUp={handlePointerUp}
                        onPointerCancel={handlePointerUp}
                    >
                        <input 
                            className="text-xs font-bold text-black/60 bg-transparent border-none focus:outline-none focus:bg-white/40 rounded px-1 w-24"
                            value={title}
                            onChange={(e) => {
                                setTitle(e.target.value);
                                updateMemo(memo.id, { ...memo, title: e.target.value });
                            }}
                            placeholder="標題..."
                        />
                        <div className="memo-actions flex items-center gap-1">
                            <button onClick={() => setShowColorPicker(!showColorPicker)} className="text-black/50 hover:text-black/80 text-xs p-0.5" title="選擇顏色">
                                <i className="fas fa-palette"></i>
                            </button>
                            <label className="text-black/50 hover:text-blue-600 text-xs cursor-pointer p-0.5" title="新增圖片">
                                <i className="fas fa-image"></i>
                                <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                            </label>
                            <button 
                                onClick={() => {
                                    const nextState = !isMinimized;
                                    setIsMinimized(nextState);
                                    updateMemo(memo.id, { ...memo, isMinimized: nextState });
                                }} 
                                className="text-black/50 hover:text-black/80 text-xs p-0.5" 
                                title={isMinimized ? "展開" : "收合"}
                            >
                                <i className={`fas ${isMinimized ? 'fa-chevron-down' : 'fa-chevron-up'}`}></i>
                            </button>
                            <button onClick={() => deleteMemo(memo.id)} className="text-black/50 hover:text-red-600 text-xs p-0.5" title="刪除">
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                    </div>

                    {/* 色票選擇列 (只有展開時顯示) */}
                    {!isMinimized && showColorPicker && (
                        <div className="color-picker-area flex gap-1.5 px-2 py-1.5 bg-white/50 border-b border-black/5">
                            {MEMO_COLORS.map(c => (
                                <div
                                    key={c.name}
                                    className={`color-dot ${memo.color === c.name ? 'active' : ''}`}
                                    style={{ backgroundColor: c.hex }}
                                    onClick={() => {
                                        updateMemo(memo.id, { ...memo, color: c.name });
                                        setShowColorPicker(false);
                                    }}
                                />
                            ))}
                        </div>
                    )}

                    {/* 當未收合時顯示下列內容 */}
                    {!isMinimized && (
                        <>
                            {/* 文字內容 */}
                            <textarea 
                                className="w-full p-2 bg-transparent resize-none focus:outline-none text-sm text-gray-800"
                                style={{ flex: size.height ? 1 : undefined, minHeight: size.height ? 0 : '5rem', height: size.height ? undefined : '5rem' }}
                                value={text}
                                onChange={(e) => {
                                    setText(e.target.value);
                                    updateMemo(memo.id, { ...memo, text: e.target.value });
                                }}
                                placeholder="輸入備忘錄..."
                            />

                            {/* 圖片區 */}
                            {memo.image && (
                                <div className="px-2 pb-2 relative group">
                                    <img src={memo.image} alt="備忘錄圖片" className="memo-image" />
                                    <button 
                                        onClick={removeImage}
                                        className="absolute top-1 right-3 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow"
                                    >
                                        <i className="fas fa-times"></i>
                                    </button>
                                </div>
                            )}

                            {/* 勾稽節點選擇器 */}
                            <div className="px-2 py-1.5 border-t border-black/5 bg-white/30">
                                <select
                                    className="w-full text-xs bg-white/60 border border-black/10 rounded px-1.5 py-1 focus:outline-none focus:ring-1 focus:ring-blue-300"
                                    value={memo.linkedNodeId || ''}
                                    onChange={(e) => {
                                        updateMemo(memo.id, { ...memo, linkedNodeId: e.target.value || null });
                                    }}
                                >
                                    <option value="">🔗 無勾稽節點</option>
                                    {(dayNodes || []).map(n => (
                                        <option key={n.id} value={n.id}>└ {n.title}</option>
                                    ))}
                                </select>
                            </div>

                            {/* 調整大小把手 */}
                            <div
                                className="memo-resize-handle"
                                onPointerDown={handleResizeDown}
                                onPointerMove={handleResizeMove}
                                onPointerUp={handleResizeUp}
                                onPointerCancel={handleResizeUp}
                                title="拖曳調整大小"
                            />
                        </>
                    )}
                </div>
            );
        };

        // --- B4: 地圖總覽 Modal ---
        const MapModal = ({ isOpen, onClose, activePlan }) => {
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            
            useEffect(() => {
                if (!isOpen) return;
                const plan = activePlan;
                if (!plan) return;

                // 收集有 lat/lng 的節點
                const mapNodes = [];
                plan.days.forEach(day => {
                    day.nodes.forEach(node => {
                        const lat = parseFloat(node.lat);
                        const lng = parseFloat(node.lng);
                        if (!isNaN(lat) && !isNaN(lng)) {
                            mapNodes.push({ ...node, lat, lng, dayTitle: day.title });
                        }
                    });
                });

                let center = [23.5, 121];
                if (mapNodes.length > 0) center = [mapNodes[0].lat, mapNodes[0].lng];

                if (!mapInstance.current && mapRef.current) {
                    mapInstance.current = L.map(mapRef.current).setView(center, mapNodes.length > 0 ? 10 : 7);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(mapInstance.current);
                }

                const map = mapInstance.current;
                if (!map) return;
                
                // 清除舊圖層
                map.eachLayer((layer) => {
                    if (layer instanceof L.Marker || layer instanceof L.Polyline) {
                        map.removeLayer(layer);
                    }
                });

                if (mapNodes.length === 0) return;

                const latlngs = [];
                mapNodes.forEach((node) => {
                    const loc = [node.lat, node.lng];
                    latlngs.push(loc);
                    
                    const style = NODE_STYLES[node.type] || DEFAULT_NODE_STYLE;
                    
                    // 自訂 Emoji Marker
                    const customIcon = L.divIcon({
                        className: 'custom-leaflet-marker',
                        html: `<div style="background-color: ${style.bg}; border: 2px solid ${style.border}; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">${style.icon}</div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15],
                        popupAnchor: [0, -15]
                    });

                    const marker = L.marker(loc, { icon: customIcon }).addTo(map);
                    
                    const popupContent = `
                        <div style="font-family: sans-serif; min-width: 150px;">
                            <div style="font-weight: bold; font-size: 14px; margin-bottom: 4px; border-bottom: 2px solid ${style.border}; padding-bottom: 2px;">
                                ${node.title || '未命名'}
                            </div>
                            <div style="font-size: 12px; color: #666; margin-bottom: 2px;">
                                <span style="font-weight:bold; color:#f59e0b;">${node.dayTitle}</span> ${node.time ? '<span style="color:#2563eb;font-weight:bold;margin-left:5px;">'+node.time+'</span>' : ''}
                            </div>
                            ${node.tags ? '<div style="font-size: 10px; color: #888; margin-top:4px;">🏷️ '+node.tags+'</div>' : ''}
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                });

                if (latlngs.length > 1) {
                    L.polyline(latlngs, { color: '#3b82f6', weight: 3, dashArray: '5, 10' }).addTo(map);
                    const bounds = L.latLngBounds(latlngs);
                    map.fitBounds(bounds, { padding: [50, 50] });
                }

                // 解決 Leaflet 在 Modal 顯示時 rendering 尺寸不對的問題
                setTimeout(() => {
                    map.invalidateSize();
                    if (latlngs.length > 1) {
                        map.fitBounds(L.latLngBounds(latlngs), { padding: [50, 50] });
                    }
                }, 150);
            }, [isOpen, activePlan]);

            // 當 modal 關閉時銷毀地圖實例
            useEffect(() => {
                if (!isOpen && mapInstance.current) {
                    mapInstance.current.remove();
                    mapInstance.current = null;
                }
            }, [isOpen]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[80vh] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="bg-gradient-to-r from-sky-500 to-blue-600 text-white px-6 py-4 flex justify-between items-center shrink-0">
                            <h2 className="text-xl font-bold flex items-center gap-2">
                                <i className="fas fa-map-marked-alt"></i> 行程地圖總覽
                            </h2>
                            <button onClick={onClose} className="text-white/80 hover:text-white text-xl p-1 rounded hover:bg-white/20 transition-colors">
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                        <div className="p-4 flex-1 relative bg-slate-50">
                            {activePlan?.days.flatMap(d => d.nodes).filter(n => !isNaN(parseFloat(n.lat)) && !isNaN(parseFloat(n.lng))).length === 0 && (
                                <div className="absolute inset-0 z-10 flex items-center justify-center pointer-events-none">
                                    <div className="bg-white/90 backdrop-blur px-6 py-4 rounded-xl shadow border border-slate-200 text-center">
                                        <i className="fas fa-map-pin text-3xl text-slate-300 mb-2"></i>
                                        <p className="text-slate-600 font-semibold">地圖上目前沒有任何標記</p>
                                        <p className="text-sm text-slate-500 mt-1">請在行程節點設定「緯度」與「經度」來顯示位置</p>
                                    </div>
                                </div>
                            )}
                            <div ref={mapRef} className="absolute inset-4 rounded-xl border border-slate-300 shadow-inner z-0"></div>
                        </div>
                        <div className="px-6 py-3 bg-slate-100 border-t border-slate-200 text-xs text-slate-500 flex justify-between shrink-0">
                            <span><i className="fas fa-info-circle text-sky-500 mr-1"></i> 提示：在節點中輸入緯度與經度 (Lat/Lng) 即可在地圖上自動標記與連線。</span>
                            <span>&copy; OpenStreetMap</span>
                        </div>
                    </div>
                </div>
            );
        };

        // --- B5: 單點地圖選取 Modal ---
        const LocationPickerModal = ({ isOpen, nodeData, onClose, onConfirm }) => {
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markerInstance = useRef(null);
            const [tempPos, setTempPos] = useState(null);

            useEffect(() => {
                if (!isOpen) return;
                
                const initialLat = nodeData && nodeData.lat ? parseFloat(nodeData.lat) : NaN;
                const initialLng = nodeData && nodeData.lng ? parseFloat(nodeData.lng) : NaN;
                const hasValidInitial = !isNaN(initialLat) && !isNaN(initialLng);
                const center = hasValidInitial ? [initialLat, initialLng] : [23.5, 121]; // 預設台灣中心
                
                if (!mapInstance.current && mapRef.current) {
                    mapInstance.current = L.map(mapRef.current).setView(center, hasValidInitial ? 14 : 7);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(mapInstance.current);

                    mapInstance.current.on('click', (e) => {
                        const { lat, lng } = e.latlng;
                        setTempPos({ lat, lng });
                        
                        if (markerInstance.current) {
                            markerInstance.current.setLatLng([lat, lng]);
                        } else {
                            markerInstance.current = L.marker([lat, lng], { draggable: true }).addTo(mapInstance.current);
                            markerInstance.current.on('dragend', (ev) => {
                                const pos = ev.target.getLatLng();
                                setTempPos({ lat: pos.lat, lng: pos.lng });
                            });
                        }
                    });
                } else if (mapInstance.current) {
                    mapInstance.current.setView(center, hasValidInitial ? 14 : 7);
                }

                const map = mapInstance.current;
                
                if (hasValidInitial) {
                    setTempPos({ lat: initialLat, lng: initialLng });
                    if (!markerInstance.current) {
                        markerInstance.current = L.marker([initialLat, initialLng], { draggable: true }).addTo(map);
                        markerInstance.current.on('dragend', (ev) => {
                            const pos = ev.target.getLatLng();
                            setTempPos({ lat: pos.lat, lng: pos.lng });
                        });
                    } else {
                        markerInstance.current.setLatLng([initialLat, initialLng]);
                    }
                } else {
                    setTempPos(null);
                    if (markerInstance.current && map) {
                        map.removeLayer(markerInstance.current);
                        markerInstance.current = null;
                    }
                }

                setTimeout(() => {
                    if (mapInstance.current) {
                        mapInstance.current.invalidateSize();
                    }
                }, 150);

            }, [isOpen, nodeData]);

            useEffect(() => {
                if (!isOpen) {
                    if (mapInstance.current) {
                        mapInstance.current.remove();
                        mapInstance.current = null;
                        markerInstance.current = null;
                    }
                    setTempPos(null);
                }
            }, [isOpen]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4 transition-opacity" onClick={onClose}>
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl h-[500px] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="bg-slate-800 text-white px-5 py-3 flex justify-between items-center shrink-0">
                            <h2 className="font-bold flex items-center gap-2">
                                <i className="fas fa-map-pin text-red-500"></i> 為「{nodeData?.title || '節點'}」選擇位置
                            </h2>
                            <button onClick={onClose} className="text-white/70 hover:text-white transition-colors">
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                        <div className="p-2 bg-red-50 text-red-800 text-xs font-semibold flex items-center gap-2 shrink-0">
                            <i className="fas fa-hand-pointer ml-2"></i> 請在地圖上點擊以放置圖釘，或直接拖曳紅色圖釘。
                        </div>
                        <div className="relative flex-1 bg-slate-100">
                            <div ref={mapRef} className="absolute inset-0 z-0"></div>
                        </div>
                        <div className="p-4 bg-slate-50 border-t border-slate-200 flex justify-between items-center shrink-0">
                            <div className="text-sm font-mono text-slate-600 bg-white border border-slate-200 px-3 py-1.5 rounded flex-1 mr-4 shadow-sm flex items-center">
                                {tempPos ? (
                                    <>Lat: <span className="font-bold text-blue-600 ml-1 mr-3">{tempPos.lat.toFixed(6)}</span> Lng: <span className="font-bold text-blue-600 ml-1">{tempPos.lng.toFixed(6)}</span></>
                                ) : (
                                    <span className="text-slate-400 italic">尚未選取任何座標...</span>
                                )}
                            </div>
                            <div className="flex gap-2">
                                <button onClick={onClose} className="px-4 py-2 rounded text-sm font-semibold text-slate-600 hover:bg-slate-200 transition-colors">
                                    取消
                                </button>
                                <button 
                                    onClick={() => onConfirm(tempPos?.lat, tempPos?.lng)} 
                                    disabled={!tempPos}
                                    className={`px-4 py-2 rounded text-sm font-semibold text-white shadow transition-colors flex items-center gap-1 ${tempPos ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-slate-300 cursor-not-allowed'}`}
                                >
                                    <i className="fas fa-check"></i> 確定儲存
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 主應用程式元件 ---
        const App = () => {
            const [data, _setDataRaw] = useState(() => {
                try {
                    const saved = localStorage.getItem('travelPlanData');
                    return saved ? JSON.parse(saved) : initialData;
                } catch { return initialData; }
            });
            const [activePlanId, setActivePlanId] = useState(data.plans[0]?.id);
            // activeDayId 如果為 'checklist'，則代表目前正停留在「行前清單」分頁
            const [activeDayId, setActiveDayId] = useState('checklist');
            const [showCorkboard, setShowCorkboard] = useState(false);

            // --- A5: localStorage 自動存檔 ---
            useEffect(() => {
                try { localStorage.setItem('travelPlanData', JSON.stringify(data)); }
                catch(e) { console.warn('localStorage 存檔失敗', e); }
            }, [data]);

            // --- A3: Undo / Redo (shadow setData) ---
            const MAX_HISTORY = 50;
            const dataRef = useRef(data);
            dataRef.current = data;
            const historyRef = useRef({ past: [], future: [] });
            const skipHistoryRef = useRef(false);
            const [, forceRender] = useState(0);

            const setData = useCallback((newDataOrUpdater) => {
                _setDataRaw(prev => {
                    const newData = typeof newDataOrUpdater === 'function' ? newDataOrUpdater(prev) : newDataOrUpdater;
                    if (!skipHistoryRef.current) {
                        historyRef.current.past = [...historyRef.current.past, prev].slice(-MAX_HISTORY);
                        historyRef.current.future = [];
                    }
                    skipHistoryRef.current = false;
                    return newData;
                });
                forceRender(n => n + 1);
            }, []);

            const undo = useCallback(() => {
                if (historyRef.current.past.length === 0) return;
                const prevData = historyRef.current.past[historyRef.current.past.length - 1];
                historyRef.current.past = historyRef.current.past.slice(0, -1);
                historyRef.current.future = [dataRef.current, ...historyRef.current.future];
                skipHistoryRef.current = true;
                _setDataRaw(prevData);
                forceRender(n => n + 1);
            }, []);

            const redo = useCallback(() => {
                if (historyRef.current.future.length === 0) return;
                const nextData = historyRef.current.future[0];
                historyRef.current.past = [...historyRef.current.past, dataRef.current];
                historyRef.current.future = historyRef.current.future.slice(1);
                skipHistoryRef.current = true;
                _setDataRaw(nextData);
                forceRender(n => n + 1);
            }, []);

            const canUndo = historyRef.current.past.length > 0;
            const canRedo = historyRef.current.future.length > 0;

            useEffect(() => {
                const handler = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
                    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
                    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [undo, redo]);

            // 確保有活動方案
            const activePlan = data.plans.find(p => p.id === activePlanId) || data.plans[0];
            const activeDay = activePlan?.days.find(d => d.id === activeDayId) || null;

            // --- 拖曳排序狀態 ---
            const [dragNodeId, setDragNodeId] = useState(null);
            const [dragOverNodeId, setDragOverNodeId] = useState(null);
            const [dragOverPosition, setDragOverPosition] = useState(null); // 'top' | 'bottom'

            // --- 跨天轉移/互換狀態 ---
            const [isSwappingDay, setIsSwappingDay] = useState(false);
            const [dayToSwap, setDayToSwap] = useState(null);

            // --- A1: 節點收合/展開 ---
            // --- A1: 節點收合/展開 ---
            const [collapsedNodes, setCollapsedNodes] = useState(new Set());
            const toggleNodeCollapse = (nodeId) => {
                setCollapsedNodes(prev => {
                    const next = new Set(prev);
                    next.has(nodeId) ? next.delete(nodeId) : next.add(nodeId);
                    return next;
                });
            };
            const collapseAll = () => { if (activeDay) setCollapsedNodes(new Set(activeDay.nodes.map(n => n.id))); };
            const expandAll = () => setCollapsedNodes(new Set());

            // --- A4: 跨天拖曳至 Day Tab ---
            const [dragOverDayId, setDragOverDayId] = useState(null);

            // --- C3: Google Maps 導航路線產生 ---
            const openGoogleMapsRoute = (day) => {
                if (!day || !day.nodes) return;
                
                // 收集所有具有 lat/lng 的座標點
                const waypoints = [];
                day.nodes.forEach(node => {
                    if (node.lat && node.lng) waypoints.push(`${node.lat},${node.lng}`);
                });

                if (waypoints.length === 0) {
                    alert('目前天數沒有設定任何地圖座標，無法產生路線！\n\n💡 提示：請在節點中點擊「📍」圖示選擇地圖座標。');
                    return;
                }

                // Google 導航網址上限通常能吃 10~25 個點，若是超長可以考慮提示
                if (waypoints.length > 25) {
                    alert('⚠️ 注意：座標點超過 25 個，Google Maps 可能無法完全載入所有中途停靠點。');
                }

                const url = `https://www.google.com/maps/dir/${waypoints.join('/')}`;
                window.open(url, '_blank', 'noopener,noreferrer');
            };

            // --- 其他 UI 控制邏輯 ---
            const [showCompare, setShowCompare] = useState(false);
            const [compareDays, setCompareDays] = useState([null, null]);

            // --- B4: 地圖總覽 Modal ---
            const [showMapModal, setShowMapModal] = useState(false);

            // --- B5: 單點地圖選取 Modal ---
            const [locationPickerNode, setLocationPickerNode] = useState(null);

            // 切換方案時自動選中行前清單
            const switchPlan = (planId) => {
                setActivePlanId(planId);
                setActiveDayId('checklist');
            };

            // 備忘錄操作（綁定至當前天數）
            const currentMemos = activeDay?.memos || [];

            const addMemo = () => {
                if (!activeDay) return;
                const newMemo = {
                    id: generateId(),
                    x: Math.random() * 200 + 50,
                    y: Math.random() * 200 + 100,
                    title: "MEMO",
                    text: "新備忘錄",
                    color: MEMO_COLORS[Math.floor(Math.random() * MEMO_COLORS.length)].name,
                    image: null,
                    linkedNodeId: null,
                    width: 224,
                    height: null
                };
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== activeDay.id ? d : {
                        ...d, memos: [...(d.memos || []), newMemo]
                    })
                }));
            };
            const updateMemo = (id, updated) => {
                if (!activeDay) return;
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== activeDay.id ? d : {
                        ...d, memos: (d.memos || []).map(m => m.id === id ? updated : m)
                    })
                }));
            };
            const deleteMemo = (id) => {
                if (!activeDay) return;
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== activeDay.id ? d : {
                        ...d, memos: (d.memos || []).filter(m => m.id !== id)
                    })
                }));
            };

            // 方案操作
            const addPlan = () => {
                const newPlan = { id: generateId(), name: `新方案 ${data.plans.length + 1}`, companions: [], days: [] };
                setData({ ...data, plans: [...data.plans, newPlan] });
                setActivePlanId(newPlan.id);
                setActiveDayId(null);
            };

            // 天數操作
            const addDay = () => {
                if (!activePlan) return;
                const newDay = { id: generateId(), title: `Day ${activePlan.days.length + 1}`, subtitle: '', journal: '', weather: { condition: '', tempHigh: '', tempLow: '' }, nodes: [], memos: [] };
                const updatedPlans = data.plans.map(p => {
                    if (p.id === activePlan.id) return { ...p, days: [...p.days, newDay] };
                    return p;
                });
                setData({ ...data, plans: updatedPlans });
                setActiveDayId(newDay.id);
            };

            const deletePlan = (planId) => {
                if (data.plans.length <= 1) {
                    alert("方案至少需要保留一個！");
                    return;
                }
                if (window.confirm("確定要刪除這個方案嗎？這個動作無法復原。")) {
                    const newPlans = data.plans.filter(p => p.id !== planId);
                    setData({ ...data, plans: newPlans });
                    if (activePlanId === planId) {
                        setActivePlanId(newPlans[0].id);
                        setActiveDayId(newPlans[0].days[0]?.id || null);
                    }
                }
            };

            const deleteDay = (dayId) => {
                if (!activePlan) return;
                if (activePlan.days.length <= 1) {
                    alert("方案至少需要保留一天行程！");
                    return;
                }
                if (window.confirm("確定要刪除這天的行程嗎？這個動作無法復原。")) {
                    const updatedPlans = data.plans.map(p => {
                        if (p.id === activePlan.id) {
                            return { ...p, days: p.days.filter(d => d.id !== dayId) };
                        }
                        return p;
                    });
                    setData({ ...data, plans: updatedPlans });
                    if (activeDayId === dayId) {
                        const remainingDays = activePlan.days.filter(d => d.id !== dayId);
                        setActiveDayId(remainingDays[0]?.id || null);
                    }
                }
            };

            // --- 輔助函式：深層更新 plans ---
            const updatePlans = (updater) => {
                const updatedPlans = data.plans.map(p => {
                    if (p.id !== activePlan.id) return p;
                    return updater(p);
                });
                setData({ ...data, plans: updatedPlans });
            };

            // 節點操作
            const addNode = (dayId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: [...d.nodes, { id: generateId(), title: "新行程節點 (可編輯)", type: "activity", time: "", tags: "", lat: "", lng: "", subtasks: [], children: [] }]
                    })
                }));
            };

            const addSubtask = (dayId, nodeId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : {
                            ...n, subtasks: [...n.subtasks, { id: generateId(), text: "預估 0 分鐘", type: "transit" }]
                        })
                    })
                }));
            };

            const updateNodeTitle = (dayId, nodeId, title) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : { ...n, title })
                    })
                }));
            };

            const updateNodeType = (dayId, nodeId, type) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : { ...n, type })
                    })
                }));
            };

            const updateNodeTime = (dayId, nodeId, time) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : { ...n, time })
                    })
                }));
            };

            const updateNodeTags = (dayId, nodeId, tags) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : { ...n, tags })
                    })
                }));
            };

            const updateSubtaskText = (dayId, nodeId, subtaskId, text) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : {
                            ...n, subtasks: n.subtasks.map(s => s.id !== subtaskId ? s : { ...s, text })
                        })
                    })
                }));
            };

            const updateNodeField = (dayId, nodeId, field, value) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : { ...n, [field]: value })
                    })
                }));
            };

            const deleteNode = (dayId, nodeId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.filter(n => n.id !== nodeId)
                    })
                }));
            };

            const deleteSubtask = (dayId, nodeId, subtaskId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : {
                            ...n, subtasks: n.subtasks.filter(s => s.id !== subtaskId)
                        })
                    })
                }));
            };

            // --- A2: 節點複製 ---
            const duplicateNode = (dayId, nodeId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => {
                        if (d.id !== dayId) return d;
                        const idx = d.nodes.findIndex(n => n.id === nodeId);
                        if (idx === -1) return d;
                        const cloned = JSON.parse(JSON.stringify(d.nodes[idx]));
                        const reassignIds = (obj) => {
                            obj.id = generateId();
                            if (obj.subtasks) obj.subtasks.forEach(s => { s.id = generateId(); });
                            if (obj.children) obj.children.forEach(c => { c.id = generateId(); if (c.subtasks) c.subtasks.forEach(s => { s.id = generateId(); }); });
                        };
                        reassignIds(cloned);
                        cloned.title = (cloned.title || '') + ' (複製)';
                        const nodes = [...d.nodes];
                        nodes.splice(idx + 1, 0, cloned);
                        return { ...d, nodes };
                    })
                }));
            };

            // --- C1: 旅伴管理 ---
            const addCompanion = (name) => {
                if (!name.trim()) return;
                const color = COMPANION_COLORS[(activePlan.companions || []).length % COMPANION_COLORS.length];
                setData(prev => ({
                    ...prev,
                    plans: prev.plans.map(p => p.id !== activePlan.id ? p : {
                        ...p,
                        companions: [...(p.companions || []), { id: generateId(), name: name.trim(), color }]
                    })
                }));
            };
            const deleteCompanion = (compId) => {
                setData(prev => ({
                    ...prev,
                    plans: prev.plans.map(p => p.id !== activePlan.id ? p : {
                        ...p,
                        companions: (p.companions || []).filter(c => c.id !== compId),
                        days: p.days.map(d => ({
                            ...d,
                            nodes: d.nodes.map(n => ({
                                ...n,
                                paidBy: n.paidBy === compId ? '' : n.paidBy,
                                splitAmong: (n.splitAmong || []).filter(id => id !== compId)
                            }))
                        }))
                    })
                }));
            };
            const renameCompanion = (compId, newName) => {
                setData(prev => ({
                    ...prev,
                    plans: prev.plans.map(p => p.id !== activePlan.id ? p : {
                        ...p,
                        companions: (p.companions || []).map(c => c.id === compId ? { ...c, name: newName } : c)
                    })
                }));
            };
            const updateNodePaidBy = (dayId, nodeId, compId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d,
                        nodes: d.nodes.map(n => n.id !== nodeId ? n : { ...n, paidBy: compId })
                    })
                }));
            };
            const toggleNodeSplitAmong = (dayId, nodeId, compId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d,
                        nodes: d.nodes.map(n => {
                            if (n.id !== nodeId) return n;
                            const list = n.splitAmong || [];
                            return { ...n, splitAmong: list.includes(compId) ? list.filter(id => id !== compId) : [...list, compId] };
                        })
                    })
                }));
            };

            // --- 跨天操作：節點搬移 ---
            const moveNodeToDay = (nodeId, fromDayId, toDayId) => {
                if (fromDayId === toDayId) return;
                let movedNode = null;
                
                // 1. 先把節點從原有的 Day 取出
                updatePlans(p => {
                    const fromDay = p.days.find(d => d.id === fromDayId);
                    if (fromDay) {
                        movedNode = fromDay.nodes.find(n => n.id === nodeId);
                    }
                    if (!movedNode) return p;

                    return {
                        ...p,
                        days: p.days.map(d => {
                            if (d.id === fromDayId) {
                                return { ...d, nodes: d.nodes.filter(n => n.id !== nodeId) };
                            }
                            if (d.id === toDayId) {
                                return { ...d, nodes: [...d.nodes, movedNode] };
                            }
                            return d;
                        })
                    };
                });
            };

            // --- 整天互換：交換兩天所有的行程、標題、副標題與備忘錄 ---
            const swapDays = (dayId1, dayId2) => {
                if (dayId1 === dayId2) return;
                updatePlans(p => {
                    const days = [...p.days];
                    const idx1 = days.findIndex(d => d.id === dayId1);
                    const idx2 = days.findIndex(d => d.id === dayId2);
                    if (idx1 === -1 || idx2 === -1) return p;

                    // 互換天數物件，但保留原始的 Title (Day 1, Day 2)，避免順序混亂
                    // 其他內容如 subtitle, nodes, memos 整包對調
                    const tempNodes = days[idx1].nodes;
                    const tempMemos = days[idx1].memos;
                    const tempSubtitle = days[idx1].subtitle;

                    days[idx1] = { ...days[idx1], nodes: days[idx2].nodes, memos: days[idx2].memos, subtitle: days[idx2].subtitle };
                    days[idx2] = { ...days[idx2], nodes: tempNodes, memos: tempMemos, subtitle: tempSubtitle };
                    
                    return { ...p, days };
                });
                setIsSwappingDay(false);
                setDayToSwap(null);
            };

            // --- 拖曳排序：重新排列節點 ---
            const reorderNodes = (dayId, fromId, toId, position) => {
                if (fromId === toId) return;
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => {
                        if (d.id !== dayId) return d;
                        const nodes = [...d.nodes];
                        const fromIndex = nodes.findIndex(n => n.id === fromId);
                        const toIndex = nodes.findIndex(n => n.id === toId);
                        if (fromIndex === -1 || toIndex === -1) return d;
                        const [moved] = nodes.splice(fromIndex, 1);
                        const insertAt = position === 'bottom' ? toIndex + (fromIndex < toIndex ? 0 : 1) : toIndex - (fromIndex < toIndex ? 1 : 0);
                        nodes.splice(Math.max(0, insertAt), 0, moved);
                        return { ...d, nodes };
                    })
                }));
            };

            const handleDragStart = (e, nodeId) => {
                setDragNodeId(nodeId);
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', nodeId);
            };

            const handleDragOver = (e, nodeId) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                if (nodeId === dragNodeId) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const midY = rect.top + rect.height / 2;
                setDragOverNodeId(nodeId);
                setDragOverPosition(e.clientY < midY ? 'top' : 'bottom');
            };

            const handleDragEnd = () => {
                setDragNodeId(null);
                setDragOverNodeId(null);
                setDragOverPosition(null);
            };

            const handleDrop = (e, nodeId) => {
                e.preventDefault();
                if (dragNodeId && activeDay) {
                    reorderNodes(activeDay.id, dragNodeId, nodeId, dragOverPosition || 'bottom');
                }
                handleDragEnd();
            };

            // --- 子節點操作 ---
            const addChildNode = (dayId, nodeId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : {
                            ...n, children: [...(n.children || []), { id: generateId(), title: "子方案", type: "activity", subtasks: [] }]
                        })
                    })
                }));
            };

            const updateChildTitle = (dayId, nodeId, childId, title) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : {
                            ...n, children: (n.children || []).map(c => c.id !== childId ? c : { ...c, title })
                        })
                    })
                }));
            };

            const deleteChildNode = (dayId, nodeId, childId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : {
                            ...n, children: (n.children || []).filter(c => c.id !== childId)
                        })
                    })
                }));
            };

            const addChildSubtask = (dayId, nodeId, childId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : {
                            ...n, children: (n.children || []).map(c => c.id !== childId ? c : {
                                ...c, subtasks: [...c.subtasks, { id: generateId(), text: "預估 0 分鐘", type: "transit" }]
                            })
                        })
                    })
                }));
            };

            const updateChildSubtaskText = (dayId, nodeId, childId, subtaskId, text) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : {
                            ...n, children: (n.children || []).map(c => c.id !== childId ? c : {
                                ...c, subtasks: c.subtasks.map(s => s.id !== subtaskId ? s : { ...s, text })
                            })
                        })
                    })
                }));
            };

            const deleteChildSubtask = (dayId, nodeId, childId, subtaskId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : {
                            ...n, children: (n.children || []).map(c => c.id !== childId ? c : {
                                ...c, subtasks: c.subtasks.filter(s => s.id !== subtaskId)
                            })
                        })
                    })
                }));
            };

            // --- 行前清單操作 ---
            const currentChecklists = activePlan?.checklists || [];

            const addChecklistCategory = () => {
                updatePlans(p => ({
                    ...p,
                    checklists: [...(p.checklists || []), { id: generateId(), category: "新分類", items: [] }]
                }));
            };

            const updateChecklistCategory = (categoryId, newCategoryName) => {
                updatePlans(p => ({
                    ...p,
                    checklists: (p.checklists || []).map(c => c.id !== categoryId ? c : { ...c, category: newCategoryName })
                }));
            };

            const deleteChecklistCategory = (categoryId) => {
                updatePlans(p => ({
                    ...p,
                    checklists: (p.checklists || []).filter(c => c.id !== categoryId)
                }));
            };

            const addChecklistItem = (categoryId) => {
                updatePlans(p => ({
                    ...p,
                    checklists: (p.checklists || []).map(c => c.id !== categoryId ? c : {
                        ...c, items: [...c.items, { id: generateId(), text: "", isChecked: false }]
                    })
                }));
            };

            const updateChecklistItem = (categoryId, itemId, updates) => {
                updatePlans(p => ({
                    ...p,
                    checklists: (p.checklists || []).map(c => c.id !== categoryId ? c : {
                        ...c, items: c.items.map(i => i.id !== itemId ? i : { ...i, ...updates })
                    })
                }));
            };

            const deleteChecklistItem = (categoryId, itemId) => {
                updatePlans(p => ({
                    ...p,
                    checklists: (p.checklists || []).map(c => c.id !== categoryId ? c : {
                        ...c, items: c.items.filter(i => i.id !== itemId)
                    })
                }));
            };

            // 計算核對清單進度 (排除純文字備註)
            const getChecklistProgress = () => {
                if (!currentChecklists.length) return 0;
                let total = 0;
                let checked = 0;
                currentChecklists.forEach(c => {
                    c.items.forEach(i => {
                        if (!i.isNote) { // 只有非備註項目才計入進度
                            total++;
                            if (i.isChecked) checked++;
                        }
                    });
                });
                return total === 0 ? 0 : Math.round((checked / total) * 100);
            };

            // 匯出/匯入 JSON
            const exportJSON = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href",     dataStr);
                downloadAnchorNode.setAttribute("download", "osaka_trip_plan.json");
                document.body.appendChild(downloadAnchorNode);

            // --- PDF 設定 Modal ---

            // --- 匯出共用：樣式對照表 ---

            const EXPORT_MEMO_COLORS = {

                'bg-green-200':  { bg: '#dcfce7', border: '#86efac', text: '#166534', titleBg: '#86efac' },
                'bg-purple-200': { bg: '#f3e8ff', border: '#c4b5fd', text: '#6b21a8', titleBg: '#c4b5fd' },
                'bg-orange-200': { bg: '#ffedd5', border: '#fdba74', text: '#9a3412', titleBg: '#fdba74' }

            const EXPORT_DEFAULT_MEMO = EXPORT_MEMO_COLORS['bg-yellow-200'];

            // --- 共用：建立備忘錄卡片 ---
            const buildMemoCard = (m, compact) => {

                mText.textContent = m.text;
                mBody.appendChild(mText);
                if (m.image) {
                    const img = document.createElement('img');
                    img.src = m.image;
                    img.style.cssText = `max-width:${compact ? '140px' : '200px'};max-height:${compact ? '70px' : '100px'};margin-top:6px;border-radius:4px;border:1px solid ${ms.border};`;
                    mBody.appendChild(img);
                }
                mCard.appendChild(mBody);
                return mCard;

            // --- 共用：建立單天匯出 DOM ---
            const buildDayContainer = (plan, day, dayIndex, containerWidth) => {
                const container = document.createElement('div');
                // 加入 page-break-after: always 原生列印換頁
                container.style.cssText = `width:${containerWidth}px;background:#fff;padding:32px 32px 20px 32px;font-family:'Segoe UI',Tahoma,sans-serif;box-sizing:border-box;page-break-after:always;break-after:always;`;

                // 計算方案總花費
                const planExpensesHtml = Object.entries(
                    plan.days.flatMap(d => d.nodes).reduce((acc, node) => {
                        if (node.cost && node.currency) {
                            const val = Number(node.cost);
                            if (!isNaN(val)) {
                                acc[node.currency] = (acc[node.currency] || 0) + val;
                            }
                        }
                        return acc;
                    }, {})
                ).map(([currency, total]) => `<span style="margin-left:8px;font-size:12px;color:#cbd5e1;">${currency} <span style="font-size:14px;color:#fcd34d;font-weight:bold;font-family:monospace;">${total.toLocaleString()}</span></span>`).join('');

                const expenseHeaderHtml = planExpensesHtml ? `<div style="display:flex;align-items:center;"><span style="font-size:12px;color:#94a3b8;margin-right:2px;">💰 方案總花費:</span>${planExpensesHtml}</div>` : '';

                // 方案標題
                const planHeader = document.createElement('div');
                planHeader.style.cssText = 'background:linear-gradient(135deg,#1e293b 0%,#334155 100%);color:#fff;padding:10px 16px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center;';
                planHeader.innerHTML = `<div style="font-size:15px;font-weight:bold;letter-spacing:0.5px;">✈️ ${plan.name}</div>${expenseHeaderHtml}`;
                container.appendChild(planHeader);

                // 天數標題與單日花費
                const dayHeader = document.createElement('div');
                dayHeader.style.cssText = 'background:linear-gradient(135deg,#f1f5f9 0%,#e2e8f0 100%);padding:12px 16px;border-radius:0 0 8px 8px;margin-bottom:20px;border:1px solid #e2e8f0;border-top:none;display:flex;justify-content:space-between;align-items:flex-start;';
                
                // 計算單日總花費
                const dayExpensesHtml = Object.entries(
                    day.nodes.reduce((acc, node) => {
                        if (node.cost && node.currency) {
                            const val = Number(node.cost);
                            if (!isNaN(val)) {
                                acc[node.currency] = (acc[node.currency] || 0) + val;
                            }
                        }
                        return acc;
                    }, {})
                ).map(([currency, total]) => `<span style="margin-left:8px;font-size:12px;color:#64748b;">${currency} <span style="font-size:14px;color:#0f172a;font-weight:bold;font-family:monospace;">${total.toLocaleString()}</span></span>`).join('');
                
                const dayExpenseHeaderHtml = dayExpensesHtml ? `<div style="display:flex;align-items:center;background:#fff;padding:4px 8px;border-radius:6px;border:1px solid #cbd5e1;"><span style="font-size:11px;color:#64748b;margin-right:2px;font-weight:bold;">單日花費:</span>${dayExpensesHtml}</div>` : '';

                // 新增：天氣與選單統計
                const wIcon = day.weather?.condition ? (WEATHER_CONDITIONS.find(w => w.value === day.weather.condition) || {}).icon : '';
                const weatherHtml = day.weather?.condition ? `<div style="display:inline-flex;align-items:center;gap:6px;background:#eff6ff;padding:4px 10px;border-radius:12px;font-size:12px;color:#3b82f6;border:1px solid #bfdbfe;margin-top:6px;">${wIcon} ${day.weather.tempHigh ? day.weather.tempHigh + '°C' : ''}${day.weather.tempLow ? ' / ' + day.weather.tempLow + '°C' : ''}</div>` : '';

                const nodeCount = day.nodes.length;
                const typeCounts = day.nodes.reduce((acc, n) => { acc[n.type] = (acc[n.type] || 0) + 1; return acc; }, {});

                const subProgress = subTotal === 0 ? 0 : Math.round((subDone / subTotal) * 100);
                const dayMemosCount = day.memos ? day.memos.length : 0;
                const statsHtml = `<div style="display:flex;gap:12px;font-size:11px;color:#64748b;margin-top:8px;">
                    <span style="display:flex;align-items:center;gap:4px;"><span style="font-size:12px;">📌</span>${nodeCount} 節點</span>
                    ${Object.entries(typeCounts).map(([type, count]) => `<span style="display:flex;align-items:center;gap:4px;">${(NODE_STYLES[type] || DEFAULT_NODE_STYLE).icon} ${count}</span>`).join('')}
                    ${subTotal > 0 ? `<span style="display:flex;align-items:center;gap:4px;"><span style="font-size:12px;">✅</span>任務 ${subProgress}%</span>` : ''}
                    ${dayMemosCount > 0 ? `<span style="display:flex;align-items:center;gap:4px;"><span style="font-size:12px;">🗒️</span>${dayMemosCount} 備忘</span>` : ''}
                </div>`;

                dayHeader.innerHTML = `
                    <div>

                        ${weatherHtml}
                        ${statsHtml}

                `;
                container.appendChild(dayHeader);

                day.nodes.forEach((node) => {
