<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 旅遊動態規劃系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (改用 cdnjs 提高本地檔案相容性) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <!-- FontAwesome Icons (取代 Lucide，避免 React DOM 衝突) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <!-- html2canvas + jsPDF (PDF 匯出) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .timeline-line { position: absolute; left: 1.25rem; top: 0; bottom: 0; width: 2px; background-color: #cbd5e1; z-index: 0; }
        .memo-drag-handle { cursor: grab; }
        .memo-drag-handle:active { cursor: grabbing; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 自動增高 textarea */
        .auto-resize-textarea {
            overflow: hidden;
            resize: none;
            min-height: 1.5em;
        }
        /* 子節點水平捲動區 */
        .children-scroll::-webkit-scrollbar { height: 4px; }
        .children-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        /* 色票圓點 */
        .color-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
        .color-dot:hover, .color-dot.active { border-color: rgba(0,0,0,0.5); }
        /* 備忘錄圖片 */
        .memo-image { max-width: 100%; max-height: 120px; object-fit: cover; border-radius: 4px; }
        /* 拖曳排序 */
        .node-drag-handle { cursor: grab; color: #94a3b8; transition: color 0.15s; }
        .node-drag-handle:hover { color: #475569; }
        .node-drag-handle:active { cursor: grabbing; }
        .node-dragging { opacity: 0.4; }
        .node-drag-over { box-shadow: 0 -3px 0 0 #3b82f6; }
        .node-drag-over-bottom { box-shadow: 0 3px 0 0 #3b82f6; }
        /* 備忘錄調整大小把手 */
        .memo-resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.15) 50%);
            border-radius: 0 0 6px 0;
        }
        .memo-resize-handle:hover {
            background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.3) 50%);
        }
        /* 時間選擇器優化 */
        input[type="time"] { 
            appearance: none; 
            -moz-appearance: textfield;
            font-family: inherit;
        }
        input[type="time"]::-webkit-datetime-edit {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        input[type="time"]::-webkit-datetime-edit-ampm-field {
            font-size: 0.8em;
            margin-bottom: -2px;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- 防呆提示：如果在編譯前看到這個，代表腳本還在載入或被阻擋 -->
        <div style="text-align: center; margin-top: 20vh; color: #64748b; font-family: sans-serif;">
            <h2 style="font-size: 1.5rem; margin-bottom: 10px;">系統載入中，請稍候...</h2>
            <p>如果畫面持續停留在這裡，請確保您的網路連線正常，且瀏覽器允許執行 JavaScript。</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- 預設初始資料 ---
        const initialData = {
            plans: [
                {
                    id: "plan-a",
                    name: "我的旅程",
                    days: [
                        {
                            id: "day-1",
                            title: "第一天",
                            subtitle: "美好的開始",
                            nodes: [
                                { id: "n1", title: "抵達機場", type: "location", time: "10:00", tags: "第一站", subtasks: [], children: [] },
                                { id: "n2", title: "飯店 Check-in", type: "hotel", time: "15:00", tags: "住宿", subtasks: [], children: [] }
                            ],
                            memos: [
                                { id: "memo-1", x: 50, y: 250, width: 224, height: null, title: "教學小提示", text: "您可以自由拖曳這個備忘錄，或點擊右上角更換顏色。也可以從右下角拖曳改變大小！", color: "bg-yellow-200", image: null, linkedNodeId: null, isMinimized: false },
                            ]
                        }
                    ],
                    checklists: [
                        { id: "cl-1", category: "文件與財務", items: [{ id: "cli-1", text: "護照 (確認效期6個月以上)", isChecked: false }, { id: "cli-2", text: "日幣現金與信用卡", isChecked: true }] },
                        { id: "cl-2", category: "電子產品", items: [{ id: "cli-3", text: "esim 網卡或 Wifi 機", isChecked: false }, { id: "cli-4", text: "行動電源與充電線", isChecked: false }] },
                        { id: "cl-3", category: "生活衣物", items: [{ id: "cli-5", text: "換洗衣物與外套", isChecked: false }, { id: "cli-6", text: "個人常備藥品", isChecked: false }] }
                    ]
                }
            ]
        };

        // --- 備忘錄可用顏色 ---
        const MEMO_COLORS = [
            { name: "bg-yellow-200", hex: "#fef08a" },
            { name: "bg-pink-200",   hex: "#fbcfe8" },
            { name: "bg-blue-200",   hex: "#bfdbfe" },
            { name: "bg-green-200",  hex: "#bbf7d0" },
            { name: "bg-purple-200", hex: "#e9d5ff" },
            { name: "bg-orange-200", hex: "#fed7aa" }
        ];

        // --- 節點可用樣式 ---
        const NODE_STYLES = {
            hotel:    { border: '#8b5cf6', bg: '#f5f3ff', icon: '🏨', label: '住宿' },
            meal:     { border: '#f59e0b', bg: '#fffbeb', icon: '🍽️', label: '餐食' },
            location: { border: '#3b82f6', bg: '#eff6ff', icon: '📍', label: '地點' },
            activity: { border: '#10b981', bg: '#ecfdf5', icon: '🎯', label: '活動' },
            transit:  { border: '#6366f1', bg: '#eef2ff', icon: '🚃', label: '交通' }
        };
        const DEFAULT_NODE_STYLE = { border: '#64748b', bg: '#f8fafc', icon: '📌', label: '其他' };

        // --- 產生隨機 ID ---
        const generateId = () => Math.random().toString(36).substr(2, 9);

        // --- 自動增高 Textarea 元件 ---
        const AutoResizeTextarea = ({ value, onChange, className, placeholder }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.style.height = 'auto';
                    ref.current.style.height = ref.current.scrollHeight + 'px';
                }
            }, [value]);
            return (
                <textarea
                    ref={ref}
                    className={`auto-resize-textarea ${className}`}
                    value={value}
                    onChange={onChange}
                    placeholder={placeholder}
                    rows={1}
                />
            );
        };

        // --- 元件：可拖曳的備忘錄 (Memo) ---
        const DraggableMemo = ({ memo, updateMemo, deleteMemo, dayNodes }) => {
            const [isDragging, setIsDragging] = useState(false);
            const [isResizing, setIsResizing] = useState(false);
            const [pos, setPos] = useState({ x: memo.x, y: memo.y });
            const [size, setSize] = useState({ width: memo.width || 224, height: memo.height || null });
            const [text, setText] = useState(memo.text);
            const [title, setTitle] = useState(memo.title || "MEMO");
            const [isMinimized, setIsMinimized] = useState(memo.isMinimized || false);
            const [showColorPicker, setShowColorPicker] = useState(false);
            const dragRef = useRef(null);
            const resizeRef = useRef(null);

            // 同步外部 props（匯入 JSON 或切換 Day 時）
            useEffect(() => {
                setPos({ x: memo.x, y: memo.y });
                setSize({ width: memo.width || 224, height: memo.height || null });
                setText(memo.text);
                setTitle(memo.title || 'MEMO');
                setIsMinimized(memo.isMinimized || false);
            }, [memo.id, memo.x, memo.y, memo.width, memo.height, memo.text, memo.title, memo.isMinimized]);

            const handlePointerDown = (e) => {
                const tag = e.target.tagName.toLowerCase();
                if (tag === 'textarea' || tag === 'button' || tag === 'input' || tag === 'label' || tag === 'select') return;
                if (e.target.closest('.color-picker-area') || e.target.closest('.memo-actions') || e.target.closest('.memo-resize-handle')) return;
                setIsDragging(true);
                dragRef.current = { startX: e.clientX, startY: e.clientY, initialX: pos.x, initialY: pos.y };
                e.target.setPointerCapture(e.pointerId);
            };

            const handlePointerMove = (e) => {
                if (!isDragging) return;
                const dx = e.clientX - dragRef.current.startX;
                const dy = e.clientY - dragRef.current.startY;
                
                const rawX = dragRef.current.initialX + dx;
                // 限制最左 (0) 與最右 (螢幕寬度減 100) 以防消失
                const newX = Math.max(0, Math.min(window.innerWidth - 100, rawX));
                
                // 限制最低 Y 軸 (130)，避免被頂部選單蓋住無法再拖曳
                const newY = Math.max(130, dragRef.current.initialY + dy); 
                setPos({ x: newX, y: newY });
            };

            const handlePointerUp = (e) => {
                if (!isDragging) return;
                setIsDragging(false);
                updateMemo(memo.id, { ...memo, x: pos.x, y: pos.y, text, title, isMinimized });
                e.target.releasePointerCapture(e.pointerId);
            };

            // --- Resize handlers ---
            const handleResizeDown = (e) => {
                e.stopPropagation();
                setIsResizing(true);
                resizeRef.current = { startX: e.clientX, startY: e.clientY, initialW: size.width, initialH: e.target.closest('.memo-card').offsetHeight };
                e.target.setPointerCapture(e.pointerId);
            };

            const handleResizeMove = (e) => {
                if (!isResizing) return;
                const dw = e.clientX - resizeRef.current.startX;
                const dh = e.clientY - resizeRef.current.startY;
                const newW = Math.max(180, resizeRef.current.initialW + dw);
                const newH = Math.max(120, resizeRef.current.initialH + dh);
                setSize({ width: newW, height: newH });
            };

            const handleResizeUp = (e) => {
                if (!isResizing) return;
                setIsResizing(false);
                updateMemo(memo.id, { ...memo, width: size.width, height: size.height });
                e.target.releasePointerCapture(e.pointerId);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    updateMemo(memo.id, { ...memo, image: ev.target.result });
                };
                reader.readAsDataURL(file);
            };

            const removeImage = () => {
                updateMemo(memo.id, { ...memo, image: null });
            };

            return (
                <div 
                    className={`memo-card absolute shadow-lg rounded-md overflow-visible ${memo.color} border border-black/10`}
                    style={{ 
                        left: pos.x, 
                        top: pos.y, 
                        width: size.width, 
                        height: isMinimized ? 'auto' : (size.height || 'auto'), 
                        zIndex: (isDragging || isResizing) ? 20 : 10, 
                        display: 'flex', 
                        flexDirection: 'column' 
                    }}
                >
                    {/* 拖曳把手 + 標題 */}
                    <div 
                        className="bg-black/10 memo-drag-handle flex justify-between items-center px-2 py-1"
                        onPointerDown={handlePointerDown}
                        onPointerMove={handlePointerMove}
                        onPointerUp={handlePointerUp}
                        onPointerCancel={handlePointerUp}
                    >
                        <input 
                            className="text-xs font-bold text-black/60 bg-transparent border-none focus:outline-none focus:bg-white/40 rounded px-1 w-24"
                            value={title}
                            onChange={(e) => {
                                setTitle(e.target.value);
                                updateMemo(memo.id, { ...memo, title: e.target.value });
                            }}
                            placeholder="標題..."
                        />
                        <div className="memo-actions flex items-center gap-1">
                            <button onClick={() => setShowColorPicker(!showColorPicker)} className="text-black/50 hover:text-black/80 text-xs p-0.5" title="選擇顏色">
                                <i className="fas fa-palette"></i>
                            </button>
                            <label className="text-black/50 hover:text-blue-600 text-xs cursor-pointer p-0.5" title="新增圖片">
                                <i className="fas fa-image"></i>
                                <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                            </label>
                            <button 
                                onClick={() => {
                                    const nextState = !isMinimized;
                                    setIsMinimized(nextState);
                                    updateMemo(memo.id, { ...memo, isMinimized: nextState });
                                }} 
                                className="text-black/50 hover:text-black/80 text-xs p-0.5" 
                                title={isMinimized ? "展開" : "收合"}
                            >
                                <i className={`fas ${isMinimized ? 'fa-chevron-down' : 'fa-chevron-up'}`}></i>
                            </button>
                            <button onClick={() => deleteMemo(memo.id)} className="text-black/50 hover:text-red-600 text-xs p-0.5" title="刪除">
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                    </div>

                    {/* 色票選擇列 (只有展開時顯示) */}
                    {!isMinimized && showColorPicker && (
                        <div className="color-picker-area flex gap-1.5 px-2 py-1.5 bg-white/50 border-b border-black/5">
                            {MEMO_COLORS.map(c => (
                                <div
                                    key={c.name}
                                    className={`color-dot ${memo.color === c.name ? 'active' : ''}`}
                                    style={{ backgroundColor: c.hex }}
                                    onClick={() => {
                                        updateMemo(memo.id, { ...memo, color: c.name });
                                        setShowColorPicker(false);
                                    }}
                                />
                            ))}
                        </div>
                    )}

                    {/* 當未收合時顯示下列內容 */}
                    {!isMinimized && (
                        <>
                            {/* 文字內容 */}
                            <textarea 
                                className="w-full p-2 bg-transparent resize-none focus:outline-none text-sm text-gray-800"
                                style={{ flex: size.height ? 1 : undefined, minHeight: size.height ? 0 : '5rem', height: size.height ? undefined : '5rem' }}
                                value={text}
                                onChange={(e) => {
                                    setText(e.target.value);
                                    updateMemo(memo.id, { ...memo, text: e.target.value });
                                }}
                                placeholder="輸入備忘錄..."
                            />

                            {/* 圖片區 */}
                            {memo.image && (
                                <div className="px-2 pb-2 relative group">
                                    <img src={memo.image} alt="備忘錄圖片" className="memo-image" />
                                    <button 
                                        onClick={removeImage}
                                        className="absolute top-1 right-3 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow"
                                    >
                                        <i className="fas fa-times"></i>
                                    </button>
                                </div>
                            )}

                            {/* 勾稽節點選擇器 */}
                            <div className="px-2 py-1.5 border-t border-black/5 bg-white/30">
                                <select
                                    className="w-full text-xs bg-white/60 border border-black/10 rounded px-1.5 py-1 focus:outline-none focus:ring-1 focus:ring-blue-300"
                                    value={memo.linkedNodeId || ''}
                                    onChange={(e) => {
                                        updateMemo(memo.id, { ...memo, linkedNodeId: e.target.value || null });
                                    }}
                                >
                                    <option value="">🔗 無勾稽節點</option>
                                    {(dayNodes || []).map(n => (
                                        <option key={n.id} value={n.id}>└ {n.title}</option>
                                    ))}
                                </select>
                            </div>

                            {/* 調整大小把手 */}
                            <div
                                className="memo-resize-handle"
                                onPointerDown={handleResizeDown}
                                onPointerMove={handleResizeMove}
                                onPointerUp={handleResizeUp}
                                onPointerCancel={handleResizeUp}
                                title="拖曳調整大小"
                            />
                        </>
                    )}
                </div>
            );
        };

        // --- 主應用程式元件 ---
        const App = () => {
            const [data, setData] = useState(initialData);
            const [activePlanId, setActivePlanId] = useState(data.plans[0]?.id);
            // activeDayId 如果為 'checklist'，則代表目前正停留在「行前清單」分頁
            const [activeDayId, setActiveDayId] = useState('checklist');
            const [showCorkboard, setShowCorkboard] = useState(false);

            // 確保有活動方案
            const activePlan = data.plans.find(p => p.id === activePlanId) || data.plans[0];
            const activeDay = activePlan?.days.find(d => d.id === activeDayId) || null;

            // --- 拖曳排序狀態 ---
            const [dragNodeId, setDragNodeId] = useState(null);
            const [dragOverNodeId, setDragOverNodeId] = useState(null);
            const [dragOverPosition, setDragOverPosition] = useState(null); // 'top' | 'bottom'

            // --- 跨天轉移/互換狀態 ---
            const [isSwappingDay, setIsSwappingDay] = useState(false);
            const [dayToSwap, setDayToSwap] = useState(null);

            // 切換方案時自動選中行前清單
            const switchPlan = (planId) => {
                setActivePlanId(planId);
                setActiveDayId('checklist');
            };

            // 備忘錄操作（綁定至當前天數）
            const currentMemos = activeDay?.memos || [];

            const addMemo = () => {
                if (!activeDay) return;
                const newMemo = {
                    id: generateId(),
                    x: Math.random() * 200 + 50,
                    y: Math.random() * 200 + 100,
                    title: "MEMO",
                    text: "新備忘錄",
                    color: MEMO_COLORS[Math.floor(Math.random() * MEMO_COLORS.length)].name,
                    image: null,
                    linkedNodeId: null,
                    width: 224,
                    height: null
                };
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== activeDay.id ? d : {
                        ...d, memos: [...(d.memos || []), newMemo]
                    })
                }));
            };
            const updateMemo = (id, updated) => {
                if (!activeDay) return;
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== activeDay.id ? d : {
                        ...d, memos: (d.memos || []).map(m => m.id === id ? updated : m)
                    })
                }));
            };
            const deleteMemo = (id) => {
                if (!activeDay) return;
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== activeDay.id ? d : {
                        ...d, memos: (d.memos || []).filter(m => m.id !== id)
                    })
                }));
            };

            // 方案操作
            const addPlan = () => {
                const newPlan = { id: generateId(), name: `新方案 ${data.plans.length + 1}`, days: [] };
                setData({ ...data, plans: [...data.plans, newPlan] });
                setActivePlanId(newPlan.id);
                setActiveDayId(null);
            };

            // 天數操作
            const addDay = () => {
                if (!activePlan) return;
                const newDay = { id: generateId(), title: `Day ${activePlan.days.length + 1}`, subtitle: '', nodes: [], memos: [] };
                const updatedPlans = data.plans.map(p => {
                    if (p.id === activePlan.id) return { ...p, days: [...p.days, newDay] };
                    return p;
                });
                setData({ ...data, plans: updatedPlans });
                setActiveDayId(newDay.id);
            };

            const deletePlan = (planId) => {
                if (data.plans.length <= 1) {
                    alert("方案至少需要保留一個！");
                    return;
                }
                if (window.confirm("確定要刪除這個方案嗎？這個動作無法復原。")) {
                    const newPlans = data.plans.filter(p => p.id !== planId);
                    setData({ ...data, plans: newPlans });
                    if (activePlanId === planId) {
                        setActivePlanId(newPlans[0].id);
                        setActiveDayId(newPlans[0].days[0]?.id || null);
                    }
                }
            };

            const deleteDay = (dayId) => {
                if (!activePlan) return;
                if (activePlan.days.length <= 1) {
                    alert("方案至少需要保留一天行程！");
                    return;
                }
                if (window.confirm("確定要刪除這天的行程嗎？這個動作無法復原。")) {
                    const updatedPlans = data.plans.map(p => {
                        if (p.id === activePlan.id) {
                            return { ...p, days: p.days.filter(d => d.id !== dayId) };
                        }
                        return p;
                    });
                    setData({ ...data, plans: updatedPlans });
                    if (activeDayId === dayId) {
                        const remainingDays = activePlan.days.filter(d => d.id !== dayId);
                        setActiveDayId(remainingDays[0]?.id || null);
                    }
                }
            };

            // --- 輔助函式：深層更新 plans ---
            const updatePlans = (updater) => {
                const updatedPlans = data.plans.map(p => {
                    if (p.id !== activePlan.id) return p;
                    return updater(p);
                });
                setData({ ...data, plans: updatedPlans });
            };

            // 節點操作
            const addNode = (dayId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: [...d.nodes, { id: generateId(), title: "新行程節點 (可編輯)", type: "activity", time: "", tags: "", subtasks: [], children: [] }]
                    })
                }));
            };

            const addSubtask = (dayId, nodeId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : {
                            ...n, subtasks: [...n.subtasks, { id: generateId(), text: "預估 0 分鐘", type: "transit" }]
                        })
                    })
                }));

            const updateNodeTitle = (dayId, nodeId, title) => {
                updatePlans(p => ({
                    ...p,

                    })

            const updateNodeType = (dayId, nodeId, type) => {
                updatePlans(p => ({

            const updateNodeTime = (dayId, nodeId, time) => {
                updatePlans(p => ({

            const updateNodeTags = (dayId, nodeId, tags) => {

            const updateSubtaskText = (dayId, nodeId, subtaskId, text) => {
                updatePlans(p => ({

            const updateNodeField = (dayId, nodeId, field, value) => {
                updatePlans(p => ({

            const deleteNode = (dayId, nodeId) => {

                    })

            const deleteSubtask = (dayId, nodeId, subtaskId) => {
                updatePlans(p => ({

                        })
                    })
                }));
            };

            // --- 跨天操作：節點搬移 ---
            const moveNodeToDay = (nodeId, fromDayId, toDayId) => {
                if (fromDayId === toDayId) return;
                let movedNode = null;
                
                // 1. 先把節點從原有的 Day 取出
                updatePlans(p => {
                    const fromDay = p.days.find(d => d.id === fromDayId);
                    if (fromDay) {
                        movedNode = fromDay.nodes.find(n => n.id === nodeId);
                    }
                    if (!movedNode) return p;

                    return {
                        ...p,
                        days: p.days.map(d => {
                            if (d.id === fromDayId) {
                                return { ...d, nodes: d.nodes.filter(n => n.id !== nodeId) };
                            }
                            if (d.id === toDayId) {
                                return { ...d, nodes: [...d.nodes, movedNode] };
                            }
                            return d;
                        })
                    };
                });
            };

            // --- 整天互換：交換兩天所有的行程、標題、副標題與備忘錄 ---
            const swapDays = (dayId1, dayId2) => {
                if (dayId1 === dayId2) return;
                updatePlans(p => {
                    const days = [...p.days];
                    const idx1 = days.findIndex(d => d.id === dayId1);
                    const idx2 = days.findIndex(d => d.id === dayId2);
                    if (idx1 === -1 || idx2 === -1) return p;

                    // 互換天數物件，但保留原始的 Title (Day 1, Day 2)，避免順序混亂
                    // 其他內容如 subtitle, nodes, memos 整包對調
                    const tempNodes = days[idx1].nodes;
                    const tempMemos = days[idx1].memos;
                    const tempSubtitle = days[idx1].subtitle;

                    days[idx1] = { ...days[idx1], nodes: days[idx2].nodes, memos: days[idx2].memos, subtitle: days[idx2].subtitle };
                    days[idx2] = { ...days[idx2], nodes: tempNodes, memos: tempMemos, subtitle: tempSubtitle };
                    
                    return { ...p, days };
                });
                setIsSwappingDay(false);
                setDayToSwap(null);
            };

            // --- 拖曳排序：重新排列節點 ---
            const reorderNodes = (dayId, fromId, toId, position) => {
                if (fromId === toId) return;
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => {
                        if (d.id !== dayId) return d;
                        const nodes = [...d.nodes];
                        const fromIndex = nodes.findIndex(n => n.id === fromId);
                        const toIndex = nodes.findIndex(n => n.id === toId);
                        if (fromIndex === -1 || toIndex === -1) return d;
                        const [moved] = nodes.splice(fromIndex, 1);
                        const insertAt = position === 'bottom' ? toIndex + (fromIndex < toIndex ? 0 : 1) : toIndex - (fromIndex < toIndex ? 1 : 0);
                        nodes.splice(Math.max(0, insertAt), 0, moved);
                        return { ...d, nodes };
                    })
                }));
            };

            const handleDragStart = (e, nodeId) => {
                setDragNodeId(nodeId);
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', nodeId);
            };

            const handleDragOver = (e, nodeId) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                if (nodeId === dragNodeId) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const midY = rect.top + rect.height / 2;
                setDragOverNodeId(nodeId);
                setDragOverPosition(e.clientY < midY ? 'top' : 'bottom');
            };

            const handleDragEnd = () => {
                setDragNodeId(null);
                setDragOverNodeId(null);
                setDragOverPosition(null);
            };

            const handleDrop = (e, nodeId) => {
                e.preventDefault();
                if (dragNodeId && activeDay) {
                    reorderNodes(activeDay.id, dragNodeId, nodeId, dragOverPosition || 'bottom');
                }
                handleDragEnd();
            };

            // --- 子節點操作 ---
            const addChildNode = (dayId, nodeId) => {

                        })

                        })
                    })
                }));
            };

            const deleteChildNode = (dayId, nodeId, childId) => {
                updatePlans(p => ({

                    days: p.days.map(d => d.id !== dayId ? d : {

                            ...n, children: (n.children || []).filter(c => c.id !== childId)
                        })
                    })
                }));
            };

            const addChildSubtask = (dayId, nodeId, childId) => {
                updatePlans(p => ({
                    ...p,
                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : {
                            ...n, children: (n.children || []).map(c => c.id !== childId ? c : {
                                ...c, subtasks: [...c.subtasks, { id: generateId(), text: "預估 0 分鐘", type: "transit" }]
                            })
                        })
                    })
                }));
            };

            const updateChildSubtaskText = (dayId, nodeId, childId, subtaskId, text) => {
                updatePlans(p => ({

                    days: p.days.map(d => d.id !== dayId ? d : {
                        ...d, nodes: d.nodes.map(n => n.id !== nodeId ? n : {

                                ...c, subtasks: c.subtasks.map(s => s.id !== subtaskId ? s : { ...s, text })
                            })
                        })
                    })
                }));

                                ...c, subtasks: c.subtasks.filter(s => s.id !== subtaskId)
                            })
                        })
                    })
                }));

            // --- 行前清單操作 ---
            const currentChecklists = activePlan?.checklists || [];

            const addChecklistCategory = () => {
                updatePlans(p => ({

                }));

                }));

                }));

            const addChecklistItem = (categoryId) => {

            // 計算核對清單進度

                currentChecklists.forEach(c => {
                    c.items.forEach(i => {
                        total++;
                        if (i.isChecked) checked++;
                    });
                });
                return total === 0 ? 0 : Math.round((checked / total) * 100);
            };

            // 匯出/匯入 JSON
            const exportJSON = () => {

                // 計算單日總花費

                    if (node.cost && node.currency) {
                        const costRow = document.createElement('div');
                        costRow.style.cssText = 'display:flex;justify-content:flex-end;align-items:center;margin-top:8px;padding-top:6px;border-top:1px dashed #e2e8f0;';
                        costRow.innerHTML = `
                            ${node.note ? `<span style="font-size:11px;color:#94a3b8;margin-right:8px;font-style:italic;">${node.note}</span>` : ''}
                            <span style="font-size:12px;color:#64748b;font-weight:bold;margin-right:4px;">花費: </span>
                            <span style="font-size:11px;color:#94a3b8;margin-right:2px;">${node.currency}</span>
                            <span style="font-size:14px;color:#0f172a;font-weight:bold;font-family:monospace;">${Number(node.cost).toLocaleString()}</span>
                        `;
                        card.appendChild(costRow);
                    }

                    // 子節點
                    if (node.children && node.children.length > 0) {
                        const childSection = document.createElement('div');
                        childSection.style.cssText = 'margin-top:10px;padding-top:8px;border-top:1px dashed #cbd5e1;';
                        const childRow = document.createElement('div');
                        childRow.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;';
                        node.children.forEach(child => {
                            const childCard = document.createElement('div');
                            childCard.style.cssText = `background:#fff;border:1px solid ${ns.border}50;border-left:3px solid ${ns.border};border-radius:6px;padding:8px 10px;min-width:160px;flex:1;page-break-inside:avoid;break-inside:avoid;`;
                            childCard.innerHTML = `<div style="font-size:13px;font-weight:600;color:${ns.border};margin-bottom:2px;">${child.title}</div>`;
                            child.subtasks.forEach(cs => {
                                const csEl = document.createElement('div');
                                csEl.style.cssText = 'font-size:11px;color:#64748b;margin-top:2px;padding-left:6px;border-left:2px dashed #cbd5e140;white-space:pre-wrap;';
                                csEl.textContent = cs.text;
                                childCard.appendChild(csEl);
                            });
                            childRow.appendChild(childCard);
                        });
                        childSection.appendChild(childRow);
                        card.appendChild(childSection);
                    }

                    leftCol.appendChild(card);
                    row.appendChild(leftCol);

                    // 右欄：勾稽備忘錄
                    if (linkedMemos.length > 0) {
                        const rightCol = document.createElement('div');
                        rightCol.style.cssText = 'flex:3;display:flex;flex-direction:column;gap:6px;';
                        linkedMemos.forEach(m => { rightCol.appendChild(buildMemoCard(m, true)); });
                        row.appendChild(rightCol);
                    }

                    container.appendChild(row);
                });

                // 未勾稽備忘錄
                const unlinkedMemos = dayMemos.filter(m => !m.linkedNodeId);
                if (unlinkedMemos.length > 0) {
                    const memoSection = document.createElement('div');
                    memoSection.style.cssText = 'margin-top:20px;padding-top:14px;border-top:2px dashed #94a3b8;';
                    memoSection.innerHTML = '<div style="font-size:14px;font-weight:bold;color:#475569;margin-bottom:10px;">🗒️ 其他備忘錄</div>';
                    const memoGrid = document.createElement('div');
                    memoGrid.style.cssText = 'display:flex;gap:10px;flex-wrap:wrap;';
                    unlinkedMemos.forEach(m => {
                        const wrapper = document.createElement('div');
                        wrapper.style.cssText = 'flex:1;min-width:200px;max-width:320px;page-break-inside:avoid;break-inside:avoid;';
                        wrapper.appendChild(buildMemoCard(m, false));
                        memoGrid.appendChild(wrapper);
                    });
                    memoSection.appendChild(memoGrid);
                    container.appendChild(memoSection);
                }

                // 頁尾
                const footerLine = document.createElement('div');
                footerLine.style.cssText = 'margin-top:24px;border-top:1px solid #e2e8f0;padding-top:8px;';
                footerLine.innerHTML = `<div style="font-size:11px;color:#94a3b8;text-align:center;">✈️ ${plan.name}  ·  ${day.title}${day.subtitle ? ' — ' + day.subtitle : ''}  ·  Page ${dayIndex + 1} / ${plan.days.length}</div>`;
                container.appendChild(footerLine);

                return container;
            };

            // --- 共用：建立行前清單匯出 DOM ---
            const buildChecklistContainer = (plan, containerWidth) => {
                const container = document.createElement('div');
                container.style.cssText = `width:${containerWidth}px;background:#fff;padding:32px 32px 20px 32px;font-family:'Segoe UI',Tahoma,sans-serif;box-sizing:border-box;page-break-after:always;break-after:always;`;

                // 方案標題
                const planHeader = document.createElement('div');
                planHeader.style.cssText = 'background:linear-gradient(135deg,#1e293b 0%,#334155 100%);color:#fff;padding:10px 16px;border-radius:8px 8px 0 0;';
                planHeader.innerHTML = `<div style="font-size:15px;font-weight:bold;letter-spacing:0.5px;">✈️ ${plan.name}</div>`;
                container.appendChild(planHeader);

                // 行前清單標題
                const clHeader = document.createElement('div');
                clHeader.style.cssText = 'background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);padding:12px 16px;border-radius:0 0 8px 8px;margin-bottom:20px;border:1px solid #fde68a;border-top:none;display:flex;justify-content:space-between;align-items:center;';
                
                let totalItems = 0;
                let checkedItems = 0;
                (plan.checklists || []).forEach(c => {
                    c.items.forEach(i => {
                        totalItems++;
                        if (i.isChecked) checkedItems++;
                    });
                });
                const progress = totalItems === 0 ? 0 : Math.round((checkedItems / totalItems) * 100);

                clHeader.innerHTML = `
                    <div>
                        <div style="font-size:22px;font-weight:bold;color:#78350f;">📋 行前準備清單</div>
                        <div style="font-size:13px;color:#92400e;font-weight:500;margin-top:2px;">出發前再確認一次！</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:12px;font-weight:bold;color:#92400e;margin-bottom:4px;">準備進度: ${progress}%</div>
                        <div style="width:120px;height:8px;background:#fef3c7;border-radius:4px;overflow:hidden;border:1px solid #fcd34d;">
                            <div style="height:100%;background:#f59e0b;width:${progress}%;"></div>
                        </div>
                    </div>
                `;
                container.appendChild(clHeader);
                
                if (!plan.checklists || plan.checklists.length === 0) {
                    const emptyMsg = document.createElement('div');
                    emptyMsg.style.cssText = 'text-align:center;padding:40px;color:#94a3b8;font-size:14px;';
                    emptyMsg.textContent = '此方案目前沒有任何清單項目。';
                    container.appendChild(emptyMsg);
                } else {
                    const grid = document.createElement('div');
                    // 橫式 2 欄，直式 1 欄或 2 欄
                    grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;';
                    
                    plan.checklists.forEach(cat => {
                        const catCard = document.createElement('div');
                        catCard.style.cssText = 'background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:16px;page-break-inside:avoid;break-inside:avoid;';
                        
                        const catTitle = document.createElement('div');
                        catTitle.style.cssText = 'font-size:16px;font-weight:bold;color:#1e293b;margin-bottom:12px;border-bottom:2px solid #cbd5e1;padding-bottom:6px;';
                        catTitle.textContent = '📂 ' + cat.category;
                        catCard.appendChild(catTitle);
                        
                        if (cat.items.length === 0) {
                            const emptyItem = document.createElement('div');
                            emptyItem.style.cssText = 'font-size:13px;color:#94a3b8;font-style:italic;';
                            emptyItem.textContent = '無項目';
                            catCard.appendChild(emptyItem);
                        } else {
                            cat.items.forEach(item => {
                                const itemRow = document.createElement('div');
                                itemRow.style.cssText = 'display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;';
                                
                                const checkIcon = item.isChecked ? '☑️' : '🔲';
                                const textDecoration = item.isChecked ? 'line-through' : 'none';
                                const textColor = item.isChecked ? '#94a3b8' : '#334155';
                                
                                itemRow.innerHTML = `
                                    <span style="font-size:14px;margin-top:2px;">${checkIcon}</span>
                                    <span style="font-size:14px;color:${textColor};text-decoration:${textDecoration};line-height:1.4;">${item.text}</span>
                                `;
                                catCard.appendChild(itemRow);
                            });
                        }
                        grid.appendChild(catCard);
                    });
                    
                    container.appendChild(grid);
                }

                // 頁尾
                const footerLine = document.createElement('div');
                footerLine.style.cssText = 'margin-top:24px;border-top:1px solid #e2e8f0;padding-top:8px;';
                footerLine.innerHTML = `<div style="font-size:11px;color:#94a3b8;text-align:center;">✈️ ${plan.name}  ·  行前清單</div>`;
                container.appendChild(footerLine);

                return container;
            };

            // --- 匯出 HTML 預覽 ---
            const exportHTML = (settings) => {
                if (!activePlan || activePlan.days.length === 0) {
                    alert('當前方案沒有任何天數可匯出');
                    return;
                }
                setShowPdfSettings(false);

                const isLandscape = settings && settings.orientation === 'landscape';
                const containerWidth = isLandscape ? 1100 : 800;

                const pages = [];
                
                // 新增行前清單到第一頁（如果有開啟或有項目）
                if (activePlan.checklists && activePlan.checklists.length > 0) {
                    const clContainer = buildChecklistContainer(activePlan, containerWidth);
                    clContainer.style.cssText += 'margin:0 auto 40px auto;box-shadow:0 2px 12px rgba(0,0,0,0.1);border-radius:8px;';
                    pages.push(clContainer.outerHTML);
                }

                for (let i = 0; i < activePlan.days.length; i++) {
                    const container = buildDayContainer(activePlan, activePlan.days[i], i, containerWidth);
                    // 加入分頁間距
                    container.style.cssText += 'margin:0 auto 40px auto;box-shadow:0 2px 12px rgba(0,0,0,0.1);border-radius:8px;';
                    pages.push(container.outerHTML);
                }

                const html = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${activePlan.name} — 旅遊規劃預覽</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e2e8f0; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 40px 20px; }
        @media print { 
            body { background: #fff; padding: 0; }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>
${pages.join('\n')}
</body>
</html>`;

                const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${activePlan.name}_旅遊規劃_預覽.html`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            };

            // --- 匯出 PDF (原生列印版) ---
            const exportPDF = (settings) => {
                if (!activePlan || activePlan.days.length === 0) {
                    alert('當前方案沒有任何天數可匯出');
                    return;
                }
                setShowPdfSettings(false);
                setIsExporting(true);

                const isLandscape = settings && settings.orientation === 'landscape';
                const containerWidth = isLandscape ? 1100 : 800;
                const margin = Number(settings.margin || 10);

                const pages = [];
                
                // 新增行前清單到 PDF 第一頁
                if (activePlan.checklists && activePlan.checklists.length > 0) {
                    const clContainer = buildChecklistContainer(activePlan, containerWidth);
                    clContainer.style.cssText += 'margin:0 auto;'; 
                    pages.push(clContainer.outerHTML);
                }

                for (let i = 0; i < activePlan.days.length; i++) {
                    const container = buildDayContainer(activePlan, activePlan.days[i], i, containerWidth);
                    container.style.cssText += 'margin:0 auto;'; 
                    pages.push(container.outerHTML);
                }

                // 根據方向設定列印 @page
                const cssBoxPage = isLandscape 
                    ? `@page { size: landscape; margin: ${margin}mm; }`
                    : `@page { size: portrait; margin: ${margin}mm; }`;

                const html = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>${activePlan.name}_旅遊規劃_${isLandscape ? '橫式' : '直式'}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; }
        @media print { 
            ${cssBoxPage}
            body { background: #fff; padding: 0; margin: 0; }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>
${pages.join('\n')}
<script>
    window.onload = function() {
        setTimeout(function() {
            window.print();
        }, 500);
    };
<\/script>
</body>
</html>`;

                const printWindow = window.open('', '_blank');
                if (printWindow) {
                    printWindow.document.open();
                    printWindow.document.write(html);
                    printWindow.document.close();
                } else {
                    alert('無法開啟列印視窗，請檢查是否被瀏覽器彈出視窗攔截器阻擋');
                }
                setIsExporting(false);
            };

            /* 原本的 html2canvas + jsPDF 版本 (保留供參考)
            const exportPDF_Old = async (settings) => {
                if (!activePlan || activePlan.days.length === 0) {
                    alert('當前方案沒有任何天數可匯出');
                    return;
                }
                setShowPdfSettings(false);
                setIsExporting(true);

                try {
                    const { jsPDF } = window.jspdf;
                    const fmt = PDF_FORMATS[settings.format] || PDF_FORMATS.a4;
                    const isLandscape = settings.orientation === 'landscape';
                    const pageWidth = isLandscape ? fmt.h : fmt.w;
                    const pageHeight = isLandscape ? fmt.w : fmt.h;
                    const margin = Number(settings.margin) || 10;
                    const contentWidth = pageWidth - margin * 2;
                    const containerWidth = isLandscape ? 1100 : 800;

                    const pdf = new jsPDF({ orientation: settings.orientation, unit: 'mm', format: settings.format });

                    for (let i = 0; i < activePlan.days.length; i++) {
                        const day = activePlan.days[i];
                        if (i > 0) pdf.addPage();

                        const container = buildDayContainer(activePlan, day, i, containerWidth);
                        container.style.cssText += 'position:absolute;left:-9999px;top:0;';

                        document.body.appendChild(container);

                        const images = container.querySelectorAll('img');
                        if (images.length > 0) {
                            await Promise.all(Array.from(images).map(img => {
                                if (img.complete) return Promise.resolve();
                                return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
                            }));
                        }

                        const canvas = await html2canvas(container, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
                        document.body.removeChild(container);

                        const imgData = canvas.toDataURL('image/jpeg', 0.92);
                        const imgWidth = contentWidth;
                        const imgHeight = (canvas.height * imgWidth) / canvas.width;

                        const maxHeight = pageHeight - margin * 2;
                        if (imgHeight > maxHeight) {
                            const scale = maxHeight / imgHeight;
                            pdf.addImage(imgData, 'JPEG', margin, margin, imgWidth * scale, maxHeight);
                        } else {
                            pdf.addImage(imgData, 'JPEG', margin, margin, imgWidth, imgHeight);
                        }
                    }

                    pdf.save(`${activePlan.name}_旅遊規劃.pdf`);
                } catch (err) {
                    console.error('PDF 匯出失敗:', err);
                    alert('PDF 匯出失敗，請查看主控台');
                } finally {

                }
            };
            */

            const importJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData.plans) {
                            // 正規化資料：確保每個 day 有 memos/subtitle，每個 memo 有完整欄位
                            const normalized = {
                                ...importedData,
                                plans: importedData.plans.map(plan => ({
                                    ...plan,
                                    days: (plan.days || []).map(day => ({
                                        ...day,
                                        subtitle: day.subtitle || '',
                                        memos: (day.memos || []).map(m => ({
                                            x: 50, y: 150, width: 224, height: null,
                                            title: 'MEMO', text: '', color: 'bg-yellow-200',
                                            image: null, linkedNodeId: null,
                                            ...m
                                        })),
                                        nodes: (day.nodes || []).map(n => ({
                                            ...n,
                                            time: n.time || '',
                                            tags: n.tags || '',
                                            children: n.children || [],
                                            subtasks: n.subtasks || []
                                        }))
                                    })),
                                    checklists: plan.checklists || []
                                }))
                            };
                            setData(normalized);
                            setActivePlanId(normalized.plans[0]?.id);
                            setActiveDayId(normalized.plans[0]?.days[0]?.id || null);
                            alert("資料匯入成功！");
                        } else {
                            alert("無效的 JSON 結構");
                        }
                    } catch (err) {
                        alert("解析 JSON 失敗");
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; // 重置 file input，允許重複匯入同一檔案
            };

            return (
                <div className="min-h-screen relative pb-20">
                    {/* --- 浮動備忘錄（綁定至當前天數） --- */}
                    {currentMemos.map(memo => (
                        <DraggableMemo key={memo.id} memo={memo} updateMemo={updateMemo} deleteMemo={deleteMemo} dayNodes={activeDay?.nodes || []} />
                    ))}

                    {/* --- 頂部統計指標與設定區 --- */}
    <header className="bg-slate-800 text-slate-100 p-3 sm:p-4 shadow-lg sticky top-0 z-40">
        <div className="max-w-6xl mx-auto flex flex-col lg:flex-row justify-between items-center lg:items-start gap-4">
            {/* 左側：Logo 標題 */}
            <div className="w-full lg:w-auto text-center lg:text-left shrink-0">
                <h1 className="text-xl sm:text-2xl font-black tracking-tight text-white flex items-center justify-center lg:justify-start gap-2">
                    <i className="fas fa-plane-departure text-blue-400"></i>
                    TravelItinerary_Pro
                    <span className="bg-blue-500 text-[10px] px-1.5 py-0.5 rounded ml-2">v3.0</span>
                </h1>
                <p className="text-xs text-slate-400 mt-1">拖曳備忘錄、新增節點、跨日排序與追蹤預算</p>
            </div>
            
            {/* 右側：上下分區 (上：花費，下：按鈕) */}
            <div className="flex flex-col items-center lg:items-end gap-3 w-full lg:w-auto flex-1">
                {/* --- 全域預算統計看板 --- */}
                {activePlan && (
                    <div className="flex items-center gap-4 bg-slate-900/60 rounded-xl px-4 py-2 border border-slate-700/50 shadow-inner w-full lg:w-auto justify-center lg:justify-start overflow-x-auto hide-scrollbar">
                        <div className="text-xs text-slate-400 flex items-center font-medium gap-2 border-r border-slate-700 pr-4 shrink-0">
                            <div className="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-blue-400 shadow-sm border border-slate-700">
                                <i className="fas fa-wallet text-sm"></i>
                            </div>
                            <span className="leading-tight text-blue-300">方案<br/>總花費</span>
                        </div>
                        <div className="flex gap-4 min-w-[120px] flex-nowrap items-center">
                            {Object.entries(
                                activePlan.days.flatMap(d => d.nodes).reduce((acc, node) => {
                                    if (node.cost && node.currency) {
                                        acc[node.currency] = (acc[node.currency] || 0) + Number(node.cost);
                                    }
                                    return acc;
                                }, {})
                            ).map(([currency, total]) => (
                                <div key={currency} className="flex items-baseline gap-1.5 shrink-0 bg-blue-900/20 px-2 py-1 rounded">
                                    <span className="text-[10px] font-bold text-blue-300">{currency}</span>
                                    <span className="text-base font-bold font-mono text-white tracking-tight">{total.toLocaleString()}</span>
                                </div>
                            ))}
                            {activePlan.days.flatMap(d => d.nodes).filter(n => n.cost && n.currency).length === 0 && (
                                <span className="text-slate-500 text-xs italic flex items-center h-full shrink-0">尚未新增花費</span>
                            )}
                        </div>
                    </div>
                )}

                {/* --- 按鈕列 --- */}
                <div className="flex gap-2 relative flex-wrap justify-center lg:justify-end w-full lg:w-auto">
                    <button onClick={() => setShowCorkboard(true)} className="bg-purple-600 hover:bg-purple-500 text-white px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0">
                        <i className="fas fa-thumbtack"></i> 備忘錄黑板
                    </button>
                    <button onClick={addMemo} className="bg-yellow-500 hover:bg-yellow-600 text-slate-900 px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0">
                        <i className="fas fa-sticky-note"></i> 新增備忘錄
                    </button>

                    <button 
                        onClick={activeDayId === 'checklist' ? () => alert('行前清單模式下無法儲存為圖片，請切換至一般行程') : exportHTML} 
                        className={`px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0 ${activeDayId === 'checklist' ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100'}`}
                    >
                        <i className="fas fa-camera"></i> 儲存為圖片
                    </button>

                    <label className="bg-slate-600 hover:bg-slate-500 cursor-pointer text-white px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0">
                        <i className="fas fa-upload"></i> 匯入
                        <input type="file" accept=".json" onChange={importJSON} className="hidden" />
                    </label>
                    <button onClick={exportJSON} className="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0">
                        <i className="fas fa-download"></i> 匯出 JSON
                    </button>
                    <button 
                        onClick={activeDayId === 'checklist' ? () => alert('行前清單模式下無法匯出 PDF，請切換至一般行程') : () => setShowPdfSettings(true)} 
                        disabled={isExporting || activeDayId === 'checklist'} 
                        className={`px-3 py-1.5 rounded text-sm font-semibold shadow flex items-center gap-1 shrink-0 ${activeDayId === 'checklist' ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : isExporting ? 'bg-slate-500 text-white cursor-wait' : 'bg-red-600 hover:bg-red-500 text-white'}`}
                    >
                        <i className={`fas ${isExporting ? 'fa-spinner fa-spin' : 'fa-file-pdf'}`}></i> {isExporting ? '產生中...' : '匯出 PDF'}
                    </button>
                </div>
            </div>
        </div>
    </header>
