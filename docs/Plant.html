                                                normalizeExpenseItems(node).filter(e => e.expenseStatus !== 'estimated' && Number(e.amount || 0) > 0)
                                            )
                                        );
                                        
                                        if (allExpenses.length === 0) {
                                            return (
                                                <div className="text-center text-slate-400 font-medium py-20 col-span-full">
                                                    此方案目前沒有任何開銷記錄
                                                </div>
                                            );
                                        }
                                        
                                        // 按貨幣分組
                                        const expensesByCurrency = {};
                                        allExpenses.forEach(exp => {
                                            const curr = exp.currency || 'TWD';
                                            if (!expensesByCurrency[curr]) expensesByCurrency[curr] = [];
                                            expensesByCurrency[curr].push(exp);
                                        });
                                        
                                        return (
                                            <div className="space-y-8 max-w-4xl mx-auto">
                                                {Object.entries(expensesByCurrency).sort((a, b) => b[1].reduce((sum, e) => sum + Number(e.amount || 0), 0) - a[1].reduce((sum, e) => sum + Number(e.amount || 0), 0)).map(([currency, expenses]) => {
                                                    const total = expenses.reduce((sum, e) => sum + Number(e.amount || 0), 0);
                                                    
                                                    // 按類別分組
                                                    const categories = {};
                                                    expenses.forEach(exp => {
                                                        const cat = EXPENSE_CATEGORIES[exp.category] || exp.category || '其他';
                                                        if (!categories[cat]) categories[cat] = [];
                                                        categories[cat].push(exp);
                                                    });
                                                    
                                                    return (
                                                        <div key={currency} className="border border-slate-700 rounded-xl bg-slate-800/50 overflow-hidden">
                                                            <div className="bg-gradient-to-r from-green-600/40 to-teal-600/40 border-b border-slate-700 px-6 py-4">
                                                                <div className="flex items-center justify-between">
                                                                    <div className="text-lg font-bold text-white flex items-center gap-3">
                                                                        <i className="fas fa-coins text-yellow-300"></i>
                                                                        <span>{currency}</span>
                                                                    </div>
                                                                    <div className="text-2xl font-bold text-green-200">{total.toLocaleString()}</div>
                                                                </div>
                                                                <div className="text-xs text-slate-300 mt-2">
                                                                    共 {expenses.length} 筆開銷 · {Object.keys(categories).length} 類別
                                                                </div>
                                                            </div>
                                                            
                                                            <div className="divide-y divide-slate-700/50">
                                                                {Object.entries(categories).map(([catName, catExpenses]) => {
                                                                    const catTotal = catExpenses.reduce((sum, e) => sum + Number(e.amount || 0), 0);
                                                                    return (
                                                                        <div key={catName} className="px-6 py-4 bg-slate-800/20 hover:bg-slate-700/30 transition-colors">
                                                                            <div className="flex items-center justify-between mb-3">
                                                                                <span className="font-semibold text-slate-200 flex items-center gap-2">
                                                                                    <i className="fas w-4 text-center" style={{color: catName === '餐飲' ? '#fbbf24' : catName === '交通' ? '#60a5fa' : catName === '住宿' ? '#e879f9' : catName === '門票' ? '#34d399' : catName === '購物' ? '#f87171' : '#9ca3af'}}></i>
                                                                                    {catName}
                                                                                </span>
                                                                                <span className="text-lg font-bold text-green-300">{catTotal.toLocaleString()}</span>
                                                                            </div>
                                                                            <div className="space-y-2">
                                                                                {catExpenses.map((exp, idx) => (
                                                                                    <div key={idx} className="flex items-center justify-between text-xs pl-6">
                                                                                        <span className="text-slate-300">{exp.subCategory || EXPENSE_CATEGORIES[exp.category] || exp.category || '其他'}</span>
                                                                                        <span className="text-slate-200 font-medium">{Number(exp.amount || 0).toLocaleString()}</span>
                                                                                    </div>
                                                                                ))}
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        );
                                    } catch (err) {
                                        return <div className="text-center text-red-400 py-10">資料載入出錯</div>;
                                    }
                                })()}
                            </div>
                        </div>
                    )}
                    {/* 全域 Fixed Tooltip (解決 Overflow 遮擋問題) */}
                    {!disableHoverTooltip && hoveredDay && (
                        <div 
                            className="fixed z-[9999] pt-2 pointer-events-none"
                            style={{ 
                                top: tooltipPos.top - window.scrollY, 
                                left: tooltipPos.left - window.scrollX,
                                transform: 'translateX(-50%)'
                            }}
                        >
                            {/* 增加一個透明的感應區，防止滑鼠移往 tooltip 時消失 */}
                            <div className="absolute top-0 left-0 right-0 h-4 -mt-2 bg-transparent pointer-events-auto"></div>
                            
                            <div 
                                className="bg-white border border-slate-200 shadow-2xl rounded-xl p-3 min-w-[200px] pointer-events-auto"
                                style={{ maxHeight: 'min(70vh, 560px)' }}
                                onMouseEnter={() => handleTooltipEnter(hoveredDay, null)}
                                onMouseLeave={handleTooltipLeave}
                            >
                                <div className="mb-3 pb-3 border-b border-slate-100">
                                    <div className="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-wider flex items-center gap-1.5">
                                        <i className="fas fa-eye text-blue-400"></i> 行程預覽
                                    </div>
                                    <div className="space-y-1.5 overflow-y-auto hide-scrollbar" style={{ maxHeight: 'min(42vh, 320px)' }}>
                                        {hoveredDay.nodes && hoveredDay.nodes.length > 0 ? (
                                            hoveredDay.nodes.slice(0, 5).map(node => (
                                                <div key={node.id} className="text-[11px] text-slate-600 line-clamp-1 flex items-start gap-1.5">
                                                    <span className="text-[8px] mt-1 text-slate-300">●</span>
                                                    <span className="flex-1">{node.title || (node.type === 'transit' ? `${node.startPoint} ➡️ ${node.endPoint}` : '未命名')}</span>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="text-[10px] text-slate-400 italic py-1 text-center">尚未新增行程</div>
                                        )}
                                        {hoveredDay.nodes && hoveredDay.nodes.length > 5 && (
                                            <div className="text-[9px] text-blue-500 font-medium pl-3 mt-1">
                                                ...等共 {hoveredDay.nodes.length} 個行程
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {activePlan.days.length > 1 && (
                                    <div>
                                        <div className="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-wider flex items-center gap-1.5">
                                            <i className="fas fa-random text-emerald-400"></i> 整天對調
                                        </div>
                                        <div className="grid grid-cols-3 gap-1.5">
                                            {activePlan.days.filter(d => d.id !== hoveredDay.id).map(targetDay => {
                                                const targetDayIndex = activePlan.days.findIndex(d => d.id === targetDay.id) + 1;
                                                return (
                                                    <button
                                                        key={targetDay.id}
                                                        onClick={(e) => { e.stopPropagation(); dispatch({ type: PLAN_ACTIONS.SWAP_DAYS, payload: { planId: activePlan.id, dayId1: hoveredDay.id, dayId2: targetDay.id } }); setHoveredDay(null); }}
                                                        className="text-[10px] font-bold py-1.5 rounded-lg bg-slate-50 text-slate-600 hover:bg-blue-600 hover:text-white transition-all text-center border border-slate-200"
                                                        title={`與 D${targetDayIndex} 對調`}
                                                    >
                                                        {`D${targetDayIndex}`}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* 手機 Day 摘要抽屜 */}
                    {(() => {
                        if (disableHoverTooltip && activePlan && mobilePreviewDayId) {
                            const mobileDay = activePlan.days.find(d => d.id === mobilePreviewDayId);
                            if (!mobileDay) {
                                return null;
                            }
                            return (
                            <div className="fixed inset-0 z-[9998] sm:hidden">
                                <div className="absolute inset-0 bg-black/35" onClick={() => setMobilePreviewDayId(null)}></div>
                                <div className="absolute left-0 right-0 bottom-0 bg-white rounded-t-2xl border-t border-slate-200 shadow-2xl max-h-[78vh] overflow-hidden">
                                    <div className="px-4 pt-3 pb-2 border-b border-slate-100 flex items-center justify-between">
                                        <div>
                                            <div className="text-sm font-bold text-slate-800">{mobileDay.title}</div>
                                            <div className="text-[11px] text-slate-500">{mobileDay.subtitle || '當日摘要'}</div>
                                        </div>
                                        <button
                                            onClick={() => setMobilePreviewDayId(null)}
                                            className="p-2 rounded-full text-slate-500 hover:bg-slate-100"
                                            title="關閉"
                                        >
                                            <i className="fas fa-times"></i>
                                        </button>
                                    </div>

                                    <div className="p-4 overflow-y-auto" style={{ maxHeight: 'calc(78vh - 56px)' }}>
                                        {(() => {
                                            try {
                                                const nodes = Array.isArray(mobileDay.nodes) ? mobileDay.nodes : [];
                                                
                                                // Build expense breakdown by node
                                                const expensesByNode = nodes.reduce((acc, node) => {
                                                    const nodeExpenses = normalizeExpenseItems(node)
                                                        .filter(it => Number(it.amount || 0) > 0)
                                                        .filter(it => it.expenseStatus !== 'estimated');
                                                    if (nodeExpenses.length > 0) {
                                                        acc.push({
                                                            nodeId: node.id,
                                                            nodeTitle: node.title || (node.type === 'transit' ? `${node.startPoint} → ${node.endPoint}` : '未命名'),
                                                            nodeType: node.type,
                                                            expenses: nodeExpenses
                                                        });
                                                    }
                                                    return acc;
                                                }, []);
                                                
                                                // Calculate total by currency
                                                const totalByCurrency = {};
                                                const allExpenses = expensesByNode.flatMap(n => n.expenses);
                                                allExpenses.forEach(exp => {
                                                    const curr = exp.currency || 'TWD';
                                                    totalByCurrency[curr] = (totalByCurrency[curr] || 0) + Number(exp.amount || 0);
                                                });
                                                
                                                const hasExpenses = Object.keys(totalByCurrency).length > 0;
                                                
                                                if (hasExpenses) {
                                                    return (
                                                        <div className="mb-4 space-y-3">
                                                            {/* 總金額摘要 */}
                                                            <div className="p-3 rounded-lg bg-amber-50 border border-amber-100">
                                                                <div className="text-[11px] font-bold text-amber-900 mb-2">💰 當日開銷</div>
                                                                <div className="space-y-1">
                                                                    {Object.entries(totalByCurrency).map(([curr, total]) => (
                                                                        <div key={curr} className="text-sm font-bold text-amber-700">
                                                                            {total.toFixed(2)} {curr}
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                            
                                                            {/* 按節點展開詳細支出 */}
                                                            {expensesByNode.length > 0 && (
                                                                <div className="text-[11px] font-bold text-slate-500 mb-2 uppercase tracking-wider">支出明細</div>
                                                            )}
                                                            {expensesByNode.map(nodeExpense => (
                                                                <div key={nodeExpense.nodeId} className="p-2.5 bg-slate-50 rounded-lg border border-slate-100">
                                                                    <div className="text-xs font-semibold text-slate-700 mb-1.5">
                                                                        {nodeExpense.nodeType === 'transit' ? '🚗' : 
                                                                         nodeExpense.nodeType === 'restaurant' ? '🍽️' :
                                                                         nodeExpense.nodeType === 'hotel' ? '🏨' : '📍'}
                                                                        {' '}{nodeExpense.nodeTitle}
                                                                    </div>
                                                                    <div className="space-y-1">
                                                                        {nodeExpense.expenses.map((exp, idx) => (
                                                                            <div key={exp.id || idx} className="text-[10px] text-slate-600 flex justify-between items-start">
                                                                                <span className="flex-1">
                                                                                    {(() => {
                                                                                        const categoryLabel = EXPENSE_CATEGORIES[exp.category] || exp.category || '其他';
                                                                                        const itemLabel = exp.subCategory || categoryLabel;
                                                                                        return <span className="mr-1">{itemLabel}</span>;
                                                                                    })()}
                                                                                    {exp.note && <span className="italic">{exp.note}</span>}
                                                                                </span>
                                                                                <span className="font-semibold ml-2 shrink-0">{Number(exp.amount).toFixed(2)} {exp.currency || 'TWD'}</span>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    );
                                                }
                                                return null;
                                            } catch (err) {
                                                return null;
                                            }
                                        })()}

                                        <div className="mb-4">
                                            <div className="text-[11px] font-bold text-slate-500 mb-2 uppercase tracking-wider">行程預覽</div>
                                            <div className="space-y-1.5">
                                                {mobileDay.nodes && mobileDay.nodes.length > 0 ? (
                                                    mobileDay.nodes.slice(0, 5).map(node => (
                                                        <div key={node.id} className="text-xs text-slate-700 flex items-start gap-1.5">
                                                            <span className="text-[9px] mt-1 text-slate-300">●</span>
                                                            <span className="flex-1">{node.title || (node.type === 'transit' ? `${node.startPoint} -> ${node.endPoint}` : '未命名')}</span>
                                                        </div>
                                                    ))
                                                ) : (
                                                    <div className="text-xs text-slate-400 italic">尚未新增行程</div>
                                                )}
                                                {mobileDay.nodes && mobileDay.nodes.length > 5 && (
                                                    <div className="text-[11px] text-blue-600 font-medium">...等共 {mobileDay.nodes.length} 個行程</div>
                                                )}
                                            </div>
                                        </div>

                                        {activePlan.days.length > 1 && (
                                            <div>
                                                <div className="text-[11px] font-bold text-slate-500 mb-2 uppercase tracking-wider">整天對調</div>
                                                <div className="grid grid-cols-3 gap-2">
                                                    {activePlan.days.filter(d => d.id !== mobileDay.id).map(targetDay => {
                                                        const targetDayIndex = activePlan.days.findIndex(d => d.id === targetDay.id) + 1;
                                                        return (
                                                            <button
                                                                key={targetDay.id}
                                                                onClick={() => {
                                                                    dispatch({ type: PLAN_ACTIONS.SWAP_DAYS, payload: { planId: activePlan.id, dayId1: mobileDay.id, dayId2: targetDay.id } });
                                                                    setMobilePreviewDayId(null);
                                                                }}
                                                                className="text-xs font-bold py-2 rounded-lg bg-slate-50 text-slate-700 hover:bg-blue-600 hover:text-white transition-all border border-slate-200"
                                                                title={`與 D${targetDayIndex} 對調`}
                                                            >
                                                                {`D${targetDayIndex}`}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        );
                        }
                        return null;
                    })()}
                    
                    {/* 版本號顯示 */}
                    <div className="fixed bottom-2 right-2 text-xs text-slate-400 bg-slate-800/50 px-2 py-1 rounded" title="頁面版本號">
                        v{APP_VERSION}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
