                                        ${style.label} ${Math.round((val/stats.total)*100)}%
                                    </span>`;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }).join('');

                const dayCardsHtml = plan.days.map((d, i) => {
                    const nodeRowsHtml = d.nodes.map((n, ni) => {
                        const ns_n = NODE_STYLES[n.type] || DEFAULT_NODE_STYLE;
                        const timeStr = n.time ? `<span style="font-size:10px;color:#2563eb;font-weight:700;min-width:40px;flex-shrink:0;">${n.time}</span>` : `<span style="min-width:40px;flex-shrink:0;"></span>`;
                        const nodeTitle = (n.type === 'transit' && (n.startPoint || n.endPoint))
                            ? `${n.startPoint || '?'} → ${n.endPoint || '?'}${n.title ? ' (' + n.title + ')' : ''}`
                            : (n.title || '未命名');
                        return `<a href="#export-node-${i}-${ni}" style="display:flex;align-items:center;gap:6px;padding:3px 10px 3px 0;text-decoration:none;color:#334155;border-radius:4px;">${timeStr}<span style="font-size:12px;flex-shrink:0;">${ns_n.icon}</span><span style="font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${nodeTitle}</span></a>`;
                    }).join('');
                    return `<div style="margin-bottom:8px;">
                        <a href="#export-day-${i}" style="display:flex;align-items:center;gap:8px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:7px 14px;text-decoration:none;color:#1e3a8a;font-weight:bold;">
                            <span style="font-size:11px;font-weight:900;color:#2563eb;background:#dbeafe;padding:2px 8px;border-radius:10px;flex-shrink:0;">Day ${i+1}</span>
                            <span style="font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.title}</span>
                            ${d.subtitle ? `<span style="font-size:10px;color:#64748b;font-weight:normal;flex-shrink:0;">${d.subtitle}</span>` : ''}
                            <span style="font-size:10px;color:#2563eb;background:#dbeafe;padding:1px 8px;border-radius:8px;flex-shrink:0;">${d.nodes.length} 節點</span>
                        </a>
                        ${d.nodes.length > 0 ? `<div style="border-left:2px solid #bfdbfe;margin-left:16px;padding:2px 0 2px 8px;">${nodeRowsHtml}</div>` : ''}
                    </div>`;
                }).join('');

                container.innerHTML += `
                    <div style="position:relative;z-index:1;display:flex;flex-direction:column;height:100%;">
                        <!-- 標題區域 -->
                        <div style="margin-bottom:50px;">
                            <div style="font-size:14px;color:#3b82f6;font-weight:900;letter-spacing:3px;margin-bottom:12px;text-transform:uppercase;">Travel Itinerary Dashboard</div>
                            <h1 style="font-size:42px;font-weight:900;color:#0f172a;line-height:1.2;margin:0;word-break:break-word;">${plan.name}</h1>
                            <div style="display:flex;gap:20px;margin-top:20px;align-items:center;">
                                <div style="background:#3b82f6;color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:bold;">${totalDays} Days</div>
                                <div style="color:#64748b;font-size:13px;font-weight:500;">共 ${totalNodes} 個行程節點</div>
                                <div style="flex:1;height:1px;background:#e2e8f0;"></div>
                            </div>
                        </div>

                        <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:40px;flex:1;">
                            <!-- 左側：行程總覽 -->
                            <div>
                                <h3 style="font-size:16px;color:#0f172a;margin-bottom:20px;display:flex;align-items:center;gap:8px;">
                                    <span style="display:inline-block;width:4px;height:16px;background:#3b82f6;border-radius:2px;"></span>
                                    📅 行程概覽 / ITINERARY OVERVIEW
                                </h3>
                                <div style="display:flex;flex-direction:column;gap:0;">
                                    ${dayCardsHtml}
                                </div>
                            </div>

                            <!-- 右側：統計與備註 -->
                            <div style="display:flex;flex-direction:column;gap:30px;">
                                <div>
                                    <h3 style="font-size:16px;color:#0f172a;margin-bottom:20px;display:flex;align-items:center;gap:8px;">
                                        <span style="display:inline-block;width:4px;height:16px;background:#10b981;border-radius:2px;"></span>
                                        💰 預算統計 / BUDGET
                                    </h3>
                                    <div style="background:#fff;padding:20px;border-radius:16px;border:1px solid #f1f5f9;box-shadow:0 4px 6px rgba(0,0,0,0.02);">
                                        ${expenseHtml || '<div style="color:#94a3b8;font-size:13px;text-align:center;padding:10px 0;">尚未記錄花費</div>'}
                                    </div>
                                </div>

                                <div>
                                    <h3 style="font-size:16px;color:#0f172a;margin-bottom:20px;display:flex;align-items:center;gap:8px;">
                                        <span style="display:inline-block;width:4px;height:16px;background:#f59e0b;border-radius:2px;"></span>
                                        📝 重點筆記 / NOTES
                                    </h3>
                                    <div style="font-size:13px;color:#475569;line-height:1.7;background:#fffbeb;padding:20px;border-radius:16px;border:1px solid #fef3c7;min-height:120px;">
                                        ${plan.checklists && plan.checklists.length > 0 ? `已準備 ${plan.checklists.length} 個類別的行前清單。` : ''}
                                        請在 PDF 匯出視窗勾選「包含背景圖片」以確保儀表板樣式完美呈現。
                                        預祝您旅途愉快！
                                    </div>
                                </div>

                                <div style="margin-top:auto;text-align:right;">
                                    <div style="font-size:11px;color:#cbd5e1;font-weight:bold;letter-spacing:1px;">GENERATED BY TRAVEL PRO V3.0</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                return container;
            };

            // --- 共用：建立單天匯出 DOM ---
            const buildDayContainer = (plan, day, dayIndex, containerWidth, options = {}, contentPaddingPx = 16) => {
                const nodeStart = Number(options.nodeStart || 0);
                const nodeEnd = options.nodeEnd == null ? day.nodes.length : Number(options.nodeEnd);
                const segmentIndex = Number(options.segmentIndex || 0);
                const segmentTotal = Number(options.segmentTotal || 1);
                const segmentNodes = day.nodes.slice(nodeStart, nodeEnd);
                const container = document.createElement('div');
                // 加入 page-break-after: always 原生列印換頁
                container.style.cssText = `width:${containerWidth}px;background:#fff;padding:${Math.round(contentPaddingPx)}px;font-family:'Segoe UI',Tahoma,sans-serif;box-sizing:border-box;page-break-after:always;break-after:always;`;
                container.id = 'export-day-' + dayIndex;

                // 計算方案總花費
                const planExpensesHtml = Object.entries(
                    plan.days.flatMap(d => d.nodes).reduce((acc, node) => {
                        const byCurrency = getNodeExpenseByCurrency(node);
                        Object.entries(byCurrency).forEach(([cur, amount]) => {
                            acc[cur] = (acc[cur] || 0) + amount;
                        });
                        return acc;
                    }, {})
                ).map(([currency, total]) => `<span style="margin-left:8px;font-size:12px;color:#cbd5e1;">${currency} <span style="font-size:14px;color:#fcd34d;font-weight:bold;font-family:monospace;">${total.toLocaleString()}</span></span>`).join('');

                const expenseHeaderHtml = planExpensesHtml ? `<div style="display:flex;align-items:center;"><span style="font-size:12px;color:#94a3b8;margin-right:2px;">💰 方案總花費:</span>${planExpensesHtml}</div>` : '';

                // 方案標題
                const planHeader = document.createElement('div');
                planHeader.style.cssText = 'background:linear-gradient(135deg,#1e293b 0%,#334155 100%);color:#fff;padding:10px 16px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center;';
                planHeader.innerHTML = `<div style="font-size:15px;font-weight:bold;letter-spacing:0.5px;">✈️ ${plan.name}</div>${expenseHeaderHtml}`;
                container.appendChild(planHeader);

                // 天數標題與單日花費
                const dayHeader = document.createElement('div');
                dayHeader.style.cssText = 'background:linear-gradient(135deg,#f1f5f9 0%,#e2e8f0 100%);padding:12px 16px;border-radius:0 0 8px 8px;margin-bottom:20px;border:1px solid #e2e8f0;border-top:none;display:flex;justify-content:space-between;align-items:flex-start;';
                
                // 計算單日總花費
                const dayExpensesHtml = Object.entries(
                    day.nodes.reduce((acc, node) => {
                        const byCurrency = getNodeExpenseByCurrency(node);
                        Object.entries(byCurrency).forEach(([cur, amount]) => {
                            acc[cur] = (acc[cur] || 0) + amount;
                        });
                        return acc;
                    }, {})
                ).map(([currency, total]) => `<span style="margin-left:8px;font-size:12px;color:#64748b;">${currency} <span style="font-size:14px;color:#0f172a;font-weight:bold;font-family:monospace;">${total.toLocaleString()}</span></span>`).join('');
                
                const dayExpenseHeaderHtml = dayExpensesHtml ? `<div style="display:flex;align-items:center;background:#fff;padding:4px 8px;border-radius:6px;border:1px solid #cbd5e1;"><span style="font-size:11px;color:#64748b;margin-right:2px;font-weight:bold;">單日花費:</span>${dayExpensesHtml}</div>` : '';

                // 新增：天氣與選單統計
                const wIcon = day.weather?.condition ? (WEATHER_CONDITIONS.find(w => w.value === day.weather.condition) || {}).icon : '';
                const weatherHtml = day.weather?.condition ? `<div style="display:inline-flex;align-items:center;gap:6px;background:#eff6ff;padding:4px 10px;border-radius:12px;font-size:12px;color:#3b82f6;border:1px solid #bfdbfe;margin-top:6px;">${wIcon} ${day.weather.tempHigh ? day.weather.tempHigh + '°C' : ''}${day.weather.tempLow ? ' / ' + day.weather.tempLow + '°C' : ''}</div>` : '';

                const nodeCount = day.nodes.length;
                const typeCounts = day.nodes.reduce((acc, n) => { acc[n.type] = (acc[n.type] || 0) + 1; return acc; }, {});
                let subTotal = 0, subDone = 0;
                day.nodes.forEach(n => {
                    subTotal += n.subtasks.length;
                    subDone += n.subtasks.filter(s => s.isCompleted).length;
                    (n.children || []).forEach(c => {
                        subTotal += c.subtasks.length;
                        subDone += c.subtasks.filter(s => s.isCompleted).length;
                    });
                });
                const subProgress = subTotal === 0 ? 0 : Math.round((subDone / subTotal) * 100);
                const dayMemosCount = day.memos ? day.memos.length : 0;
                const statsHtml = `<div style="display:flex;gap:12px;font-size:11px;color:#64748b;margin-top:8px;flex-wrap:wrap;">
                    <span style="display:flex;align-items:center;gap:4px;"><span style="font-size:12px;">📌</span>${nodeCount} 節點</span>
                    ${segmentTotal > 1 ? `<span style="display:flex;align-items:center;gap:4px;"><span style="font-size:12px;">📄</span>本頁節點 ${nodeStart + 1}-${Math.min(nodeEnd, day.nodes.length)}</span>` : ''}
                    ${Object.entries(typeCounts).map(([type, count]) => `<span style="display:flex;align-items:center;gap:4px;">${(NODE_STYLES[type] || DEFAULT_NODE_STYLE).icon} ${count}</span>`).join('')}
                    ${subTotal > 0 ? `<span style="display:flex;align-items:center;gap:4px;"><span style="font-size:12px;">✅</span>任務 ${subProgress}%</span>` : ''}
                    ${dayMemosCount > 0 ? `<span style="display:flex;align-items:center;gap:4px;"><span style="font-size:12px;">🗒️</span>${dayMemosCount} 備忘</span>` : ''}
                </div>`;

                dayHeader.innerHTML = `
                    <div>
                        <div style="font-size:22px;font-weight:bold;color:#1e293b;">📅 ${day.title}</div>
                        ${day.subtitle ? `<div style="font-size:13px;color:#64748b;font-weight:500;margin-top:2px;">${day.subtitle}</div>` : ''}
                        ${weatherHtml}
                        ${statsHtml}
                    </div>
                    ${dayExpenseHeaderHtml}
                `;
                container.appendChild(dayHeader);

                const dayMemos = day.memos || [];

                // 行程節點容器 (含連貫時間軸連線)
                const nodesContainer = document.createElement('div');
                nodesContainer.style.cssText = 'position:relative;margin-top:10px;';
                
                // 連貫時間軸背景連線 (方案4)
                if (segmentNodes.length > 1) {
                    const timelineLine = document.createElement('div');
                    timelineLine.style.cssText = 'position:absolute;left:30px;top:20px;bottom:30px;width:2px;border-left:2px dashed #cbd5e1;z-index:-1;';
                    nodesContainer.appendChild(timelineLine);
                }

                segmentNodes.forEach((node, localIndex) => {
                    const nodeIndex = nodeStart + localIndex;
                    const ns = NODE_STYLES[node.type] || DEFAULT_NODE_STYLE;
                    const linkedMemos = dayMemos.filter(m => m.linkedNodeId === node.id);
                    const isNarrow = containerWidth <= 500;
                    const row = document.createElement('div');
                    row.style.cssText = `display:flex;gap:12px;margin-bottom:14px;page-break-inside:avoid;break-inside:avoid;flex-direction:${isNarrow && linkedMemos.length > 0 ? 'column' : 'row'};`;

                    // 左欄 (包含內容卡片)
                    const contentCol = document.createElement('div');
                    contentCol.style.cssText = (linkedMemos.length > 0 && !isNarrow) ? 'flex:7;min-width:0;position:relative;z-index:1;' : 'flex:1;min-width:0;position:relative;z-index:1;';

                    const card = document.createElement('div');
                    card.id = 'export-node-' + dayIndex + '-' + nodeIndex;
                    if (node.type === 'transit') {
                        card.style.cssText = `background:rgba(248, 250, 252, 0.7);border:2px dashed ${ns.border};border-radius:8px;padding:12px 16px;`;
                    } else {
                        card.style.cssText = `background:${ns.bg};border:1px solid #e2e8f0;border-left:5px solid ${ns.border};border-radius:8px;padding:12px 16px;`;
                    }

                    // 標題列 + 標籤 + 時間
                    const titleRow = document.createElement('div');
                    titleRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;';
                    
                    let timeHTML = node.time ? `<span style="font-size:16px;font-weight:900;color:#2563eb;letter-spacing:0.5px;margin-right:4px;">${node.time}</span>` : '';
                    let tagsHTML = node.tags ? `<span style="font-size:10px;color:#166534;background:#dcfce7;border:1px solid #86efac;border-radius:4px;padding:2px 6px;margin-left:6px;font-weight:bold;">🏷️ ${node.tags.trim()}</span>` : '';
                    
                    if (node.type === 'transit') {
                        titleRow.innerHTML = `<span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:${ns.border};font-size:14px;flex-shrink:0;text-align:center;">${ns.icon}</span>${timeHTML}
                            <div style="flex:1;display:flex;align-items:center;gap:8px;margin:0 10px;">
                                <span style="font-size:15px;font-weight:bold;color:#1e293b;">${node.startPoint || '起點'}</span>
                                <div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:60px;">
                                    <span style="font-size:12px;color:#2563eb;font-weight:bold;">${node.title || '車次'}</span>
                                    <div style="height:1px;width:100%;border-top:1px dashed #93c5fd;margin:2px 0;"></div>
                                </div>
                                <span style="font-size:15px;font-weight:bold;color:#1e293b;">${node.endPoint || '終點'}</span>
                            </div>${tagsHTML}`;
                    } else {
                        let mapLinkHtml = '';
                        if (node.lat && node.lng) {
                            mapLinkHtml = `<a href="https://www.google.com/maps?q=${node.lat},${node.lng}" style="font-size:11px;color:#3b82f6;text-decoration:none;margin-left:8px;font-weight:bold;">📍 地圖</a>`;
                        } else {
                            mapLinkHtml = `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(node.title)}" style="font-size:11px;color:#64748b;text-decoration:none;margin-left:8px;">🗺️ 尋找</a>`;
                        }
                        titleRow.innerHTML = `<span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:${ns.border};font-size:14px;flex-shrink:0;text-align:center;">${ns.icon}</span>${timeHTML}<span style="font-size:16px;font-weight:bold;color:#1e293b;flex:1;">${node.title || '未命名節點'}${mapLinkHtml}</span>${tagsHTML}<span style="font-size:10px;color:${ns.border};background:${ns.bg};border:1px solid ${ns.border};border-radius:10px;padding:2px 8px;font-weight:600;flex-shrink:0;">${ns.label}</span>`;
                    }
                    card.appendChild(titleRow);

                    // 交通地圖連結
                    if (node.type === 'transit' && (node.startMap || node.endMap)) {
                        const mapRow = document.createElement('div');
                        mapRow.style.cssText = 'display:flex;justify-content:space-between;font-size:10px;color:#3b82f6;margin-left:40px;margin-top:-2px;margin-bottom:6px;';
                        mapRow.innerHTML = `
                            <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px;">${node.startMap ? `🔗 ${node.startMap}` : ''}</span>
                            <span style="flex:1;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${node.endMap ? `🔗 ${node.endMap}` : ''}</span>
                        `;
                        card.appendChild(mapRow);
                    }

                    // 子任務
                    if (node.subtasks.length > 0) {
                        const subContainer = document.createElement('div');
                        subContainer.style.cssText = `margin:6px 0 0 36px;padding-left:10px;border-left:2px dashed ${ns.border}40;`;
                        node.subtasks.forEach(sub => {
                            const subEl = document.createElement('div');
                            const textColor = sub.isCompleted ? '#94a3b8' : '#475569';
                            const textDecor = sub.isCompleted ? 'line-through' : 'none';
                            const icon = sub.isCompleted ? '☑️' : '🔲';
                            subEl.style.cssText = `font-size:13px;color:${textColor};text-decoration:${textDecor};margin:4px 0;white-space:pre-wrap;display:flex;align-items:flex-start;gap:6px;`;
                            subEl.innerHTML = `<span style="font-size:12px;margin-top:2px;">${icon}</span><span style="flex:1;line-height:1.4;">${sub.text}</span>`;
                            subContainer.appendChild(subEl);
                        });
                        card.appendChild(subContainer);
                    }

                    // 節點花費
                    const nodeExpenseByCurrency = getNodeExpenseByCurrency(node);
                    if (Object.keys(nodeExpenseByCurrency).length > 0) {
                        const costRow = document.createElement('div');
                        costRow.style.cssText = 'display:flex;justify-content:flex-end;align-items:center;margin-top:8px;padding-top:6px;border-top:1px dashed #e2e8f0;';
                        costRow.innerHTML = `
                            ${node.note ? `<span style="font-size:11px;color:#94a3b8;margin-right:8px;font-style:italic;">${node.note}</span>` : ''}
                            <span style="font-size:12px;color:#64748b;font-weight:bold;margin-right:4px;">花費: </span>
                            ${Object.entries(nodeExpenseByCurrency).map(([cur, amount]) => `<span style="font-size:11px;color:#94a3b8;margin-right:2px;">${cur}</span><span style="font-size:14px;color:#0f172a;font-weight:bold;font-family:monospace;margin-right:8px;">${Number(amount).toLocaleString()}</span>`).join('')}
                        `;
                        card.appendChild(costRow);
                    }

                    // 子節點
                    if (node.children && node.children.length > 0) {
                        const childSection = document.createElement('div');
                        childSection.style.cssText = 'margin-top:10px;padding-top:8px;border-top:1px dashed #cbd5e1;';
                        const childRow = document.createElement('div');
                        childRow.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;';
                        node.children.forEach(child => {
                            const childCard = document.createElement('div');
                            childCard.style.cssText = `background:#fff;border:1px solid ${ns.border}50;border-left:3px solid ${ns.border};border-radius:6px;padding:8px 10px;min-width:160px;flex:1;page-break-inside:avoid;break-inside:avoid;`;
                            childCard.innerHTML = `<div style="font-size:13px;font-weight:600;color:${ns.border};margin-bottom:2px;">${child.title}</div>`;
                            child.subtasks.forEach(cs => {
                                const csEl = document.createElement('div');
                                const textColor = cs.isCompleted ? '#94a3b8' : '#64748b';
                                const textDecor = cs.isCompleted ? 'line-through' : 'none';
                                const icon = cs.isCompleted ? '☑️' : '🔲';
                                csEl.style.cssText = `font-size:11px;color:${textColor};text-decoration:${textDecor};margin-top:2px;padding-left:6px;border-left:2px dashed #cbd5e140;white-space:pre-wrap;display:flex;align-items:flex-start;gap:4px;`;
                                csEl.innerHTML = `<span style="font-size:10px;margin-top:1px;">${icon}</span><span style="flex:1;line-height:1.4;">${cs.text}</span>`;
                                childCard.appendChild(csEl);
                            });
                            childRow.appendChild(childCard);
                        });
                        childSection.appendChild(childRow);
                        card.appendChild(childSection);
                    }

                    contentCol.appendChild(card);
                    row.appendChild(contentCol);

                    // 如果有備忘錄，顯示在右側 (或堆疊在下方)
                    if (linkedMemos.length > 0) {
                        const memoCol = document.createElement('div');
                        memoCol.style.cssText = isNarrow ? 'width:100%;display:flex;flex-direction:column;gap:10px;margin-top:-4px;position:relative;z-index:1;' : 'flex:3;display:flex;flex-direction:column;gap:10px;min-width:180px;position:relative;z-index:1;';
                        linkedMemos.forEach(m => memoCol.appendChild(buildMemoCard(m, true)));
                        row.appendChild(memoCol);
                    }

                    nodesContainer.appendChild(row);
                });

                container.appendChild(nodesContainer);

                // 未勾稽備忘錄
                const isLastSegment = segmentIndex === segmentTotal - 1;
                const unlinkedMemos = dayMemos.filter(m => !m.linkedNodeId);
                if (isLastSegment && unlinkedMemos.length > 0) {
                    const memoSection = document.createElement('div');
                    memoSection.style.cssText = 'margin-top:20px;padding-top:14px;border-top:2px dashed #94a3b8;';
                    memoSection.innerHTML = '<div style="font-size:14px;font-weight:bold;color:#475569;margin-bottom:10px;">🗒️ 其他備忘錄</div>';
                    const memoGrid = document.createElement('div');
                    memoGrid.style.cssText = 'display:flex;gap:10px;flex-wrap:wrap;';
                    unlinkedMemos.forEach(m => {
                        const wrapper = document.createElement('div');
                        wrapper.style.cssText = 'flex:1;min-width:200px;max-width:320px;page-break-inside:avoid;break-inside:avoid;';
                        wrapper.appendChild(buildMemoCard(m, false));
                        memoGrid.appendChild(wrapper);
                    });
                    memoSection.appendChild(memoGrid);
                    container.appendChild(memoSection);
                }

                // 旅行日誌
                if (isLastSegment && day.journal) {
                    const journalSection = document.createElement('div');

                // 新增：QR Code 導覽區
                const rNodes = segmentNodes.filter(n => n.lat && n.lng);
                if (rNodes.length > 0) {
                    const waypoints = rNodes.map(n => `${n.lat},${n.lng}`);
                    const routeUrl = `https://www.google.com/maps/dir/${waypoints.join('/')}`;
                    // 更換為更穩定的 QR Code API
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(routeUrl)}`;
                    
                    const qrSection = document.createElement('div');
                    qrSection.style.cssText = 'margin-top:30px;padding:20px;background:#f8fafc;border-radius:12px;display:flex;align-items:center;gap:20px;border:1px solid #e2e8f0;page-break-inside:avoid;break-inside:avoid;';
                    qrSection.innerHTML = `
                        <img src="${qrUrl}" style="width:100px;height:100px;border:4px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.1);border-radius:8px;" onerror="this.src='https://chart.googleapis.com/chart?cht=qr&chs=150x150&chl=${encodeURIComponent(routeUrl)}'" />
                        <div>
                            <div style="font-size:14px;font-weight:bold;color:#1e293b;margin-bottom:4px;">📱 手機掃描開啟導覽</div>
                            <div style="font-size:12px;color:#64748b;line-height:1.4;">掃描 QR Code 即可在 Google Maps 中開啟本行程完整導覽（包含 ${rNodes.length} 個地點）。</div>
                        </div>
                    `;
                    container.appendChild(qrSection);
                }

                // 頁尾
                const footerLine = document.createElement('div');
                footerLine.style.cssText = 'margin-top:24px;border-top:1px solid #e2e8f0;padding-top:8px;';
                footerLine.innerHTML = `<div style="font-size:11px;color:#94a3b8;text-align:center;">✈️ ${plan.name}  ·  ${day.title}${day.subtitle ? ' — ' + day.subtitle : ''}  ·  Day ${dayIndex + 1}/${plan.days.length}${segmentTotal > 1 ? ` · 段落 ${segmentIndex + 1}/${segmentTotal}` : ''}</div>`;
                container.appendChild(footerLine);

                return container;
            };

            // --- 共用：建立行前清單匯出 DOM ---
            const buildChecklistContainer = (plan, containerWidth, contentPaddingPx = 16) => {
                const container = document.createElement('div');
                container.style.cssText = `width:${containerWidth}px;background:#fff;padding:${Math.round(contentPaddingPx)}px;font-family:'Segoe UI',Tahoma,sans-serif;box-sizing:border-box;page-break-after:always;break-after:always;`;

                // 方案標題
                const planHeader = document.createElement('div');
                planHeader.style.cssText = 'background:linear-gradient(135deg,#1e293b 0%,#334155 100%);color:#fff;padding:10px 16px;border-radius:8px 8px 0 0;';
                planHeader.innerHTML = `<div style="font-size:15px;font-weight:bold;letter-spacing:0.5px;">✈️ ${plan.name}</div>`;
                container.appendChild(planHeader);

                // 行前清單標題
                const clHeader = document.createElement('div');
                clHeader.style.cssText = 'background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);padding:12px 16px;border-radius:0 0 8px 8px;margin-bottom:20px;border:1px solid #fde68a;border-top:none;display:flex;justify-content:space-between;align-items:center;';
                
                let totalItems = 0;
                let checkedItems = 0;
                (plan.checklists || []).forEach(c => {
                    c.items.forEach(i => {
                        if (!i.isNote) {
                            totalItems++;
                            if (i.isChecked) checkedItems++;
                        }
                    });
                });
                const progress = totalItems === 0 ? 0 : Math.round((checkedItems / totalItems) * 100);

                clHeader.innerHTML = `
                    <div>
                        <div style="font-size:22px;font-weight:bold;color:#78350f;">📋 行前準備清單</div>
                        <div style="font-size:13px;color:#92400e;font-weight:500;margin-top:2px;">出發前再確認一次！</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:12px;font-weight:bold;color:#92400e;margin-bottom:4px;">準備進度: ${progress}%</div>
                        <div style="width:120px;height:8px;background:#fef3c7;border-radius:4px;overflow:hidden;border:1px solid #fcd34d;">
                            <div style="height:100%;background:#f59e0b;width:${progress}%;"></div>
                        </div>
                    </div>
                `;
                container.appendChild(clHeader);
                
                if (!plan.checklists || plan.checklists.length === 0) {
                    const emptyMsg = document.createElement('div');
                    emptyMsg.style.cssText = 'text-align:center;padding:40px;color:#94a3b8;font-size:14px;';
                    emptyMsg.textContent = '此方案目前沒有任何清單項目。';
                    container.appendChild(emptyMsg);
                } else {
                    const grid = document.createElement('div');
                    // 橫式 2 欄，直式 1 欄或 2 欄
                    grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;';
                    
                    plan.checklists.forEach(cat => {
                        const catCard = document.createElement('div');
                        catCard.style.cssText = 'background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:16px;page-break-inside:avoid;break-inside:avoid;';
                        
                        const catTitle = document.createElement('div');
                        catTitle.style.cssText = 'font-size:16px;font-weight:bold;color:#1e293b;margin-bottom:12px;border-bottom:2px solid #cbd5e1;padding-bottom:6px;';
                        catTitle.textContent = '📂 ' + cat.category;
                        catCard.appendChild(catTitle);
                        
                        if (cat.items.length === 0) {
                            const emptyItem = document.createElement('div');
                            emptyItem.style.cssText = 'font-size:13px;color:#94a3b8;font-style:italic;';
                            emptyItem.textContent = '無項目';
                            catCard.appendChild(emptyItem);
                        } else {
                            cat.items.forEach(item => {
                                const itemRow = document.createElement('div');
                                itemRow.style.cssText = 'display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;';
                                
                                if (item.isNote) {
                                    // 純文字備註樣式
                                    itemRow.innerHTML = `
                                        <span style="font-size:14px;margin-top:2px;">📌</span>
                                        <span style="font-size:14px;color:#0f172a;font-weight:500;line-height:1.4;">${item.text}</span>
                                    `;
                                } else {
                                    // 待辦項目樣式
                                    const checkIcon = item.isChecked ? '☑️' : '🔲';
                                    const textDecoration = item.isChecked ? 'line-through' : 'none';
                                    const textColor = item.isChecked ? '#94a3b8' : '#334155';
                                    
                                    itemRow.innerHTML = `
                                        <span style="font-size:14px;margin-top:2px;">${checkIcon}</span>
                                        <span style="font-size:14px;color:${textColor};text-decoration:${textDecoration};line-height:1.4;">${item.text}</span>
                                    `;
                                }
                                catCard.appendChild(itemRow);
                            });
                        }
                        grid.appendChild(catCard);
                    });
                    
                    container.appendChild(grid);
                }

                // 頁尾
                const footerLine = document.createElement('div');
                footerLine.style.cssText = 'margin-top:24px;border-top:1px solid #e2e8f0;padding-top:8px;';
                footerLine.innerHTML = `<div style="font-size:11px;color:#94a3b8;text-align:center;">✈️ ${plan.name}  ·  行前清單</div>`;
                container.appendChild(footerLine);

                return container;
            };

            const resolveExportSections = (settings = {}) => {
                const tplKey = settings.template || 'full';
                const templateDefaults = EXPORT_TEMPLATES[tplKey]?.defaults || EXPORT_TEMPLATES.full.defaults;
                return {
                    includeChecklist: settings.includeChecklist ?? templateDefaults.includeChecklist,
                    includeSplitSummary: settings.includeSplitSummary ?? templateDefaults.includeSplitSummary,
                    includeConflictSummary: settings.includeConflictSummary ?? templateDefaults.includeConflictSummary
                };
            };

            const buildSplitSummaryContainer = (plan, containerWidth, baseCurrency = 'TWD', rates = DEFAULT_EXCHANGE_RATES_TO_TWD, contentPaddingPx = 16) => {
                const container = document.createElement('div');
                container.style.cssText = `width:${containerWidth}px;background:#fff;padding:${Math.round(contentPaddingPx)}px;font-family:'Segoe UI',Tahoma,sans-serif;box-sizing:border-box;page-break-after:always;break-after:always;`;

                const companions = plan.companions || [];
                const allEntries = (plan.days || []).flatMap(day => (day.nodes || []).flatMap(node =>
                    normalizeExpenseItems(node)
                        .filter(it => Number(it.amount || 0) > 0 && it.expenseStatus !== 'estimated')
                        .map(it => ({ dayTitle: day.title, nodeTitle: node.title || '未命名', ...it }))
                ));

                const summary = companions.map(comp => {
                    const paid = allEntries.filter(it => it.paidBy === comp.id).reduce((sum, it) => {
                        return sum + convertCurrencyAmount(Number(it.amount || 0), it.currency || 'TWD', baseCurrency, rates);
                    }, 0);
                    const shouldPay = allEntries.reduce((sum, it) => {
                        const splitList = getEffectiveSplitAmong(it, companions);
                        if (!splitList.includes(comp.id) || splitList.length === 0) return sum;
                        const converted = convertCurrencyAmount(Number(it.amount || 0), it.currency || 'TWD', baseCurrency, rates);
                        return sum + converted / splitList.length;
                    }, 0);
                    return { ...comp, paid, shouldPay, diff: paid - shouldPay };
                });

                const transfers = calculateSettlementTransfers(summary);

                container.innerHTML = `
                    <div style="background:linear-gradient(135deg,#0f766e 0%,#14b8a6 100%);color:#fff;padding:14px 16px;border-radius:10px;display:flex;justify-content:space-between;align-items:center;gap:12px;">
                        <div>
                            <div style="font-size:20px;font-weight:800;">💸 分帳結算摘要</div>
                            <div style="font-size:12px;opacity:.9;margin-top:2px;">僅計入實際費用，基準幣別：${baseCurrency}</div>
                        </div>
                        <div style="font-size:11px;opacity:.85;">${new Date().toLocaleDateString()}</div>
                    </div>
                `;

                if (companions.length === 0) {
                    const empty = document.createElement('div');
                    empty.style.cssText = 'margin-top:16px;padding:14px;border:1px solid #cbd5e1;border-radius:8px;color:#64748b;font-size:13px;';
                    empty.textContent = '尚未建立旅伴名單，無法生成分帳摘要。';
                    container.appendChild(empty);
                    return container;
                }

                const cardGrid = document.createElement('div');
                cardGrid.style.cssText = 'margin-top:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;';
                summary.forEach(row => {
                    const c = document.createElement('div');
                    c.style.cssText = 'border:1px solid #e2e8f0;border-radius:8px;padding:10px;background:#f8fafc;';
                    c.innerHTML = `
                        <div style="font-size:13px;font-weight:700;color:#0f172a;">${row.name || '未命名'}</div>
                        <div style="font-size:11px;color:#64748b;margin-top:4px;">已付 ${row.paid.toLocaleString(undefined, { maximumFractionDigits: 0 })}</div>
                        <div style="font-size:11px;color:#64748b;">應分攤 ${row.shouldPay.toLocaleString(undefined, { maximumFractionDigits: 0 })}</div>
                        <div style="font-size:12px;font-weight:700;margin-top:5px;color:${row.diff >= 0 ? '#059669' : '#dc2626'};">${row.diff >= 0 ? '應收' : '應付'} ${Math.abs(row.diff).toLocaleString(undefined, { maximumFractionDigits: 0 })}</div>
                    `;
                    cardGrid.appendChild(c);
                });
                container.appendChild(cardGrid);

                const transferSection = document.createElement('div');
                transferSection.style.cssText = 'margin-top:16px;border:1px dashed #94a3b8;border-radius:8px;padding:10px;';
                const transferTitle = document.createElement('div');
                transferTitle.style.cssText = 'font-size:13px;font-weight:700;color:#334155;margin-bottom:8px;';
                transferTitle.textContent = '建議轉帳（最少筆數）';
                transferSection.appendChild(transferTitle);

                if (transfers.length === 0) {
                    const ok = document.createElement('div');
                    ok.style.cssText = 'font-size:12px;color:#64748b;';
                    ok.textContent = '目前帳務已接近平衡。';
                    transferSection.appendChild(ok);
                } else {
                    transfers.forEach(item => {
                        const from = companions.find(c => c.id === item.fromId)?.name || '未命名';
                        const to = companions.find(c => c.id === item.toId)?.name || '未命名';
                        const line = document.createElement('div');
                        line.style.cssText = 'font-size:12px;color:#0f172a;margin-bottom:4px;';
                        line.textContent = `${from} -> ${to}: ${baseCurrency} ${Number(item.amount || 0).toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
                        transferSection.appendChild(line);
                    });
                }
                container.appendChild(transferSection);

                // --- 支付來源使用摘要 ---
                const paymentSources = getPlanPaymentSources(plan);
                if (paymentSources.length > 0) {
                    const sourceSection = document.createElement('div');
                    sourceSection.style.cssText = 'margin-top:16px;';
                    const sourceTitle = document.createElement('div');
                    sourceTitle.style.cssText = 'font-size:13px;font-weight:700;color:#334155;margin-bottom:8px;border-top:1px solid #e2e8f0;padding-top:12px;';
                    sourceTitle.textContent = '支付來源 / 工具使用摘要';
                    sourceSection.appendChild(sourceTitle);

                    const sourceGrid = document.createElement('div');
                    sourceGrid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;';
                    paymentSources.forEach(source => {
                        const relatedEntries = allEntries.filter(it => {
                            const enriched = harmonizeExpensePaymentFields(it, paymentSources);
                            return enriched.paymentSourceId === source.id;
                        });
                        const amountInBase = relatedEntries.reduce((sum, it) => {
                            return sum + convertCurrencyAmount(Number(it.amount || 0), it.currency || 'TWD', baseCurrency, rates);
                        }, 0);
                        const origByCurrency = relatedEntries.reduce((acc, it) => {
                            const cur = it.currency || 'TWD';
                            acc[cur] = (acc[cur] || 0) + Number(it.amount || 0);
                            return acc;
                        }, {});
                        const origText = Object.entries(origByCurrency).length === 0
                            ? '尚未使用'
                            : Object.entries(origByCurrency).map(([cur, amt]) => `${cur} ${Number(amt).toLocaleString(undefined, { maximumFractionDigits: 0 })}`).join(' / ');
                        const remaining = source.currency
                            ? Math.max(0, Number(source.initialAmount || 0) - Number(origByCurrency[source.currency] || 0))
                            : null;

                        const remainingHtml = remaining !== null
                            ? '<div style="font-size:11px;color:#64748b;">剩餘：' + source.currency + ' ' + Number(remaining).toLocaleString(undefined, { maximumFractionDigits: 0 }) + '</div>'
                            : '';
                        const card = document.createElement('div');
                        card.style.cssText = 'border:1px solid #e2e8f0;border-radius:8px;padding:10px;background:#f8fafc;';
                        card.innerHTML = `
                            <div style="font-size:13px;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${source.name || '未命名來源'}</div>
                            <div style="font-size:11px;color:#64748b;margin-top:2px;">${PAYMENT_METHOD_LABELS[source.method] || '其他方式'}</div>
                            <div style="font-size:11px;color:#64748b;">原始：${origText}</div>
                            <div style="font-size:12px;font-weight:700;color:#0284c7;margin-top:4px;">折算 ${baseCurrency}：${Number(amountInBase).toLocaleString(undefined, { maximumFractionDigits: 0 })}</div>
                            ${remainingHtml}
                        `;
                        sourceGrid.appendChild(card);
                    });
                    sourceSection.appendChild(sourceGrid);
                    container.appendChild(sourceSection);
                }

                return container;
            };

            const buildConflictSummaryContainer = (plan, containerWidth, contentPaddingPx = 16) => {
                const byDay = (plan.days || []).map(day => ({ day, conflicts: detectDayConflicts(day) })).filter(x => x.conflicts.length > 0);
                if (byDay.length === 0) return null;

                const container = document.createElement('div');
                container.style.cssText = `width:${containerWidth}px;background:#fff;padding:${Math.round(contentPaddingPx)}px;font-family:'Segoe UI',Tahoma,sans-serif;box-sizing:border-box;page-break-after:always;break-after:always;`;
                container.innerHTML = `
                    <div style="background:linear-gradient(135deg,#7f1d1d 0%,#b91c1c 100%);color:#fff;padding:14px 16px;border-radius:10px;">
                        <div style="font-size:20px;font-weight:800;">⚠️ 行程衝突摘要</div>
                        <div style="font-size:12px;opacity:.9;margin-top:2px;">時間重疊、時序異常檢查結果</div>
                    </div>
                `;

                byDay.forEach(item => {
                    const block = document.createElement('div');
                    block.style.cssText = 'margin-top:12px;border:1px solid #fecaca;background:#fff1f2;border-radius:8px;padding:10px;';
                    const title = document.createElement('div');
                    title.style.cssText = 'font-size:13px;font-weight:700;color:#991b1b;margin-bottom:6px;';
                    title.textContent = `${item.day.title}${item.day.subtitle ? ` - ${item.day.subtitle}` : ''}`;
                    block.appendChild(title);
                    item.conflicts.forEach(c => {
                        const line = document.createElement('div');
                        line.style.cssText = 'font-size:12px;color:#7f1d1d;margin-bottom:4px;';
                        line.textContent = `• ${c.message}`;
                        block.appendChild(line);
                    });
                    container.appendChild(block);
                });

                return container;
            };

            const buildExportPages = (plan, settings, containerWidth, mode = 'preview') => {
                const sections = resolveExportSections(settings);
                const pages = [];
                
                let measureRoot = null;
                const metrics = getPaperMetrics(settings || {});
                const contentPaddingPx = metrics.contentPaddingPx;
                const printableHeightPx = metrics.printableHeightPx;
                const printableWmm = metrics.printableWmm;
                const printableHmm = metrics.printableHmm;
                const dynamicPrintSplit = mode === 'print' && printableWmm > 0 && printableHmm > 0;
                
                pages.push(buildDashboardCover(plan, containerWidth, contentPaddingPx, printableHeightPx).outerHTML);

                if (sections.includeSplitSummary) {
                    const splitSummary = buildSplitSummaryContainer(plan, containerWidth, splitBaseCurrency, exchangeRatesToTwd, contentPaddingPx);
                    if (splitSummary) pages.push(splitSummary.outerHTML);
                }

                if (sections.includeChecklist && plan.checklists && plan.checklists.length > 0) {
                    const clContainer = buildChecklistContainer(plan, containerWidth, contentPaddingPx);
                    pages.push(clContainer.outerHTML);
                }

                if (sections.includeConflictSummary) {
                    const conflictSummary = buildConflictSummaryContainer(plan, containerWidth, contentPaddingPx);
                    if (conflictSummary) pages.push(conflictSummary.outerHTML);
                }

                const ensureMeasureRoot = () => {
                    if (measureRoot) return measureRoot;
                    const root = document.createElement('div');
                    root.style.cssText = `position:fixed;left:-99999px;top:0;width:${containerWidth}px;visibility:hidden;pointer-events:none;z-index:-1;`;
                    document.body.appendChild(root);
                    measureRoot = root;
                    return root;
                };

                const measureFits = (planObj, dayObj, dayIndex, start, end) => {
                    const root = ensureMeasureRoot();
                    const sample = buildDayContainer(planObj, dayObj, dayIndex, containerWidth, {
                        nodeStart: start,
                        nodeEnd: end,
                        segmentIndex: 0,
                        segmentTotal: 1
                    }, contentPaddingPx);
                    root.appendChild(sample);
                    const h = sample.scrollHeight;
                    root.removeChild(sample);
                    return h <= printableHeightPx;
                };

                const splitDayByHeight = (planObj, dayObj, dayIndex) => {
                    const total = dayObj.nodes.length;
                    if (total === 0) return [{ start: 0, end: 0 }];
                    const ranges = [];
                    let start = 0;

                    while (start < total) {
                        let low = start + 1;
                        let high = total;
                        let best = start + 1;

                        while (low <= high) {
                            const mid = Math.floor((low + high) / 2);
                            if (measureFits(planObj, dayObj, dayIndex, start, mid)) {
                                best = mid;
                                low = mid + 1;
                            } else {
                                high = mid - 1;
                            }
                        }

                        ranges.push({ start, end: best });
                        start = best;
                    }

                    return ranges;
                };

                try {
                    for (let i = 0; i < plan.days.length; i++) {
                        const day = plan.days[i];

                        if (!dynamicPrintSplit) {
                            const dayContainer = buildDayContainer(plan, day, i, containerWidth, {
                                nodeStart: 0,
                                nodeEnd: day.nodes.length,
                                segmentIndex: 0,
                                segmentTotal: 1
                            }, contentPaddingPx);
                            pages.push(dayContainer.outerHTML);
                            continue;
                        }

                        const ranges = splitDayByHeight(plan, day, i);
                        const segTotal = ranges.length;
                        ranges.forEach((r, segIdx) => {
                            const dayContainer = buildDayContainer(plan, day, i, containerWidth, {
                                nodeStart: r.start,
                                nodeEnd: r.end,
                                segmentIndex: segIdx,
                                segmentTotal: segTotal
                            }, contentPaddingPx);
                            pages.push(dayContainer.outerHTML);
                        });
                    }
                } finally {
                    if (measureRoot && measureRoot.parentNode) {
                        measureRoot.parentNode.removeChild(measureRoot);
                    }
                }

                if (mode === 'preview') {
                    return pages.map(html => html.replace('margin:0 auto;', 'margin:0 auto 40px auto;box-shadow:0 2px 12px rgba(0,0,0,0.1);border-radius:8px;'));
                }
                return pages;
            };

            // --- 匯出 HTML 預覽 ---
            const exportHTML = (settings) => {
                if (!activePlan || activePlan.days.length === 0) {
                    alert('當前方案沒有任何天數可匯出');
                    return;
                }
                setShowPdfSettings(false);

                const isLandscape = settings && settings.orientation === 'landscape';
                const containerWidth = isLandscape ? 1100 : 800;
                const pages = buildExportPages(activePlan, settings || pdfSettings, containerWidth, 'preview');

                const html = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${activePlan.name} — 旅遊規劃預覽</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e2e8f0; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 40px 20px; }
        @media print { 
            body { background: #fff; padding: 0; }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>
${pages.join('\n')}
</body>
</html>`;

                const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${activePlan.name}_旅遊規劃_${(settings?.template || pdfSettings.template || 'full')}_預覽.html`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            };

            // --- 匯出 PDF (原生列印版) ---

                            : allEntries.filter(it => it.expenseStatus !== 'estimated'))

                                amountInBase: convertCurrencyAmount(Number(it.amount || 0), it.currency || 'TWD', splitBaseCurrency, exchangeRatesToTwd)
                            }));

                        const keyword = splitKeyword.trim().toLowerCase();
                        const filteredEntries = allEntries.filter(entry => {
                            const status = entry.expenseStatus === 'estimated' ? 'estimated' : 'actual';
                            if (splitStatusFilter !== 'all' && status !== splitStatusFilter) return false;
                            if (splitCurrencyFilter !== 'all' && (entry.currency || 'TWD') !== splitCurrencyFilter) return false;
                            if (splitPaymentMethodFilter !== 'all' && (entry.paymentMethod || 'cash') !== splitPaymentMethodFilter) return false;
                            if (splitPaymentSourceFilter !== 'all' && (entry.paymentSourceId || '') !== splitPaymentSourceFilter) return false;
                            if (splitPayerFilter !== 'all' && (entry.paidBy || '') !== splitPayerFilter) return false;

                            const splitList = getEffectiveSplitAmong(entry, companions);
                            if (splitUserFilter !== 'all' && !splitList.includes(splitUserFilter)) return false;

                            if (!keyword) return true;
                            const categoryText = EXPENSE_CATEGORIES[entry.category] || '其他';
                            const subCategoryText = entry.subCategory || '';
                            const payerName = companions.find(c => c.id === entry.paidBy)?.name || '';
                            const paymentText = `${PAYMENT_METHOD_LABELS[entry.paymentMethod] || ''} ${entry.paymentSourceName || ''}`;
                            return `${entry.nodeTitle || ''} ${entry.note || ''} ${categoryText} ${subCategoryText} ${payerName} ${paymentText}`.toLowerCase().includes(keyword);
                        }).map(entry => ({
                            ...entry,
                            amountInBase: convertCurrencyAmount(Number(entry.amount || 0), entry.currency || 'TWD', splitBaseCurrency, exchangeRatesToTwd)
                        }));

                        const paymentMethodTotals = entriesForSettlement.reduce((acc, entry) => {
                            const key = entry.paymentMethod || 'cash';
                            acc[key] = (acc[key] || 0) + Number(entry.amountInBase || 0);
                            return acc;
                        }, {});

                        const paymentSourceUsage = paymentSources.reduce((acc, source) => {
                            const relatedEntries = entriesForSettlement.filter(entry => entry.paymentSourceId === source.id);
                            const amountInBase = relatedEntries.reduce((sum, entry) => sum + Number(entry.amountInBase || 0), 0);
                            const originalByCurrency = relatedEntries.reduce((innerAcc, entry) => {
                                const cur = entry.currency || 'TWD';
                                innerAcc[cur] = (innerAcc[cur] || 0) + Number(entry.amount || 0);
                                return innerAcc;
                            }, {});
                            const usedNative = source.currency ? Number(originalByCurrency[source.currency] || 0) : null;
                            acc[source.id] = {
                                count: relatedEntries.length,
                                amountInBase,
                                originalByCurrency,
                                usedNative,
                                remainingNative: source.currency ? Math.max(0, Number(source.initialAmount || 0) - Number(originalByCurrency[source.currency] || 0)) : null
                            };
                            return acc;
                        }, {});

                        // 計算每人付款與分攤（依使用人 tags）
                        const summary = companions.map(comp => {
                            const paid = entriesForSettlement.filter(it => it.paidBy === comp.id).reduce((s, it) => s + Number(it.amountInBase || 0), 0);
                            const shouldPay = entriesForSettlement.reduce((s, it) => {
                                const splitList = getEffectiveSplitAmong(it, companions);
                                if (splitList.length === 0) return s;
                                return s + (splitList.includes(comp.id) ? Number(it.amountInBase || 0) / splitList.length : 0);
                            }, 0);
                            return { ...comp, paid, shouldPay, diff: paid - shouldPay };
                        });

                        const settlementSuggestions = calculateSettlementTransfers(summary);

                        const entriesForPersonalReport = includeEstimatedInSplit
                            ? allEntries
                            : allEntries.filter(it => it.expenseStatus !== 'estimated');

                        const companionExpenseReports = companions.map(comp => {
                            const paidEntries = entriesForPersonalReport
                                .filter(it => it.paidBy === comp.id)
                                .map(it => ({
                                    ...it,
                                    amountInBase: convertCurrencyAmount(Number(it.amount || 0), it.currency || 'TWD', splitBaseCurrency, exchangeRatesToTwd)
                                }));

                            const consumedEntries = entriesForPersonalReport.flatMap(it => {
                                const splitList = getEffectiveSplitAmong(it, companions);
                                if (!splitList.includes(comp.id) || splitList.length === 0) return [];
                                const converted = convertCurrencyAmount(Number(it.amount || 0), it.currency || 'TWD', splitBaseCurrency, exchangeRatesToTwd);
                                return [{
                                    ...it,
                                    shareInBase: converted / splitList.length,
                                    splitCount: splitList.length
                                }];
                            });

                            const paidTotal = paidEntries.reduce((sum, it) => sum + Number(it.amountInBase || 0), 0);
                            const consumedTotal = consumedEntries.reduce((sum, it) => sum + Number(it.shareInBase || 0), 0);
                            const categoryTotals = consumedEntries.reduce((acc, it) => {
                                const key = it.category || 'other';
