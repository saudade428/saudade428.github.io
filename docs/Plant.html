            const mapInstance = useRef(null);
            
            useEffect(() => {
                if (!isOpen) return;
                const plan = activePlan;
                if (!plan) return;

                // 收集有 lat/lng 的節點
                const mapNodes = [];
                plan.days.forEach(day => {
                    day.nodes.forEach(node => {
                        const lat = parseFloat(node.lat);
                        const lng = parseFloat(node.lng);
                        if (!isNaN(lat) && !isNaN(lng)) {
                            mapNodes.push({ ...node, lat, lng, dayTitle: day.title });
                        }
                    });
                });

                let center = [23.5, 121];
                if (mapNodes.length > 0) center = [mapNodes[0].lat, mapNodes[0].lng];

                if (!mapInstance.current && mapRef.current) {
                    mapInstance.current = L.map(mapRef.current).setView(center, mapNodes.length > 0 ? 10 : 7);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(mapInstance.current);
                }

                const map = mapInstance.current;
                if (!map) return;
                
                // 清除舊圖層
                map.eachLayer((layer) => {
                    if (layer instanceof L.Marker || layer instanceof L.Polyline) {
                        map.removeLayer(layer);
                    }
                });

                if (mapNodes.length === 0) return;

                const latlngs = [];
                mapNodes.forEach((node) => {
                    const loc = [node.lat, node.lng];
                    latlngs.push(loc);
                    
                    const style = NODE_STYLES[node.type] || DEFAULT_NODE_STYLE;
                    
                    // 自訂 Emoji Marker
                    const customIcon = L.divIcon({
                        className: 'custom-leaflet-marker',
                        html: `<div style="background-color: ${style.bg}; border: 2px solid ${style.border}; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">${style.icon}</div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15],
                        popupAnchor: [0, -15]
                    });

                    const marker = L.marker(loc, { icon: customIcon }).addTo(map);
                    
                    const popupContent = `
                        <div style="font-family: sans-serif; min-width: 150px;">
                            <div style="font-weight: bold; font-size: 14px; margin-bottom: 4px; border-bottom: 2px solid ${style.border}; padding-bottom: 2px;">
                                ${node.title || '未命名'}
                            </div>
                            <div style="font-size: 12px; color: #666; margin-bottom: 2px;">
                                <span style="font-weight:bold; color:#f59e0b;">${node.dayTitle}</span> ${node.time ? '<span style="color:#2563eb;font-weight:bold;margin-left:5px;">'+node.time+'</span>' : ''}
                            </div>
                            ${node.tags ? '<div style="font-size: 10px; color: #888; margin-top:4px;">🏷️ '+node.tags+'</div>' : ''}
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                });

                if (latlngs.length > 1) {
                    L.polyline(latlngs, { color: '#3b82f6', weight: 3, dashArray: '5, 10' }).addTo(map);
                    const bounds = L.latLngBounds(latlngs);
                    map.fitBounds(bounds, { padding: [50, 50] });
                }

                // 解決 Leaflet 在 Modal 顯示時 rendering 尺寸不對的問題
                setTimeout(() => {
                    map.invalidateSize();
                    if (latlngs.length > 1) {
                        map.fitBounds(L.latLngBounds(latlngs), { padding: [50, 50] });
                    }
                }, 150);
            }, [isOpen, activePlan]);

            // 當 modal 關閉時銷毀地圖實例
            useEffect(() => {
                if (!isOpen && mapInstance.current) {
                    mapInstance.current.remove();
                    mapInstance.current = null;
                }
            }, [isOpen]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/60 z-[1400] flex items-center justify-center p-4" onClick={onClose}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[80vh] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="bg-gradient-to-r from-sky-500 to-blue-600 text-white px-6 py-4 flex justify-between items-center shrink-0">
                            <h2 className="text-xl font-bold flex items-center gap-2">
                                <i className="fas fa-map-marked-alt"></i> 行程地圖總覽
                            </h2>

        // --- B5: 單點地圖選取 Modal ---
        const LocationPickerModal = ({ isOpen, nodeData, onClose, onConfirm }) => {
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markerInstance = useRef(null);
            const [tempPos, setTempPos] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [searching, setSearching] = useState(false);
            const [searchError, setSearchError] = useState('');

            const placeMarkerAt = useCallback((lat, lng, zoom = 15) => {
                if (!mapInstance.current) return;
                setTempPos({ lat, lng });
                if (markerInstance.current) {
                    markerInstance.current.setLatLng([lat, lng]);
                } else {
                    markerInstance.current = L.marker([lat, lng], { draggable: true }).addTo(mapInstance.current);
                    markerInstance.current.on('dragend', (ev) => {
                        const pos = ev.target.getLatLng();
                        setTempPos({ lat: pos.lat, lng: pos.lng });
                    });
                }
                mapInstance.current.setView([lat, lng], zoom);
            }, []);

            const handleSearch = useCallback(async () => {
                const q = (searchQuery || '').trim();
                if (!q) {
                    setSearchResults([]);
                    setSearchError('');
                    return;
                }
                setSearching(true);
                setSearchError('');
                try {
                    const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=8&addressdetails=1&q=${encodeURIComponent(q)}`;
                    const res = await fetch(url, {
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    if (!res.ok) throw new Error('search_failed');
                    const data = await res.json();
                    const parsed = (data || [])
                        .map((it) => ({
                            label: it.display_name,
                            lat: Number(it.lat),
                            lng: Number(it.lon)
                        }))
                        .filter((it) => Number.isFinite(it.lat) && Number.isFinite(it.lng));
                    setSearchResults(parsed);
                    if (parsed.length === 0) {
                        setSearchError('查無結果，請改用更完整關鍵字（例如：城市 + 景點名）。');
                    }
                } catch (err) {
                    setSearchError('搜尋失敗，請稍後再試。');
                    setSearchResults([]);
                } finally {
                    setSearching(false);
                }
            }, [searchQuery]);

            useEffect(() => {
                if (!isOpen) return;
                
                const initialLat = nodeData && nodeData.lat ? parseFloat(nodeData.lat) : NaN;
                const initialLng = nodeData && nodeData.lng ? parseFloat(nodeData.lng) : NaN;
                const hasValidInitial = !isNaN(initialLat) && !isNaN(initialLng);
                const center = hasValidInitial ? [initialLat, initialLng] : [23.5, 121]; // 預設台灣中心
                
                if (!mapInstance.current && mapRef.current) {
                    mapInstance.current = L.map(mapRef.current).setView(center, hasValidInitial ? 14 : 7);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(mapInstance.current);

                    mapInstance.current.on('click', (e) => {
                        const { lat, lng } = e.latlng;
                        placeMarkerAt(lat, lng, mapInstance.current.getZoom());
                    });
                } else if (mapInstance.current) {
                    mapInstance.current.setView(center, hasValidInitial ? 14 : 7);
                }

                const map = mapInstance.current;
                
                if (hasValidInitial) {
                    placeMarkerAt(initialLat, initialLng, 14);
                } else {
                    setTempPos(null);
                    if (markerInstance.current && map) {
                        map.removeLayer(markerInstance.current);
                        markerInstance.current = null;
                    }
                }

                setTimeout(() => {
                    if (mapInstance.current) {
                        mapInstance.current.invalidateSize();
                    }
                }, 150);

            }, [isOpen, nodeData]);

            useEffect(() => {
                if (!isOpen) {
                    if (mapInstance.current) {
                        mapInstance.current.remove();
                        mapInstance.current = null;
                        markerInstance.current = null;
                    }
                    setTempPos(null);
                    setSearchQuery('');
                    setSearchResults([]);
                    setSearchError('');
                }
            }, [isOpen]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/60 z-[1450] flex items-center justify-center p-4 transition-opacity" onClick={onClose}>
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl h-[500px] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="bg-slate-800 text-white px-5 py-3 flex justify-between items-center shrink-0">
                            <h2 className="font-bold flex items-center gap-2">
                                <i className="fas fa-map-pin text-red-500"></i> 為「{nodeData?.title || '節點'}」選擇位置
                            </h2>
                            <button onClick={onClose} className="text-white/70 hover:text-white transition-colors">
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                        <div className="p-2 bg-red-50 text-red-800 text-xs font-semibold flex items-center gap-2 shrink-0">
                            <i className="fas fa-hand-pointer ml-2"></i> 請在地圖上點擊以放置圖釘，或直接拖曳紅色圖釘。
                        </div>
                        <div className="px-3 py-2 bg-white border-b border-slate-200 shrink-0">
                            <div className="flex gap-2">
                                <input
                                    type="text"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    onKeyDown={(e) => { if (e.key === 'Enter') handleSearch(); }}
                                    className="flex-1 border border-slate-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
                                    placeholder="搜尋地址/景點（例：台北101、東京車站）"
                                />
                                <button
                                    onClick={handleSearch}
                                    disabled={searching}
                                    className={`px-3 py-2 rounded text-sm font-semibold text-white ${searching ? 'bg-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-500'}`}
                                >
                                    {searching ? '搜尋中...' : '搜尋'}
                                </button>
                            </div>
                            {!!searchError && <div className="text-xs text-rose-600 mt-1">{searchError}</div>}
                            {searchResults.length > 0 && (
                                <div className="mt-2 max-h-32 overflow-y-auto border border-slate-200 rounded bg-slate-50">
                                    {searchResults.map((r, idx) => (
                                        <button
                                            key={`${r.lat}-${r.lng}-${idx}`}
                                            onClick={() => placeMarkerAt(r.lat, r.lng, 16)}
                                            className="w-full text-left px-3 py-2 text-xs text-slate-700 hover:bg-blue-50 border-b border-slate-200 last:border-b-0"
                                            title={r.label}
                                        >
                                            <div className="line-clamp-2">{r.label}</div>
                                            <div className="text-[10px] text-slate-400 mt-0.5">{r.lat.toFixed(6)}, {r.lng.toFixed(6)}</div>
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>
                        <div className="relative flex-1 bg-slate-100">
                            <div ref={mapRef} className="absolute inset-0 z-0"></div>
                        </div>
                        <div className="p-4 bg-slate-50 border-t border-slate-200 flex justify-between items-center shrink-0">
                            <div className="text-sm font-mono text-slate-600 bg-white border border-slate-200 px-3 py-1.5 rounded flex-1 mr-4 shadow-sm flex items-center">
                                {tempPos ? (
                                    <>Lat: <span className="font-bold text-blue-600 ml-1 mr-3">{tempPos.lat.toFixed(6)}</span> Lng: <span className="font-bold text-blue-600 ml-1">{tempPos.lng.toFixed(6)}</span></>
                                ) : (
                                    <span className="text-slate-400 italic">尚未選取任何座標...</span>
                                )}
                            </div>
                            <div className="flex gap-2">
                                <button onClick={onClose} className="px-4 py-2 rounded text-sm font-semibold text-slate-600 hover:bg-slate-200 transition-colors">
                                    取消
                                </button>
                                <button 
                                    onClick={() => onConfirm(tempPos?.lat, tempPos?.lng)} 
                                    disabled={!tempPos}
                                    className={`px-4 py-2 rounded text-sm font-semibold text-white shadow transition-colors flex items-center gap-1 ${tempPos ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-slate-300 cursor-not-allowed'}`}
                                >
                                    <i className="fas fa-check"></i> 確定儲存
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Checklist 相關抽離元件 (Phase 1 效能優化) ---
        const ChecklistCategory = React.memo(({ category, planId, dispatch }) => {

                    <div className="flex items-center justify-between mb-4 pb-2 border-b border-slate-200">

                                    />

                                            title={item.isNote ? "切換為待辦狀態" : "切換為純文字備註"}

                    )}

            );
        });

        const ChecklistView = React.memo(({ checklists = [], progress, planId, dispatch }) => {
            return (
                <div className="max-w-5xl mx-auto mt-6 px-4 md:px-8 mb-12">
                    <div className="bg-white rounded-xl shadow-sm border border-amber-200/50 overflow-hidden">
                        {/* Header */}
                        <div className="bg-gradient-to-r from-amber-100 to-amber-50 px-6 py-5 border-b border-amber-200/50">
                            <div className="flex items-center justify-between flex-wrap gap-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full bg-amber-200 flex items-center justify-center text-amber-700 text-lg shadow-inner">

                                {/* Progress Bar */}

        // --- NodeItem 相關抽離元件 (Phase 1 效能優化) ---

                        <button onClick={() => dispatch({ type: PLAN_ACTIONS.DELETE_CHILD_NODE, payload: { planId, dayId, nodeId, childId: child.id } })} className="text-slate-300 hover:text-red-500 opacity-0 group-hover/child:opacity-100 text-xs ml-1 flex-shrink-0">

        const NodeItem = React.memo(({
            node, dayId, planId, nodeIndex, isDragging, isDragOverTop, isDragOverBottom,
            activePlanLength, otherDays, currentMemos, collapsedNodes, dayNodes, planPaymentSources, dispatch,
            onDragStart, onDragOver, onDragLeave, onDrop, onDragEnd, onAddLocation, onToggleCollapse
        }) => {
            const nodeStyle = NODE_STYLES[node.type] || DEFAULT_NODE_STYLE;
            const isCollapsed = collapsedNodes.has(node.id);
            const expenseItems = normalizeExpenseItems(node);
            const expenseByCurrency = getNodeExpenseByCurrency(node);
            const expenseCurrencyEntries = Object.entries(expenseByCurrency);
            const subtaskCount = (node.subtasks || []).length;
            const childCount = (node.children || []).length;
            const hasExpenseData = expenseItems.length > 0;
            const hasSubtaskData = subtaskCount > 0;
            const hasChildData = childCount > 0;
            const expenseCompactTotalText = expenseCurrencyEntries.length === 0
                ? '0'
                : expenseCurrencyEntries.length === 1
                    ? `${expenseCurrencyEntries[0][0]} ${Number(expenseCurrencyEntries[0][1]).toLocaleString()}`
                    : `多幣別 (${expenseCurrencyEntries.length})`;
            const expenseSummaryText = hasExpenseData
                ? `${expenseItems.length} 筆 · ${Object.entries(expenseByCurrency).map(([cur, amount]) => `${cur} ${Number(amount).toLocaleString()}`).join(' / ')}`
                : '尚未新增';
            const paymentSourcePreview = expenseItems.reduce((acc, item) => {
                const source = (planPaymentSources || []).find(entry => entry.id === item.paymentSourceId);
                const key = source?.name || PAYMENT_METHOD_LABELS[item.paymentMethod] || '未指定';
                if (!acc.includes(key)) acc.push(key);
                return acc;
            }, []);
            const subtaskDoneCount = (node.subtasks || []).filter(s => s?.isCompleted).length;
            const subtaskSummaryText = hasSubtaskData ? `${subtaskDoneCount}/${subtaskCount} 完成` : '尚未新增';
            const childSummaryText = hasChildData ? `${childCount} 個子方案` : '尚未新增';
            const linkedMemos = (currentMemos || []).filter(m => m.linkedNodeId === node.id);

            const [memoPinned, setMemoPinned] = useState(false);
            const [memoHoverOpen, setMemoHoverOpen] = useState(false);
            const [activeMemoId, setActiveMemoId] = useState(null);
            const [memoDraftTitle, setMemoDraftTitle] = useState('');
            const [memoDraftText, setMemoDraftText] = useState('');
            const activeLinkedMemo = linkedMemos.find(m => m.id === activeMemoId) || linkedMemos[0] || null;

            const [sectionCollapsed, setSectionCollapsed] = useState({ expense: true, subtask: true, child: true });
            useEffect(() => {
                setSectionCollapsed({ expense: true, subtask: true, child: true });
            }, [node.id]);
            useEffect(() => {
                setSectionCollapsed(prev => ({
                    expense: hasExpenseData ? prev.expense : true,
                    subtask: hasSubtaskData ? prev.subtask : true,
                    child: hasChildData ? prev.child : true
                }));
            }, [hasExpenseData, hasSubtaskData, hasChildData]);

            useEffect(() => {
                setMemoPinned(false);
                setMemoHoverOpen(false);
                const nextMemo = linkedMemos[0] || null;
                setActiveMemoId(nextMemo?.id || null);
                setMemoDraftTitle(nextMemo?.title || '');
                setMemoDraftText(nextMemo?.text || '');
            }, [node.id]);

            useEffect(() => {
                const stillExists = linkedMemos.some(m => m.id === activeMemoId);
                const nextMemo = stillExists ? linkedMemos.find(m => m.id === activeMemoId) : (linkedMemos[0] || null);
                setActiveMemoId(nextMemo?.id || null);
                setMemoDraftTitle(nextMemo?.title || '');
                setMemoDraftText(nextMemo?.text || '');
            }, [linkedMemos, activeMemoId]);

            const toggleSection = (key) => setSectionCollapsed(prev => ({ ...prev, [key]: !prev[key] }));
            const areAllDetailSectionsCollapsed = sectionCollapsed.expense && sectionCollapsed.subtask && sectionCollapsed.child;
            const toggleAllDetailSections = () => {
                setSectionCollapsed({
                    expense: !areAllDetailSectionsCollapsed,
                    subtask: !areAllDetailSectionsCollapsed,
                    child: !areAllDetailSectionsCollapsed
                });
            };
            const memoExpanded = memoPinned || memoHoverOpen;

            const moveNodeBy = (direction) => {
                if (!Array.isArray(dayNodes)) return;
                const fromIndex = dayNodes.findIndex(n => n.id === node.id);
                const toIndex = fromIndex + direction;
                if (fromIndex === -1 || toIndex < 0 || toIndex >= dayNodes.length) return;
                const next = [...dayNodes];
                const [moved] = next.splice(fromIndex, 1);
                next.splice(toIndex, 0, moved);
                dispatch({
                    type: PLAN_ACTIONS.REORDER_NODES,
                    payload: { planId, dayId, nodes: next }
                });
            };
            
            // 顏色映射函數 - 將 memo color 與視覺style關聯
            const getMemoColorClasses = (colorName) => {
                const colorMap = {
                    'bg-yellow-200': { btn: 'bg-yellow-200', btnAlt: 'bg-yellow-100', border: 'border-yellow-300 text-yellow-800', borderAlt: 'border-yellow-200 text-yellow-700', panel: 'bg-yellow-50 border-yellow-200', panelText: 'text-yellow-700', triangle: 'border-t-yellow-200', triangleAlt: 'border-t-yellow-100', inputBorder: '#fee08b' },
                    'bg-pink-200': { btn: 'bg-pink-200', btnAlt: 'bg-pink-100', border: 'border-pink-300 text-pink-800', borderAlt: 'border-pink-200 text-pink-700', panel: 'bg-pink-50 border-pink-200', panelText: 'text-pink-700', triangle: 'border-t-pink-200', triangleAlt: 'border-t-pink-100', inputBorder: '#fbcfe8' },
                    'bg-blue-200': { btn: 'bg-blue-200', btnAlt: 'bg-blue-100', border: 'border-blue-300 text-blue-800', borderAlt: 'border-blue-200 text-blue-700', panel: 'bg-blue-50 border-blue-200', panelText: 'text-blue-700', triangle: 'border-t-blue-200', triangleAlt: 'border-t-blue-100', inputBorder: '#bfdbfe' },
                    'bg-green-200': { btn: 'bg-green-200', btnAlt: 'bg-green-100', border: 'border-green-300 text-green-800', borderAlt: 'border-green-200 text-green-700', panel: 'bg-green-50 border-green-200', panelText: 'text-green-700', triangle: 'border-t-green-200', triangleAlt: 'border-t-green-100', inputBorder: '#bbf7d0' },
                    'bg-purple-200': { btn: 'bg-purple-200', btnAlt: 'bg-purple-100', border: 'border-purple-300 text-purple-800', borderAlt: 'border-purple-200 text-purple-700', panel: 'bg-purple-50 border-purple-200', panelText: 'text-purple-700', triangle: 'border-t-purple-200', triangleAlt: 'border-t-purple-100', inputBorder: '#e9d5ff' },
                    'bg-orange-200': { btn: 'bg-orange-200', btnAlt: 'bg-orange-100', border: 'border-orange-300 text-orange-800', borderAlt: 'border-orange-200 text-orange-700', panel: 'bg-orange-50 border-orange-200', panelText: 'text-orange-700', triangle: 'border-t-orange-200', triangleAlt: 'border-t-orange-100', inputBorder: '#fed7aa' }
                };
                return colorMap[colorName] || colorMap['bg-yellow-200'];
            };
            
            const activeMemoColor = getMemoColorClasses(activeLinkedMemo?.color || 'bg-yellow-200');
            
            const upsertLinkedMemo = (field, value) => {
                if (activeLinkedMemo) {
                    dispatch({
                        type: PLAN_ACTIONS.UPDATE_MEMO,
                        payload: {
                            planId,
                            dayId,
                            memoId: activeLinkedMemo.id,
                            updatedMemo: {
                                ...activeLinkedMemo,
                                title: field === 'title' ? value : memoDraftTitle,
                                text: field === 'text' ? value : memoDraftText
                            }
                        }
                    });
                    return;
                }

                const nextTitle = field === 'title' ? value : memoDraftTitle;
                const nextText = field === 'text' ? value : memoDraftText;
                const hasAnyInput = (nextTitle || '').trim() !== '' || (nextText || '').trim() !== '';
                if (!hasAnyInput) return;

                dispatch({
                    type: PLAN_ACTIONS.ADD_MEMO,
                    payload: {
                        planId,
                        dayId,
                        memo: {
                            id: generateId(),
                            x: 100,
                            y: 220,
                            width: 224,
                            height: null,
                            title: nextTitle,
                            text: nextText,
                            color: 'bg-yellow-200',
                            image: null,
                            linkedNodeId: node.id,
                            isMinimized: false
                        }
                    }
                });
            };
            const addAnotherLinkedMemo = () => {
                const newMemoId = generateId();
                dispatch({
                    type: PLAN_ACTIONS.ADD_MEMO,
                    payload: {
                        planId,
                        dayId,
                        memo: {
                            id: newMemoId,
                            x: 100,
                            y: 220,
                            width: 224,
                            height: null,
                            title: '',
                            text: '',
                            color: 'bg-yellow-200',
                            image: null,
                            linkedNodeId: node.id,
                            isMinimized: false
                        }
                    }
                });
                setActiveMemoId(newMemoId);
                setMemoDraftTitle('');
                setMemoDraftText('');
            };

            return (
                <div 
                    className={`relative group ${isDragging ? 'node-dragging' : ''} ${isDragOverTop ? 'node-drag-over' : ''} ${isDragOverBottom ? 'node-drag-over-bottom' : ''}`}
                    draggable
                    onDragStart={(e) => onDragStart(e, node.id)}
                    onDragOver={(e) => onDragOver(e, node.id)}
                    onDragLeave={() => onDragLeave(node.id)}
                    onDrop={(e) => onDrop(e, node.id)}
                    onDragEnd={onDragEnd}
                >
                    {/* 時間軸上的點與時間輸入 */}
                    <div className="absolute -left-[2rem] sm:-left-[2.5rem] md:-left-[4.5rem] top-3 hidden sm:flex flex-col items-center z-0 w-12 sm:w-16 group/time">
                        <div 
                            className="relative w-full mb-1 cursor-pointer"
                            onClick={(e) => {
                                const input = e.currentTarget.querySelector('input');
                                if (input && typeof input.showPicker === 'function') {
                                    input.showPicker();
                                } else if (input) {
                                    input.focus();
                                }
                            }}
                        >
                            <input 
                                type="time" 
                                className="absolute inset-0 w-full h-full opacity-0 pointer-events-none z-10"
                                value={node.time || ""}
                                onChange={(e) => dispatch({ type: PLAN_ACTIONS.UPDATE_NODE_TIME, payload: { planId, dayId, nodeId: node.id, time: e.target.value } })}
                            />
                            <div className="text-[9px] sm:text-[10px] md:text-xs font-bold text-slate-400 bg-slate-100/50 py-0.5 px-1 rounded border border-slate-200 hover:border-blue-300 hover:text-blue-500 transition-all text-center leading-tight">
                                {node.time || "時間"}
                            </div>
                        </div>
                        <div className="w-3 h-3 sm:w-4 sm:h-4 rounded-full border-[3px] sm:border-4 border-white shadow bg-white relative z-0" style={{ backgroundColor: nodeStyle.border }}></div>
                    </div>
                    
                    {/* 節點卡片 */}
                    <div 
                        className={`relative overflow-visible ml-0 sm:ml-2 md:ml-4 p-3 md:p-4 rounded-xl border-l-4 shadow-sm transition-all hover:shadow-md bg-white ${isCollapsed ? 'py-2 opacity-80' : ''}`}
                        style={{ 
                            borderLeftColor: nodeStyle.border,
                            borderColor: node.type === 'transit' ? nodeStyle.border : '#e2e8f0' 
                        }}
                    >
                        <div className="sm:hidden mb-2">
                            <div
                                className="relative inline-flex items-center gap-1 rounded-full border border-slate-200 bg-slate-50 px-2 py-0.5 text-[11px] font-semibold text-slate-600 cursor-pointer"
                                onClick={(e) => {
                                    const input = e.currentTarget.querySelector('input');
                                    if (input && typeof input.showPicker === 'function') {
                                        input.showPicker();
                                    } else if (input) {
                                        input.focus();
                                    }
                                }}
                                title="設定節點時間"
                            >
                                <i className="far fa-clock text-[10px]"></i>
                                <span>{node.time || '設定時間'}</span>
                                <input
                                    type="time"
                                    className="absolute inset-0 w-full h-full opacity-0 pointer-events-none"
                                    value={node.time || ""}
                                    onChange={(e) => dispatch({ type: PLAN_ACTIONS.UPDATE_NODE_TIME, payload: { planId, dayId, nodeId: node.id, time: e.target.value } })}
                                />
                            </div>
                        </div>
                        <div
                            className="absolute top-2 right-2 md:right-auto md:left-full md:ml-0 z-30"
                            onMouseEnter={() => setMemoHoverOpen(true)}
                            onMouseLeave={() => { if (!memoPinned) setMemoHoverOpen(false); }}
                        >
                            <div className="flex items-start">
                                <button
                                    onClick={() => {
                                        if (memoPinned) {
                                            setMemoPinned(false);
                                            setMemoHoverOpen(false);
                                        } else {
                                            setMemoPinned(true);
                                            setMemoHoverOpen(true);
                                        }
                                    }}
                                    className={`relative h-16 w-8 rounded-r-lg rounded-l-sm border shadow flex flex-col items-center justify-center gap-0.5 transition-all md:-translate-x-1/2 ${memoExpanded ? `${activeMemoColor.btn} ${activeMemoColor.border}` : `${activeMemoColor.btnAlt} ${activeMemoColor.borderAlt} hover:${activeMemoColor.btn}`}`}
                                    title="節點便利貼"
                                >
                                    <i className="far fa-sticky-note text-[11px]"></i>
                                    {linkedMemos.length > 0 && <span className="text-[9px] font-bold leading-none">{linkedMemos.length}</span>}
                                    <span className={`pointer-events-none absolute -bottom-2 right-0 w-0 h-0 border-r-[16px] border-r-transparent border-l-0 border-t-[8px] ${memoExpanded ? activeMemoColor.triangle : activeMemoColor.triangleAlt}`}></span>
                                </button>
                                {memoExpanded && (
                                    <div className={`w-64 rounded-lg p-2 shadow-xl ml-1 border ${activeMemoColor.panel}`}>
                                        <div className="flex items-center justify-between mb-1">
                                            <div className={`text-[10px] font-bold ${activeMemoColor.panelText}`}><i className="far fa-sticky-note"></i></div>
                                            <div className="flex items-center gap-1">
                                                <button
                                                    onClick={addAnotherLinkedMemo}
                                                    className={`text-[10px] px-1.5 py-0.5 rounded border bg-white hover:${activeMemoColor.btnAlt} transition-colors`}
                                                    style={{ borderColor: `${activeMemoColor.panelText}` }}
                                                    title="新增書籤"
                                                >
                                                    <i className="fas fa-plus"></i>
                                                </button>
                                                <button
                                                    onClick={() => setMemoPinned(v => !v)}
                                                    className={`text-[10px] px-1.5 py-0.5 rounded border transition-all ${memoPinned ? `${activeMemoColor.btn} ${activeMemoColor.border}` : `bg-white hover:${activeMemoColor.btnAlt}`}`}
                                                    style={!memoPinned ? { borderColor: activeMemoColor.panelText.replace('text-', 'border-') } : {}}
                                                    title={memoPinned ? '取消釘選' : '釘選'}
                                                >
                                                    <i className="fas fa-thumbtack"></i>
                                                </button>
                                                <button
                                                    onClick={() => {
                                                        const colors = ['bg-yellow-200', 'bg-pink-200', 'bg-blue-200', 'bg-green-200', 'bg-purple-200', 'bg-orange-200'];
                                                        const idx = colors.indexOf(activeLinkedMemo?.color || 'bg-yellow-200');
                                                        const nextIdx = (idx + 1) % colors.length;
                                                        if (activeLinkedMemo) {
                                                            dispatch({
                                                                type: PLAN_ACTIONS.UPDATE_MEMO,
                                                                payload: {
                                                                    planId,
                                                                    dayId,
                                                                    memoId: activeLinkedMemo.id,
                                                                    updatedMemo: { ...activeLinkedMemo, color: colors[nextIdx] }
                                                                }
                                                            });
                                                        }
                                                    }}
                                                    className="text-[10px] px-1.5 py-0.5 rounded border border-slate-200 bg-white hover:bg-slate-50 text-slate-600"
                                                    title="切換顏色"
                                                >
                                                    <i className="fas fa-palette"></i>
                                                </button>
                                                {activeLinkedMemo && (
                                                    <button
                                                        onClick={() => {
                                                            const rest = linkedMemos.filter(m => m.id !== activeLinkedMemo.id);
                                                            dispatch({ type: PLAN_ACTIONS.DELETE_MEMO, payload: { planId, dayId, memoId: activeLinkedMemo.id } });
                                                            setActiveMemoId(rest[0]?.id || null);
                                                            setMemoDraftTitle(rest[0]?.title || '');
                                                            setMemoDraftText(rest[0]?.text || '');
                                                        }}
                                                        className="text-[10px] px-1.5 py-0.5 rounded border border-rose-200 text-rose-600 hover:bg-rose-50"
                                                        title="刪除備忘"
                                                    >
                                                        <i className="fas fa-trash-alt"></i>
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                        {linkedMemos.length > 0 && (
                                            <div className="flex items-center gap-1 mb-1 overflow-x-auto hide-scrollbar">
                                                {linkedMemos.map((m, idx) => {
                                                    const isActive = m.id === (activeLinkedMemo?.id || '');
                                                    const memoColorClasses = getMemoColorClasses(m.color || 'bg-yellow-200');
                                                    return (
                                                        <button
                                                            key={m.id}
                                                            onClick={() => {
                                                                setActiveMemoId(m.id);
                                                                setMemoDraftTitle(m.title || '');
                                                                setMemoDraftText(m.text || '');
                                                            }}
                                                            className={`shrink-0 text-[10px] px-2 py-0.5 rounded border transition-all ${isActive ? `${memoColorClasses.btn} ${memoColorClasses.border}` : `bg-white hover:${memoColorClasses.btnAlt}`}`}
                                                            title={m.title || `書籤 ${idx + 1}`}
                                                        >
                                                            {m.title?.trim() ? m.title.slice(0, 8) : `書籤${idx + 1}`}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        )}
                                        <input
                                            className="w-full text-xs bg-white rounded px-2 py-1 mb-1 border"
                                            style={{ borderColor: activeMemoColor.inputBorder }}
                                            value={memoDraftTitle}
                                            onChange={(e) => {
                                                const next = e.target.value;
                                                setMemoDraftTitle(next);
                                                upsertLinkedMemo('title', next);
                                            }}
                                            placeholder="標題（可留白）"
                                        />
                                        <textarea
                                            className="w-full text-xs bg-white rounded px-2 py-1 min-h-[78px] border"
                                            style={{ borderColor: activeMemoColor.inputBorder }}
                                            value={memoDraftText}
                                            onChange={(e) => {
                                                const next = e.target.value;
                                                setMemoDraftText(next);
                                                upsertLinkedMemo('text', next);
                                            }}
                                            placeholder="滑到此節點即可直接編輯..."
                                        />
                                        {!activeLinkedMemo && (memoDraftTitle.trim() === '' && memoDraftText.trim() === '') && (
                                            <div className={`text-[10px] mt-1 ${activeMemoColor.panelText}`}>尚未建立資料，開始輸入後會自動綁定到此節點。</div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {node.type === 'transit' ? (
                            <div className="mb-2">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-2">
                                    <div className="w-full">
                                        <div className="flex items-start gap-2 w-full flex-wrap sm:flex-nowrap">
                                        <span className="node-drag-handle p-1 hidden sm:flex items-center justify-center cursor-move" title="拖曳排序">
                                            <i className="fas fa-grip-vertical text-slate-300"></i>
                                        </span>
                                        <select 
                                            className="text-xs font-bold bg-slate-50 border-none rounded p-1 focus:ring-0 cursor-pointer shrink-0"
                                            value={node.type}
                                            onChange={(e) => dispatch({ type: PLAN_ACTIONS.UPDATE_NODE_TYPE, payload: { planId, dayId, nodeId: node.id, type: e.target.value } })}
                                        >
                                            <option value="activity">📍 活動</option>
                                            <option value="restaurant">🍽️ 餐廳</option>
                                            <option value="hotel">🏨 住宿</option>
                                            <option value="transit">🚃 交通</option>
                                        </select>
                                        
                                        <div className="w-full sm:flex-1 flex flex-col sm:flex-row items-center gap-2 sm:mx-1">
                                            <input 
                                                className="font-bold text-sm text-slate-700 bg-transparent border-b border-transparent focus:border-blue-400 focus:outline-none w-full sm:w-1/2"
                                                value={node.startPoint || ""}
                                                onChange={(e) => dispatch({ type: PLAN_ACTIONS.UPDATE_NODE_FIELD, payload: { planId, dayId, nodeId: node.id, field: 'startPoint', value: e.target.value } })}
                                                placeholder="起點站..."
                                            />
                                            <i className="fas fa-long-arrow-alt-right text-slate-300 hidden sm:block"></i>
                                            <input 
                                                className="font-bold text-sm text-slate-700 bg-transparent border-b border-transparent focus:border-blue-400 focus:outline-none w-full sm:w-1/2"
                                                value={node.endPoint || ""}
                                                onChange={(e) => dispatch({ type: PLAN_ACTIONS.UPDATE_NODE_FIELD, payload: { planId, dayId, nodeId: node.id, field: 'endPoint', value: e.target.value } })}
                                                placeholder="終點站..."
                                            />
                                        </div>

                                        <div className="mt-2 flex items-center gap-1 flex-wrap sm:justify-end">
                                            <button
                                                onClick={() => moveNodeBy(-1)}
                                                className="sm:hidden p-1 rounded-full text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors"
                                                title="上移"
                                            >
                                                <i className="fas fa-arrow-up"></i>
                                            </button>
                                            <button
                                                onClick={() => moveNodeBy(1)}
                                                className="sm:hidden p-1 rounded-full text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors"
                                                title="下移"
                                            >
                                                <i className="fas fa-arrow-down"></i>
                                            </button>
                                            <button 
                                                onClick={() => onAddLocation(dayId, node.id, node.lat, node.lng, node.title)}
                                                className={`p-1 rounded-full transition-colors ${node.lat ? 'text-blue-500 bg-blue-50' : 'text-slate-300 hover:text-blue-500 hover:bg-slate-100'}`}
                                                title={node.lat ? "已設定座標" : "設定導航座標"}
                                            >
                                                <i className="fas fa-map-marker-alt"></i>
                                            </button>
                                            <button 
                                                onClick={() => dispatch({ type: PLAN_ACTIONS.DUPLICATE_NODE, payload: { planId, dayId, nodeId: node.id } })}
                                                className="text-slate-300 hover:text-blue-500 p-1" title="複製此節點"
                                            >
                                                <i className="far fa-copy"></i>
                                            </button>
                                            <button 
                                                onClick={() => onToggleCollapse(node.id)}
                                                className="p-1 rounded-full text-slate-300 hover:text-slate-500 hover:bg-slate-100 transition-colors"
                                            >
                                                <i className={`fas ${isCollapsed ? 'fa-chevron-down' : 'fa-chevron-up'}`}></i>
                                            </button>
                                            <button
                                                onClick={toggleAllDetailSections}
                                                className="p-1 rounded-full text-slate-300 hover:text-indigo-500 hover:bg-indigo-50 transition-colors"
                                                title={areAllDetailSectionsCollapsed ? '展開細節區塊' : '收合細節區塊'}
                                            >
                                                <i className={`fas ${areAllDetailSectionsCollapsed ? 'fa-expand-alt' : 'fa-compress-alt'}`}></i>
                                            </button>
                                            <button onClick={() => dispatch({ type: PLAN_ACTIONS.DELETE_NODE, payload: { planId, dayId, nodeId: node.id } })} className="text-slate-300 hover:text-red-500 p-1">
                                                <i className="fas fa-trash-alt"></i>
                                            </button>
                                        </div>
                                    </div>
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-2 items-center">
                                    <input 
                                        className="text-xs text-slate-500 bg-slate-50 rounded px-2 py-1 border-none focus:ring-1 focus:ring-blue-200 w-full sm:w-auto flex-1"
                                        value={node.title || ""}
                                        onChange={(e) => dispatch({ type: PLAN_ACTIONS.UPDATE_NODE_TITLE, payload: { planId, dayId, nodeId: node.id, title: e.target.value } })}
                                        placeholder="交通工具說明 (例如：搭乘捷運淡水線)..."
                                    />
                                    <div className="flex items-center gap-1 bg-blue-50 px-2 py-1 rounded text-blue-600">
                                        <i className="far fa-clock text-[10px]"></i>
                                        <input 
                                            className="text-[10px] font-bold bg-transparent border-none w-16 focus:ring-0 p-0"
                                            value={node.duration || ""}
                                            onChange={(e) => dispatch({ type: PLAN_ACTIONS.UPDATE_NODE_FIELD, payload: { planId, dayId, nodeId: node.id, field: 'duration', value: e.target.value } })}
                                            placeholder="預估時長"
                                        />
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="flex justify-between items-start gap-4 mb-2">
                                <div className="flex-1 min-w-0">
                                    <div className="flex items-center gap-2 mb-1 flex-wrap">
                                        <span className="node-drag-handle p-1 hidden sm:flex items-center justify-center cursor-move" title="拖曳排序">
                                            <i className="fas fa-grip-vertical text-slate-300"></i>
                                        </span>
                                        <select 
                                            className="text-xs font-bold bg-slate-100 border-none rounded p-1 focus:ring-0 cursor-pointer"
                                            value={node.type}
                                            onChange={(e) => dispatch({ type: PLAN_ACTIONS.UPDATE_NODE_TYPE, payload: { planId, dayId, nodeId: node.id, type: e.target.value } })}
                                        >
                                            <option value="activity">📍 活動</option>
                                            <option value="restaurant">🍽️ 餐廳</option>
                                            <option value="hotel">🏨 住宿</option>
                                            <option value="transit">🚃 交通</option>
                                        </select>
                                        <input

        const BudgetView = React.memo(({ activePlan, splitBaseCurrency = 'TWD', exchangeRatesToTwd = DEFAULT_EXCHANGE_RATES_TO_TWD, includeEstimated = false, embedded = false }) => {
            const allNodes = activePlan.days.flatMap(d => d.nodes);
            const costItems = allNodes.flatMap(n =>
                normalizeExpenseItems(n)
                    .filter(it => Number(it.amount || 0) > 0)
                    .filter(it => includeEstimated || it.expenseStatus !== 'estimated')
                    .map(it => ({
                        ...it,
                        nodeType: n.type,
                        amountInBase: convertCurrencyAmount(Number(it.amount || 0), it.currency || 'TWD', splitBaseCurrency, exchangeRatesToTwd)
                    }))
            );

            if (costItems.length === 0) {
                return (
                    <div className={`text-center text-slate-400 ${embedded ? 'py-10' : 'py-20'}`}>
                        <i className="fas fa-wallet text-4xl mb-4 block text-slate-300"></i>
                        <p className="text-lg font-medium">尚無任何花費紀錄</p>
                        <p className="text-sm mt-2">請在節點中填寫預估花費，這裡將自動產生分析圖表</p>
                    </div>
                );
            }

            const pieData = costItems.reduce((acc, it) => {
                const amount = Number(it.amountInBase || 0);
                acc[it.nodeType] = (acc[it.nodeType] || 0) + amount;
                return acc;
            }, {});
            const totalCost = Object.values(pieData).reduce((a, b) => a + b, 0);

            // 需備現鈔統計
            const cashData = costItems.filter(it => !it.paymentStatus || it.paymentStatus === 'cash').reduce((acc, it) => {
                const amount = Number(it.amount) || 0;
                acc[it.currency] = (acc[it.currency] || 0) + amount;
                return acc;
            }, {});
            
            const totalStatsByCurrency = costItems.reduce((acc, it) => {
                const amount = Number(it.amount) || 0;
                if (!acc[it.currency]) acc[it.currency] = { total: 0, cash: 0, sunk: 0 };
                acc[it.currency].total += amount;
                if (!it.paymentStatus || it.paymentStatus === 'cash') acc[it.currency].cash += amount;
                else acc[it.currency].sunk += amount;
                return acc;
            }, {});

            const dailyCosts = activePlan.days.map(d => {
                const cost = d.nodes.reduce((sum, n) => {
                    const nodeSum = normalizeExpenseItems(n)
                        .filter(it => Number(it.amount || 0) > 0)
                        .filter(it => includeEstimated || it.expenseStatus !== 'estimated')
                        .reduce((inner, it) => inner + convertCurrencyAmount(Number(it.amount || 0), it.currency || 'TWD', splitBaseCurrency, exchangeRatesToTwd), 0);
                    return sum + nodeSum;
                }, 0);
                return { id: d.id, title: d.title, cost };
            });
            const maxDailyCost = Math.max(...dailyCosts.map(d => d.cost), 1);

            const PieChart = ({ data, total }) => {
                const canvasRef = useRef(null);
                useEffect(() => {
                    const canvas = canvasRef.current;
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    const w = canvas.width;
                    const h = canvas.height;
                    const cx = w / 2;
                    const cy = h / 2;
                    const r = Math.min(w, h) / 2 - 10;
                    ctx.clearRect(0, 0, w, h);
                    let startAngle = -Math.PI / 2;
                    Object.entries(data).forEach(([type, value]) => {
                        if (value <= 0) return;
                        const sliceAngle = (value / total) * 2 * Math.PI;
                        const style = NODE_STYLES[type] || DEFAULT_NODE_STYLE;
                        ctx.beginPath();
                        ctx.moveTo(cx, cy);
                        ctx.arc(cx, cy, r, startAngle, startAngle + sliceAngle);
                        ctx.closePath();
                        ctx.fillStyle = style.bg;
                        ctx.fill();
                        ctx.lineWidth = 1.5;
                        ctx.strokeStyle = style.border;
                        ctx.stroke();
                        startAngle += sliceAngle;
                    });
                    ctx.beginPath();
                    ctx.arc(cx, cy, r * 0.5, 0, 2 * Math.PI);
                    ctx.fillStyle = 'white';
                    ctx.fill();
                }, [data, total]);
                return <canvas ref={canvasRef} width="200" height="200" className="mx-auto block" />;
            };

        const GanttView = React.memo(({ activePlan }) => {
            const START_HOUR = 6;
            const END_HOUR = 24;
            const TOTAL_HOURS = END_HOUR - START_HOUR;
            const timeLabels = [];
            for (let i = START_HOUR; i <= END_HOUR; i++) timeLabels.push(`${i.toString().padStart(2, '0')}:00`);
            const timeToRatio = (timeStr) => {
                if (!timeStr) return null;
                const [h, m] = timeStr.split(':').map(Number);
                if (isNaN(h) || isNaN(m)) return null;
                let hour = h;
                if (hour < START_HOUR) hour += 24;
                if (hour > END_HOUR && hour < 24 + START_HOUR) return 1;
                const totalMins = (hour - START_HOUR) * 60 + m;
                return Math.max(0, Math.min(1, totalMins / (TOTAL_HOURS * 60)));
            };

        // --- 主應用程式元件 ---
        const App = () => {
            const [data, _dispatchRaw] = useReducer(planReducer, null, () => {

            const [activeDayId, setActiveDayId] = useState('checklist');

            const MAX_HISTORY = 50;
            const SNAPSHOT_STORAGE_KEY = 'travelPlanSnapshotsV1';
            const SPLIT_SETTINGS_STORAGE_KEY = 'travelSplitSettingsV1';
            const MAX_SNAPSHOTS = 15;
            const AUTO_SNAPSHOT_ACTIONS = new Set([
                PLAN_ACTIONS.ADD_DAY,
                PLAN_ACTIONS.DELETE_DAY,
                PLAN_ACTIONS.ADD_PLAN,
                PLAN_ACTIONS.DELETE_PLAN,
                PLAN_ACTIONS.ADD_NODE,
                PLAN_ACTIONS.DELETE_NODE,
                PLAN_ACTIONS.REORDER_NODES,
                PLAN_ACTIONS.MOVE_NODE_TO_DAY,
                PLAN_ACTIONS.SWAP_DAYS
            ]);
            const dataRef = useRef(data);
            dataRef.current = data;
            const historyRef = useRef({ past: [], future: [] });
            const skipHistoryRef = useRef(false);
            const [, forceRender] = useState(0);
            const [snapshots, setSnapshots] = useState(() => {
                try {
                    const raw = localStorage.getItem(SNAPSHOT_STORAGE_KEY);
                    const parsed = raw ? JSON.parse(raw) : [];
                    return Array.isArray(parsed) ? parsed : [];
                } catch {
                    return [];
                }
            });

            useEffect(() => {
                try {
                    localStorage.setItem(SNAPSHOT_STORAGE_KEY, JSON.stringify(snapshots));
                } catch (e) {
                    console.warn('snapshot 存檔失敗', e);
                }
            }, [snapshots]);

            const createSnapshot = useCallback((label, snapshotData = dataRef.current) => {
                const entry = {
                    id: generateId(),
                    label: label || '手動快照',
                    createdAt: Date.now(),
                    data: snapshotData
                };
                setSnapshots(prev => [entry, ...prev].slice(0, MAX_SNAPSHOTS));
            }, []);

            const dispatch = useCallback((action) => {
                if (action.type !== PLAN_ACTIONS.SET_DATA && !skipHistoryRef.current) {
                    historyRef.current.past = [...historyRef.current.past, dataRef.current].slice(-MAX_HISTORY);
                    historyRef.current.future = [];
                    if (AUTO_SNAPSHOT_ACTIONS.has(action.type)) {
                        const ts = new Date().toLocaleString('zh-TW', { hour12: false });
                        createSnapshot(`自動快照 ${action.type} (${ts})`, dataRef.current);
                    }
                }
                skipHistoryRef.current = false;
                _dispatchRaw(action);
                forceRender(n => n + 1);
            }, [createSnapshot]);

            const setData = useCallback((newDataOrUpdater) => {
                const prev = dataRef.current;
                const newData = typeof newDataOrUpdater === 'function' ? newDataOrUpdater(prev) : newDataOrUpdater;
                dispatch({ type: PLAN_ACTIONS.SET_DATA, payload: newData });
            }, [dispatch]);

            const undo = useCallback(() => {
                if (historyRef.current.past.length === 0) return;
                const prevData = historyRef.current.past[historyRef.current.past.length - 1];
                historyRef.current.past = historyRef.current.past.slice(0, -1);
                historyRef.current.future = [dataRef.current, ...historyRef.current.future];
                skipHistoryRef.current = true;
                dispatch({ type: PLAN_ACTIONS.SET_DATA, payload: prevData });
                forceRender(n => n + 1);
            }, []);

            const redo = useCallback(() => {
                if (historyRef.current.future.length === 0) return;
                const nextData = historyRef.current.future[0];
                historyRef.current.past = [...historyRef.current.past, dataRef.current];
                historyRef.current.future = historyRef.current.future.slice(1);
                skipHistoryRef.current = true;
                dispatch({ type: PLAN_ACTIONS.SET_DATA, payload: nextData });
                forceRender(n => n + 1);
            }, []);

            const canUndo = historyRef.current.past.length > 0;
            const canRedo = historyRef.current.future.length > 0;

            useEffect(() => {
                const handler = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
                    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
                    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [undo, redo]);



            // --- 拖曳排序狀態 ---
            const [dragNodeId, setDragNodeId] = useState(null);

                    next.has(nodeId) ? next.delete(nodeId) : next.add(nodeId);
                    return next;
                });
            };
            const collapseAll = () => { if (activeDay) setCollapsedNodes(new Set(activeDay.nodes.map(n => n.id))); };
            const expandAll = () => setCollapsedNodes(new Set());

            // --- A4: 跨天拖曳至 Day Tab ---
            const [dragOverDayId, setDragOverDayId] = useState(null);

            // --- 拖曳排序實作 ---
            const handleDragStart = useCallback((e, nodeId) => {
                setDragNodeId(nodeId);
                if (e.dataTransfer) {
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', nodeId);
                }
            }, []);

            const handleDragOver = useCallback((e, nodeId) => {
                e.preventDefault();
                if (nodeId === dragNodeId) return;
                
                const rect = e.currentTarget.getBoundingClientRect();
                const relativeY = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
                const position = relativeY < rect.height / 2 ? 'top' : 'bottom';
                
                setDragOverNodeId(nodeId);
                setDragOverPosition(position);
            }, [dragNodeId]);

            const handleDrop = useCallback((e, targetNodeId) => {
                e.preventDefault();
                if (!dragNodeId || dragNodeId === targetNodeId || !activeDay) return;

                const nodes = [...activeDay.nodes];
                const dragIdx = nodes.findIndex(n => n.id === dragNodeId);
                if (dragIdx === -1) return;
                
                const dragNode = nodes[dragIdx];
                nodes.splice(dragIdx, 1);

                let dropIdx = nodes.findIndex(n => n.id === targetNodeId);
                if (dragOverPosition === 'bottom') dropIdx += 1;
                nodes.splice(dropIdx, 0, dragNode);

                dispatch({ 
                    type: PLAN_ACTIONS.REORDER_NODES, 
                    payload: { planId: activePlan.id, dayId: activeDay.id, nodes } 
                });

                handleDragEnd();
            }, [dragNodeId, dragOverPosition, activeDay, activePlan, dispatch]);

            const handleDragEnd = useCallback(() => {

            // --- C3: Google Maps 導航路線產生 ---

                // Google 導航網址上限通常能吃 10~25 個點，若是超長可以考慮提示
                if (waypoints.length > 25) {
                    alert('⚠️ 注意：座標點超過 25 個，Google Maps 可能無法完全載入所有中途停靠點。');
                }

                const url = `https://www.google.com/maps/dir/${waypoints.join('/')}`;
                window.open(url, '_blank', 'noopener,noreferrer');

            // --- 其他 UI 控制邏輯 ---
            const [showCompare, setShowCompare] = useState(false);
            const [compareDays, setCompareDays] = useState([null, null]);

            const headerRef = useRef(null);

            const [stickyTopOffset, setStickyTopOffset] = useState(0);

            const [showMapModal, setShowMapModal] = useState(false);
            const [showMoreMenu, setShowMoreMenu] = useState(false);

                        issues.push(`D${dayIdx + 1}：沒有任何節點，建議至少補上交通與住宿。`);

                    const conflicts = detectDayConflicts(day);
                    conflicts.forEach(c => {

                    const timed = day.nodes
                        .map(n => ({ title: n.title || '未命名', time: n.time, min: parseTimeToMinutes(n.time) }))
                        .filter(n => n.min !== null)
                        .sort((a, b) => a.min - b.min);

                    for (let i = 1; i < timed.length; i += 1) {
                        const gap = timed[i].min - timed[i - 1].min;
                        if (gap > 0 && gap < 20) {
                            issues.push(`D${dayIdx + 1}：${timed[i - 1].title} 與 ${timed[i].title} 僅間隔 ${gap} 分鐘，轉場可能過緊。`);
                        }
                    }
                });

                if (issues.length === 0) {
                    alert(`健康檢查完成：${activePlan.name} 未發現明顯衝突。`);
                    return;
                }

                const shown = issues.slice(0, 12);
                const more = issues.length > shown.length ? `\n...另有 ${issues.length - shown.length} 項，建議逐日檢查。` : '';

            const PDF_FORMATS = {

            const mmToPx = (mm) => (mm * 96) / 25.4;

                const formatKey = (settings.format || 'a4').toLowerCase();
                const fmt = PDF_FORMATS[formatKey] || PDF_FORMATS.a4;
                const isLandscape = (settings.orientation || 'portrait') === 'landscape';
                const margin = Math.max(0, Number(settings.margin || 10));
                const pageWmm = isLandscape ? fmt.h : fmt.w;
                const pageHmm = isLandscape ? fmt.w : fmt.h;
                const printableWmm = Math.max(60, pageWmm - (margin * 2));
                const printableHmm = Math.max(80, pageHmm - (margin * 2));
                const containerWidth = Math.round(mmToPx(printableWmm));
                const printableHeightPx = mmToPx(printableHmm);
                const marginPx = mmToPx(margin);
                const contentPaddingPx = Math.max(12, Math.round(marginPx * 0.45));
                const paperSize = PAPER_SIZE_MAP[formatKey] || 'A4';
                return {
                    formatKey,
                    fmt,
                    isLandscape,
                    margin,
                    pageWmm,
                    pageHmm,
                    printableWmm,
                    printableHmm,
                    containerWidth,
                    printableHeightPx,

                        const cur = it.currency || 'TWD';

                        acc[cur].byType[n.type] = (acc[cur].byType[n.type] || 0) + val;
                    });
                    return acc;
                }, {});

                    const sortedTypes = Object.entries(stats.byType).sort((a,b) => b[1] - a[1]);

                            <div style="display:flex;justify-content:space-between;padding:8px 0;align-items:baseline;">
                                <span style="color:#64748b;font-weight:900;font-size:12px;letter-spacing:1px;">${cur}</span>
                                <span style="font-size:20px;font-weight:900;color:#0f172a;">${stats.total.toLocaleString()}</span>
                            </div>
                            <div style="height:8px;background:#f1f5f9;border-radius:4px;display:flex;overflow:hidden;margin-top:4px;">
                                ${sortedTypes.map(([type, val]) => {
                                    const pct = (val / stats.total) * 100;
                                    const style = NODE_STYLES[type] || DEFAULT_NODE_STYLE;
                                    return `<div style="width:${pct}%;background:${style.border};" title="${style.label}: ${val.toLocaleString()}"></div>`;
                                }).join('')}
                            </div>
