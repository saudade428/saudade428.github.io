<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊動態規劃系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (改用 cdnjs 提高本地檔案相容性) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <!-- FontAwesome Icons (取代 Lucide，避免 React DOM 衝突) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Leaflet JS & CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- html2canvas + jsPDF (PDF 匯出) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        html { font-size: 16px; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .timeline-line { position: absolute; left: 1.25rem; top: 0; bottom: 0; width: 2px; background-color: #cbd5e1; z-index: 0; }
        @media (max-width: 640px) {
            .timeline-line { left: 0.8rem; width: 1.5px; }
        }
        .memo-drag-handle { cursor: grab; }
        .memo-drag-handle:active { cursor: grabbing; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 自動增高 textarea */
        .auto-resize-textarea {
            overflow: hidden;
            resize: none;
            min-height: 1.5em;
        }
        /* 子節點水平捲動區 */
        .children-scroll::-webkit-scrollbar { height: 4px; }
        .children-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        /* 色票圓點 */
        .color-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
        .color-dot:hover, .color-dot.active { border-color: rgba(0,0,0,0.5); }
        /* 備忘錄圖片 */
        .memo-image { max-width: 100%; max-height: 120px; object-fit: cover; border-radius: 4px; }
        /* 拖曳排序 */
        .node-drag-handle { cursor: grab; color: #94a3b8; transition: color 0.15s; }
        .node-drag-handle:hover { color: #475569; }
        .node-drag-handle:active { cursor: grabbing; }
        .node-dragging { opacity: 0.4; }
        .node-drag-over { box-shadow: 0 -3px 0 0 #3b82f6; }
        .node-drag-over-bottom { box-shadow: 0 3px 0 0 #3b82f6; }
        /* 備忘錄調整大小把手 */
        .memo-resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.15) 50%);
            border-radius: 0 0 6px 0;
        }
        .memo-resize-handle:hover {
            background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.3) 50%);
        }
        /* 時間選擇器優化 */
        input[type="time"] { 
            appearance: none; 
            -moz-appearance: textfield;
            font-family: inherit;
        }
        input[type="time"]::-webkit-datetime-edit {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        input[type="time"]::-webkit-datetime-edit-ampm-field {
            font-size: 0.8em;
            margin-bottom: -2px;
        }

        /* 1080p 與大螢幕可讀性提升 */
        @media (min-width: 1400px) and (min-height: 850px) {
            html { font-size: 17px; }
            body { line-height: 1.6; }
        }

        @media (min-width: 1800px) and (min-height: 950px) {
            html { font-size: 18px; }
        }

        /* 避免 UI 出現過小字級 */
        @media (min-width: 1280px) {
            .text-\[9px\] { font-size: 0.72rem !important; }
            .text-\[10px\] { font-size: 0.79rem !important; }
            .text-xs { font-size: 0.85rem !important; }
        }

        /* 手機維持清晰可讀，不讓字再縮太小 */
        @media (max-width: 640px) {
            html { font-size: 15px; }
            .text-\[9px\], .text-\[10px\], .text-xs { font-size: 0.8rem !important; }
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- 防呆提示：如果在編譯前看到這個，代表腳本還在載入或被阻擋 -->
        <div style="text-align: center; margin-top: 20vh; color: #64748b; font-family: sans-serif;">
            <h2 style="font-size: 1.5rem; margin-bottom: 10px;">系統載入中，請稍候...</h2>
            <p>如果畫面持續停留在這裡，請確保您的網路連線正常，且瀏覽器允許執行 JavaScript。</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useReducer, useMemo } = React;
        
        const APP_VERSION = '2026-03-12-001';

        // --- C3: 天氣圖示選項 ---
        const WEATHER_CONDITIONS = [
            { value: 'sunny', icon: '☀️', label: '晴天' },
            { value: 'partly_cloudy', icon: '⛅', label: '多雲' },
            { value: 'cloudy', icon: '☁️', label: '陰天' },
            { value: 'rainy', icon: '🌧️', label: '雨天' },
            { value: 'stormy', icon: '⛈️', label: '雷雨' },
            { value: 'snowy', icon: '❄️', label: '下雪' },
            { value: 'windy', icon: '🌬️', label: '強風' },
            { value: 'hot', icon: '🌡️', label: '酷熱' },
        ];

        // --- C1: 旅伴顏色 ---
        const COMPANION_COLORS = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];

        // --- 預設初始資料 ---
        const initialData = {
            plans: [
                {
                    id: "plan-a",
                    name: "我的旅程",
                    companions: [],
                    days: [
                        {
                            id: "day-1",
                            title: "第一天",
                            subtitle: "美好的開始",
                            journal: "",
                            weather: { condition: '', tempHigh: '', tempLow: '' },
                            nodes: [
                                { id: "n1", title: "抵達機場", type: "location", time: "10:00", tags: "第一站", subtasks: [], children: [] },
                                { id: "n2", title: "飯店 Check-in", type: "hotel", time: "15:00", tags: "住宿", subtasks: [], children: [] }
                            ],
                            memos: [
                                { id: "memo-1", x: 50, y: 250, width: 224, height: null, title: "教學小提示", text: "您可以自由拖曳這個備忘錄，或點擊右上角更換顏色。也可以從右下角拖曳改變大小！", color: "bg-yellow-200", image: null, linkedNodeId: null, isMinimized: false },
                            ]
                        }
                    ],
                    checklists: [
                        { id: "cl-1", category: "文件與財務", items: [{ id: "cli-1", text: "護照 (確認效期6個月以上)", isChecked: false }, { id: "cli-2", text: "支付方式 / 工具確認（刷卡、電子支付）", isChecked: false }, { id: "cli-3", text: "自備現鈔（含小額零錢）", isChecked: false }] },
                        { id: "cl-2", category: "電子產品", items: [{ id: "cli-3", text: "esim 網卡或 Wifi 機", isChecked: false }, { id: "cli-4", text: "行動電源與充電線", isChecked: false }] },
                        { id: "cl-3", category: "生活衣物", items: [{ id: "cli-5", text: "換洗衣物與外套", isChecked: false }, { id: "cli-6", text: "個人常備藥品", isChecked: false }] }
                    ]
                }
            ]
        };

        const ensureChecklistFinancialEssentials = (rawData) => {
            if (!rawData || !Array.isArray(rawData.plans)) return initialData;

            const createPaymentMethodItem = () => ({
                id: generateId(),
                text: '支付方式 / 工具確認（刷卡、電子支付）',
                isChecked: false
            });

            const createCashItem = () => ({
                id: generateId(),
                text: '自備現鈔（含小額零錢）',
                isChecked: false
            });

            return {
                ...rawData,
                plans: rawData.plans.map((plan) => {
                    const checklists = Array.isArray(plan.checklists) ? [...plan.checklists] : [];
                    const financialIndex = checklists.findIndex((cat) => cat?.category === '文件與財務');
                    const paymentMatcher = /(支付方式|支付工具|電子支付|行動支付|apple pay|google pay|line pay)/i;
                    const cashMatcher = /(自備現鈔|現鈔|小額零錢|備用現金)/i;

                    if (financialIndex === -1) {
                        checklists.unshift({
                            id: generateId(),
                            category: '文件與財務',
                            items: [createPaymentMethodItem(), createCashItem()]
                        });
                    } else {
                        const category = checklists[financialIndex] || {};
                        const items = Array.isArray(category.items) ? [...category.items] : [];
                        if (!items.some((item) => paymentMatcher.test(String(item?.text || '')))) {
                            items.push(createPaymentMethodItem());
                        }
                        if (!items.some((item) => cashMatcher.test(String(item?.text || '')))) {
                            items.push(createCashItem());
                        }
                        checklists[financialIndex] = { ...category, items };
                    }

                    return { ...plan, checklists };
                })
            };
        };

        const PLAN_ACTIONS = {
            UPDATE_NODE_TITLE: 'UPDATE_NODE_TITLE',
            UPDATE_NODE_TYPE: 'UPDATE_NODE_TYPE',
            UPDATE_NODE_TIME: 'UPDATE_NODE_TIME',
            UPDATE_NODE_TAGS: 'UPDATE_NODE_TAGS',
            UPDATE_NODE_FIELD: 'UPDATE_NODE_FIELD',
            UPDATE_CURRENCY: 'UPDATE_CURRENCY',
            UPDATE_COST: 'UPDATE_COST',
            ADD_NODE_EXPENSE_ITEM: 'ADD_NODE_EXPENSE_ITEM',
            UPDATE_NODE_EXPENSE_ITEM: 'UPDATE_NODE_EXPENSE_ITEM',
            DELETE_NODE_EXPENSE_ITEM: 'DELETE_NODE_EXPENSE_ITEM',
            REORDER_NODE_EXPENSE_ITEM: 'REORDER_NODE_EXPENSE_ITEM',
            ADD_NODE: 'ADD_NODE',
            DELETE_NODE: 'DELETE_NODE',
            DUPLICATE_NODE: 'DUPLICATE_NODE',
            REORDER_NODES: 'REORDER_NODES',
            ADD_SUBTASK: 'ADD_SUBTASK',
            UPDATE_SUBTASK: 'UPDATE_SUBTASK',
            DELETE_SUBTASK: 'DELETE_SUBTASK',
            ADD_CHILD_NODE: 'ADD_CHILD_NODE',
            UPDATE_CHILD_TITLE: 'UPDATE_CHILD_TITLE',
            DELETE_CHILD_NODE: 'DELETE_CHILD_NODE',
            ADD_CHILD_SUBTASK: 'ADD_CHILD_SUBTASK',
            UPDATE_CHILD_SUBTASK: 'UPDATE_CHILD_SUBTASK',
            DELETE_CHILD_SUBTASK: 'DELETE_CHILD_SUBTASK',
            MOVE_NODE_TO_DAY: 'MOVE_NODE_TO_DAY',
            ADD_MEMO: 'ADD_MEMO',
            UPDATE_MEMO: 'UPDATE_MEMO',
            DELETE_MEMO: 'DELETE_MEMO',
            ADD_DAY: 'ADD_DAY',
            DELETE_DAY: 'DELETE_DAY',
            ADD_PLAN: 'ADD_PLAN',
            DELETE_PLAN: 'DELETE_PLAN',
            UPDATE_CHECKLIST: 'UPDATE_CHECKLIST',
            ADD_CHECKLIST_CATEGORY: 'ADD_CHECKLIST_CATEGORY',
            UPDATE_CHECKLIST_CATEGORY: 'UPDATE_CHECKLIST_CATEGORY',
            DELETE_CHECKLIST_CATEGORY: 'DELETE_CHECKLIST_CATEGORY',
            ADD_CHECKLIST_ITEM: 'ADD_CHECKLIST_ITEM',
            UPDATE_CHECKLIST_ITEM: 'UPDATE_CHECKLIST_ITEM',
            DELETE_CHECKLIST_ITEM: 'DELETE_CHECKLIST_ITEM',
            SET_DATA: 'SET_DATA',
            ADD_COMPANION: 'ADD_COMPANION',
            DELETE_COMPANION: 'DELETE_COMPANION',
            RENAME_COMPANION: 'RENAME_COMPANION',
            TOGGLE_COMPANION_CATEGORY_RULE: 'TOGGLE_COMPANION_CATEGORY_RULE',
            TOGGLE_COMPANION_RULE_AUTO_APPLY: 'TOGGLE_COMPANION_RULE_AUTO_APPLY',
            ADD_PAYMENT_SOURCE: 'ADD_PAYMENT_SOURCE',
            UPDATE_PAYMENT_SOURCE: 'UPDATE_PAYMENT_SOURCE',
            DELETE_PAYMENT_SOURCE: 'DELETE_PAYMENT_SOURCE',
            UPDATE_NODE_PAID_BY: 'UPDATE_NODE_PAID_BY',
            TOGGLE_NODE_SPLIT_AMONG: 'TOGGLE_NODE_SPLIT_AMONG',
            UPDATE_PAYMENT_STATUS: 'UPDATE_PAYMENT_STATUS',
            SWAP_DAYS: 'SWAP_DAYS'
        };

        const planReducer = (state, action) => {
            const { type, payload } = action;
            
            const updatePlan = (planId, updater) => ({
                ...state,
                plans: state.plans.map(p => p.id === planId ? updater(p) : p)
            });

            const updateDay = (planId, dayId, updater) => updatePlan(planId, p => ({
                ...p,
                days: p.days.map(d => d.id === dayId ? updater(d) : d)
            }));

            const updateNode = (planId, dayId, nodeId, updater) => updateDay(planId, dayId, d => ({
                ...d,
                nodes: d.nodes.map(n => n.id === nodeId ? updater(n) : n)
            }));

            switch (type) {
                case PLAN_ACTIONS.SET_DATA:
                    return normalizeStoredData(payload);
                
                case PLAN_ACTIONS.UPDATE_NODE_TITLE:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => {
                        const newTitle = payload.title;
                        // 智慧圖示匹配：如果目前型態是默認的 activity 或是空，嘗試根據標題自動匹配
                        let newType = n.type;
                        if (!n.type || n.type === 'activity' || n.type === 'location') {
                            const matchedType = matchIconByTitle(newTitle);
                            if (matchedType) newType = matchedType;
                        }
                        return { ...n, title: newTitle, type: newType };
                    });
                
                case PLAN_ACTIONS.UPDATE_NODE_TYPE:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({ ...n, type: payload.type }));

                case PLAN_ACTIONS.UPDATE_NODE_TIME:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({ ...n, time: payload.time }));

                case PLAN_ACTIONS.UPDATE_NODE_TAGS:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({ ...n, tags: payload.tags }));

                case PLAN_ACTIONS.UPDATE_NODE_FIELD:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({ ...n, [payload.field]: payload.value }));

                case PLAN_ACTIONS.UPDATE_CURRENCY:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => {
                        const items = normalizeExpenseItems(n);
                        if (items.length === 0) {
                            return { ...n, currency: payload.value };
                        }
                        const next = items.map((it, idx) => idx === 0 ? { ...it, currency: payload.value } : it);
                        return syncLegacyExpenseFields({ ...n, currency: payload.value }, next);
                    });

                case PLAN_ACTIONS.UPDATE_COST:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => {
                        const plan = state.plans.find(p => p.id === payload.planId);
                        const paymentSources = getPlanPaymentSources(plan);
                        const amount = Number(payload.value || 0);
                        const items = normalizeExpenseItems(n);
                        if (items.length === 0) {
                            const defaultItem = amount > 0 ? [{
                                id: `${n.id || generateId()}-default-expense`,
                                currency: n.currency || 'TWD',
                                amount,
                                category: 'other',
                                note: n.note || '',
                                paidBy: n.paidBy || '',
                                splitAmong: Array.isArray(n.splitAmong) ? n.splitAmong : [],
                                expenseStatus: 'actual',
                                paymentMethod: getNormalizedPaymentMethod(n.paymentMethod, n.paymentStatus || 'cash'),
                                paymentSourceId: pickDefaultPaymentSourceId(paymentSources, getNormalizedPaymentMethod(n.paymentMethod, n.paymentStatus || 'cash'), n.currency || 'TWD'),
                                paymentStatus: getLegacyPaymentStatusFromMethod(getNormalizedPaymentMethod(n.paymentMethod, n.paymentStatus || 'cash'))
                            }] : [];
                            return syncLegacyExpenseFields({ ...n, cost: amount }, defaultItem);
                        }
                        const next = items.map((it, idx) => idx === 0 ? { ...it, amount } : it);
                        return syncLegacyExpenseFields({ ...n, cost: amount }, next.map(item => harmonizeExpensePaymentFields(item, paymentSources)));
                    });

                case PLAN_ACTIONS.ADD_NODE_EXPENSE_ITEM:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => {
                        const plan = state.plans.find(p => p.id === payload.planId);
                        const paymentSources = getPlanPaymentSources(plan);
                        const newExpense = applyCategoryRuleToExpenseItem({
                            id: generateId(),
                            currency: payload.currency || n.currency || 'TWD',
                            amount: Number(payload.amount || 0),
                            category: payload.category || 'other',
                            subCategory: String(payload.subCategory || ''),
                            note: payload.note || '',
                            paidBy: '',
                            splitAmong: [],
                            expenseStatus: 'actual',
                            paymentMethod: 'cash',
                            paymentSourceId: pickDefaultPaymentSourceId(paymentSources, 'cash', payload.currency || n.currency || 'TWD'),
                            paymentStatus: 'cash'
                        }, plan, { force: true });
                        const next = [
                            ...normalizeExpenseItems(n),
                            harmonizeExpensePaymentFields(newExpense, paymentSources)
                        ];
                        return syncLegacyExpenseFields(n, next);
                    });

                case PLAN_ACTIONS.UPDATE_NODE_EXPENSE_ITEM:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => {
                        const plan = state.plans.find(p => p.id === payload.planId);
                        const rules = getPlanCompanionRules(plan);
                        const paymentSources = getPlanPaymentSources(plan);
                        const next = normalizeExpenseItems(n).map(it => {
                            if (it.id !== payload.expenseId) return it;
                            const nextValue = payload.field === 'amount'
                                ? Math.max(0, Number(payload.value || 0))
                                : payload.field === 'subCategory'
                                    ? String(payload.value || '')
                                    : payload.field === 'paymentSourceId'
                                        ? String(payload.value || '')
                                        : payload.value;
                            let updated = { ...it, [payload.field]: nextValue };
                            if (payload.field === 'paymentMethod') {
                                updated.paymentMethod = getNormalizedPaymentMethod(nextValue, updated.paymentStatus || 'cash');
                                updated.paymentSourceId = pickDefaultPaymentSourceId(paymentSources, updated.paymentMethod, updated.currency || 'TWD');
                            }
                            if (payload.field === 'category' && rules.autoApplyOnCategoryChange) {
                                updated = applyCategoryRuleToExpenseItem(updated, plan, { force: false });
                            }
                            return harmonizeExpensePaymentFields(updated, paymentSources);
                        });
                        return syncLegacyExpenseFields(n, next);
                    });

                case PLAN_ACTIONS.DELETE_NODE_EXPENSE_ITEM:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => {
                        const next = normalizeExpenseItems(n).filter(it => it.id !== payload.expenseId);
                        return syncLegacyExpenseFields(n, next);
                    });

                case PLAN_ACTIONS.REORDER_NODE_EXPENSE_ITEM:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => {
                        const items = normalizeExpenseItems(n);
                        const fromIndex = items.findIndex(it => it.id === payload.expenseId);
                        const toIndex = fromIndex + payload.direction;
                        if (fromIndex === -1 || toIndex < 0 || toIndex >= items.length) return n;
                        const next = [...items];
                        const [moved] = next.splice(fromIndex, 1);
                        next.splice(toIndex, 0, moved);
                        return syncLegacyExpenseFields(n, next);
                    });

                case PLAN_ACTIONS.ADD_NODE:
                    return updateDay(payload.planId, payload.dayId, d => ({
                        ...d,
                        nodes: [...d.nodes, { 
                            id: generateId(), 
                            title: payload.title || "新行程節點 (可編輯)", 
                            type: matchIconByTitle(payload.title) || "activity", 
                            time: payload.time || "", 
                            tags: "", 
                            cost: 0,
                            currency: 'TWD',
                            expenseItems: [],
                            paidBy: '',
                            splitAmong: [],
                            paymentStatus: 'cash',
                            lat: "", 
                            lng: "", 
                            subtasks: [], 
                            children: [] 
                        }]
                    }));

                case PLAN_ACTIONS.DELETE_NODE:
                    return updateDay(payload.planId, payload.dayId, d => ({
                        ...d,
                        nodes: d.nodes.filter(n => n.id !== payload.nodeId)
                    }));

                case PLAN_ACTIONS.REORDER_NODES:
                    return updateDay(payload.planId, payload.dayId, d => ({
                        ...d,
                        nodes: payload.nodes
                    }));

                case PLAN_ACTIONS.ADD_SUBTASK:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({
                        ...n,
                        subtasks: [...n.subtasks, { id: generateId(), text: "預估 0 分鐘", type: "transit" }]
                    }));

                case PLAN_ACTIONS.UPDATE_SUBTASK:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({
                        ...n,
                        subtasks: n.subtasks.map(s => s.id === payload.subtaskId ? { ...s, text: payload.text } : s)
                    }));

                case PLAN_ACTIONS.DELETE_SUBTASK:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({
                        ...n,
                        subtasks: n.subtasks.filter(s => s.id !== payload.subtaskId)
                    }));

                case PLAN_ACTIONS.ADD_CHILD_NODE:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({
                        ...n,
                        children: [...(n.children || []), { id: generateId(), title: "備選方案", subtasks: [] }]
                    }));

                case PLAN_ACTIONS.UPDATE_CHILD_TITLE:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({
                        ...n,
                        children: n.children.map(c => c.id === payload.childId ? { ...c, title: payload.title } : c)
                    }));

                case PLAN_ACTIONS.DELETE_CHILD_NODE:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({
                        ...n,
                        children: n.children.filter(c => c.id !== payload.childId)
                    }));

                case PLAN_ACTIONS.ADD_CHILD_SUBTASK:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({
                        ...n,
                        children: n.children.map(c => c.id === payload.childId ? {
                            ...c,
                            subtasks: [...(c.subtasks || []), { id: generateId(), text: "預估 0 分鐘" }]
                        } : c)
                    }));

                case PLAN_ACTIONS.UPDATE_CHILD_SUBTASK:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({
                        ...n,
                        children: n.children.map(c => c.id === payload.childId ? {
                            ...c,
                            subtasks: c.subtasks.map(s => s.id === payload.subtaskId ? { ...s, text: payload.text } : s)
                        } : c)
                    }));

                case PLAN_ACTIONS.DELETE_CHILD_SUBTASK:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => ({
                        ...n,
                        children: n.children.map(c => c.id === payload.childId ? {
                            ...c,
                            subtasks: c.subtasks.filter(s => s.id !== payload.subtaskId)
                        } : c)
                    }));

                case PLAN_ACTIONS.DUPLICATE_NODE: {
                    const plan = state.plans.find(p => p.id === payload.planId);
                    const day = plan.days.find(d => d.id === payload.dayId);
                    const sourceNode = day.nodes.find(n => n.id === payload.nodeId);
                    const newNode = JSON.parse(JSON.stringify(sourceNode));
                    newNode.id = generateId();
                    newNode.expenseItems = normalizeExpenseItems(newNode).map(it => ({ ...it, id: generateId() }));
                    newNode.subtasks = newNode.subtasks.map(s => ({ ...s, id: generateId() }));
                    newNode.children = (newNode.children || []).map(c => ({
                        ...c, id: generateId(),
                        subtasks: (c.subtasks || []).map(cs => ({ ...cs, id: generateId() }))
                    }));
                    
                    return updateDay(payload.planId, payload.dayId, d => {
                        const idx = d.nodes.findIndex(n => n.id === payload.nodeId);
                        const newNodes = [...d.nodes];
                        newNodes.splice(idx + 1, 0, newNode);
                        return { ...d, nodes: newNodes };
                    });
                }

                case PLAN_ACTIONS.MOVE_NODE_TO_DAY: {
                    const sourcePlan = state.plans.find(p => p.id === payload.planId);
                    const sourceDay = sourcePlan.days.find(d => d.id === payload.sourceDayId);
                    const node = sourceDay.nodes.find(n => n.id === payload.nodeId);
                    if (!node) return state;

                    let newState = state;
                    newState = {
                        ...newState,
                        plans: newState.plans.map(p => p.id === payload.planId ? {
                            ...p,
                            days: p.days.map(d => {
                                if (d.id === payload.sourceDayId) return { ...d, nodes: d.nodes.filter(n => n.id !== payload.nodeId) };
                                if (d.id === payload.targetDayId) return { ...d, nodes: [...d.nodes, node] };
                                return d;
                            })
                        } : p)
                    };
                    return newState;
                }

                case PLAN_ACTIONS.ADD_MEMO:
                    return updateDay(payload.planId, payload.dayId, d => ({
                        ...d,
                        memos: [...(d.memos || []), payload.memo]
                    }));

                case PLAN_ACTIONS.UPDATE_MEMO:
                    return updateDay(payload.planId, payload.dayId, d => ({
                        ...d,
                        memos: d.memos.map(m => m.id === payload.memoId ? payload.updatedMemo : m)
                    }));

                case PLAN_ACTIONS.DELETE_MEMO:
                    return updateDay(payload.planId, payload.dayId, d => ({
                        ...d,
                        memos: d.memos.filter(m => m.id !== payload.memoId)
                    }));

                case PLAN_ACTIONS.ADD_DAY:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        days: [...p.days, payload.day]
                    }));

                case PLAN_ACTIONS.DELETE_DAY:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        days: p.days.filter(d => d.id !== payload.dayId)
                    }));

                case PLAN_ACTIONS.ADD_PLAN:
                    return { ...state, plans: [...state.plans, payload.plan] };

                case PLAN_ACTIONS.DELETE_PLAN:
                    return { ...state, plans: state.plans.filter(p => p.id !== payload.planId) };

                case PLAN_ACTIONS.ADD_CHECKLIST_CATEGORY:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        checklists: [...(p.checklists || []), { id: generateId(), category: payload.category, items: [] }]
                    }));

                case PLAN_ACTIONS.UPDATE_CHECKLIST_CATEGORY:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        checklists: p.checklists.map(cl => cl.id === payload.categoryId ? { ...cl, category: payload.category } : cl)
                    }));

                case PLAN_ACTIONS.DELETE_CHECKLIST_CATEGORY:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        checklists: p.checklists.filter(cl => cl.id !== payload.categoryId)
                    }));

                case PLAN_ACTIONS.ADD_CHECKLIST_ITEM:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        checklists: p.checklists.map(cl => cl.id === payload.categoryId ? {
                            ...cl, items: [...cl.items, { id: generateId(), text: payload.text, isChecked: false, isNote: false }]
                        } : cl)
                    }));

                case PLAN_ACTIONS.UPDATE_CHECKLIST_ITEM:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        checklists: p.checklists.map(cl => cl.id === payload.categoryId ? {
                            ...cl, items: cl.items.map(i => i.id === payload.itemId ? { ...i, ...payload.update } : i)
                        } : cl)
                    }));

                case PLAN_ACTIONS.DELETE_CHECKLIST_ITEM:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        checklists: p.checklists.map(cl => cl.id === payload.categoryId ? {
                            ...cl, items: cl.items.filter(i => i.id !== payload.itemId)
                        } : cl)
                    }));

                case PLAN_ACTIONS.ADD_COMPANION:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        companions: [...(p.companions || []), { id: generateId(), name: payload.name, color: COMPANION_COLORS[(p.companions || []).length % COMPANION_COLORS.length] }]
                    }));
                case PLAN_ACTIONS.DELETE_COMPANION:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        companions: (p.companions || []).filter(c => c.id !== payload.compId),
                        companionRules: {
                            ...getPlanCompanionRules(p),
                            categorySplitDefaults: Object.fromEntries(
                                Object.entries(getPlanCompanionRules(p).categorySplitDefaults).map(([cat, ids]) => [cat, ids.filter(id => id !== payload.compId)])
                            )
                        }
                    }));
                case PLAN_ACTIONS.RENAME_COMPANION:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        companions: (p.companions || []).map(c => c.id === payload.compId ? { ...c, name: payload.newName } : c)
                    }));
                case PLAN_ACTIONS.TOGGLE_COMPANION_CATEGORY_RULE:
                    return updatePlan(payload.planId, p => {
                        const rules = getPlanCompanionRules(p);
                        const current = rules.categorySplitDefaults[payload.category] || [];
                        const next = current.includes(payload.compId)
                            ? current.filter(id => id !== payload.compId)
                            : [...current, payload.compId];
                        return {
                            ...p,
                            companionRules: {
                                ...rules,
                                categorySplitDefaults: {
                                    ...rules.categorySplitDefaults,
                                    [payload.category]: next
                                }
                            }
                        };
                    });
                case PLAN_ACTIONS.TOGGLE_COMPANION_RULE_AUTO_APPLY:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        companionRules: {
                            ...getPlanCompanionRules(p),
                            autoApplyOnCategoryChange: payload.value
                        }
                    }));
                case PLAN_ACTIONS.ADD_PAYMENT_SOURCE:
                    return updatePlan(payload.planId, p => ({
                        ...p,
                        paymentSources: [
                            ...getPlanPaymentSources(p),
                            normalizePaymentSource(payload.source || {
                                name: `支付來源 ${(getPlanPaymentSources(p).length || 0) + 1}`,
                                method: 'cash',
                                currency: 'TWD',
                                initialAmount: 0,
                                note: ''
                            }, getPlanPaymentSources(p).length)
                        ]
                    }));
                case PLAN_ACTIONS.UPDATE_PAYMENT_SOURCE:
                    return updatePlan(payload.planId, p => {
                        const currentSources = getPlanPaymentSources(p);
                        const nextSources = currentSources.map((source, index) => {
                            if (source.id !== payload.sourceId) return source;
                            const patch = payload.field === 'initialAmount'
                                ? { [payload.field]: Math.max(0, Number(payload.value || 0)) }
                                : { [payload.field]: payload.value };
                            return normalizePaymentSource({ ...source, ...patch }, index);
                        });
                        return {
                            ...p,
                            paymentSources: nextSources,
                            days: p.days.map(day => ({
                                ...day,
                                nodes: day.nodes.map(node => syncLegacyExpenseFields(node, normalizeExpenseItems(node).map(item => harmonizeExpensePaymentFields(item, nextSources))))
                            }))
                        };
                    });
                case PLAN_ACTIONS.DELETE_PAYMENT_SOURCE:
                    return updatePlan(payload.planId, p => {
                        const filteredSources = getPlanPaymentSources(p).filter(source => source.id !== payload.sourceId);
                        const nextSources = filteredSources.length > 0 ? filteredSources : createDefaultPaymentSources();
                        return {
                            ...p,
                            paymentSources: nextSources,
                            days: p.days.map(day => ({
                                ...day,
                                nodes: day.nodes.map(node => {
                                    const nextItems = normalizeExpenseItems(node).map(item => {
                                        const cleared = item.paymentSourceId === payload.sourceId
                                            ? { ...item, paymentSourceId: '' }
                                            : item;
                                        return harmonizeExpensePaymentFields(cleared, nextSources);
                                    });
                                    return syncLegacyExpenseFields(node, nextItems);
                                })
                            }))
                        };
                    });
                case PLAN_ACTIONS.UPDATE_NODE_PAID_BY:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => {
                        const items = normalizeExpenseItems(n);
                        if (items.length === 0) return { ...n, paidBy: payload.compId };
                        const next = items.map((it, idx) => idx === 0 ? { ...it, paidBy: payload.compId } : it);
                        return syncLegacyExpenseFields({ ...n, paidBy: payload.compId }, next);
                    });
                case PLAN_ACTIONS.TOGGLE_NODE_SPLIT_AMONG:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => {
                        const items = normalizeExpenseItems(n);
                        const list = (items[0]?.splitAmong || n.splitAmong || []);
                        const nextList = list.includes(payload.compId) ? list.filter(id => id !== payload.compId) : [...list, payload.compId];
                        if (items.length === 0) {
                            return { ...n, splitAmong: nextList };
                        }
                        const next = items.map((it, idx) => idx === 0 ? { ...it, splitAmong: nextList } : it);
                        return syncLegacyExpenseFields({ ...n, splitAmong: nextList }, next);
                    });
                case PLAN_ACTIONS.UPDATE_PAYMENT_STATUS:
                    return updateNode(payload.planId, payload.dayId, payload.nodeId, n => {
                        const plan = state.plans.find(p => p.id === payload.planId);
                        const paymentSources = getPlanPaymentSources(plan);
                        const items = normalizeExpenseItems(n);
                        const paymentMethod = payload.status === 'sunk' ? 'card' : 'cash';
                        if (items.length === 0) {
                            return {
                                ...n,
                                paymentMethod,
                                paymentStatus: getLegacyPaymentStatusFromMethod(paymentMethod),
                                paymentSourceId: pickDefaultPaymentSourceId(paymentSources, paymentMethod, n.currency || 'TWD')
                            };
                        }
                        const next = items.map((it, idx) => idx === 0
                            ? harmonizeExpensePaymentFields({
                                ...it,
                                paymentMethod,
                                paymentSourceId: pickDefaultPaymentSourceId(paymentSources, paymentMethod, it.currency || 'TWD')
                            }, paymentSources)
                            : it);
                        return syncLegacyExpenseFields({ ...n, paymentStatus: getLegacyPaymentStatusFromMethod(paymentMethod), paymentMethod }, next);
                    });
                case PLAN_ACTIONS.SWAP_DAYS: {
                    const plan = state.plans.find(p => p.id === payload.planId);
                    const days = [...plan.days];
                    const idx1 = days.findIndex(d => d.id === payload.dayId1);
                    const idx2 = days.findIndex(d => d.id === payload.dayId2);
                    if (idx1 !== -1 && idx2 !== -1) {
                        const temp = days[idx1];
                        days[idx1] = days[idx2];
                        days[idx2] = temp;
                    }
                    return updatePlan(payload.planId, p => ({ ...p, days }));
                }
                default:
                    return state;
            }
        };

        // --- 備忘錄可用顏色 ---
        const MEMO_COLORS = [
            { name: "bg-yellow-200", hex: "#fef08a" },
            { name: "bg-pink-200",   hex: "#fbcfe8" },
            { name: "bg-blue-200",   hex: "#bfdbfe" },
            { name: "bg-green-200",  hex: "#bbf7d0" },
            { name: "bg-purple-200", hex: "#e9d5ff" },
            { name: "bg-orange-200", hex: "#fed7aa" }
        ];

        // --- 節點可用樣式 ---
        const NODE_STYLES = {
            hotel:    { border: '#8b5cf6', bg: '#f5f3ff', icon: '🏨', label: '住宿' },
            restaurant: { border: '#f59e0b', bg: '#fffbeb', icon: '🍽️', label: '餐廳' },
            meal:     { border: '#f59e0b', bg: '#fffbeb', icon: '🍽️', label: '餐食' },
            location: { border: '#3b82f6', bg: '#eff6ff', icon: '📍', label: '地點' },
            activity: { border: '#10b981', bg: '#ecfdf5', icon: '🎯', label: '活動' },
            transit:  { border: '#6366f1', bg: '#eef2ff', icon: '🚃', label: '交通' },
            flight:   { border: '#0ea5e9', bg: '#f0f9ff', icon: '✈️', label: '飛行' },
            shopping: { border: '#ec4899', bg: '#fdf2f8', icon: '🛍️', label: '購物' }
        };
        const DEFAULT_NODE_STYLE = { border: '#64748b', bg: '#f8fafc', icon: '📌', label: '其他' };

        // --- 智慧圖示匹配系統 ---
        const matchIconByTitle = (title) => {
            if (!title) return null;
            const t = title.toLowerCase();
            if (t.includes('機') || t.includes('flight') || t.includes('airport') || t.includes('線') || t.includes('羽田') || t.includes('成田') || t.includes('關西')) return 'flight';
            if (t.includes('飯店') || t.includes('住') || t.includes('宿') || t.includes('hotel') || t.includes('check-in') || t.includes('apa') || t.includes('hilton')) return 'hotel';
            if (t.includes('食') || t.includes('餐') || t.includes('吃') || t.includes('飯') || t.includes('麵') || t.includes('restaurant') || t.includes('一蘭')) return 'restaurant';
            if (t.includes('車') || t.includes('搭') || t.includes('捷運') || t.includes('地鐵') || t.includes('j r') || t.includes('jr') || t.includes('bus') || t.includes('巴士')) return 'transit';
            if (t.includes('買') || t.includes('逛') || t.includes('購物') || t.includes('唐吉') || t.includes('藥妝') || t.includes('shopping') || t.includes('outlet')) return 'shopping';
            return null;
        };

        // --- 產生隨機 ID ---
        const generateId = () => Math.random().toString(36).substr(2, 9);

        const EXPENSE_CATEGORIES = {
            food: '餐飲',
            transport: '交通',
            lodging: '住宿',
            ticket: '門票',
            shopping: '購物',
            other: '其他'
        };

        const EXPENSE_SUBCATEGORY_PRESETS = {
            food: ['早餐', '午餐', '晚餐', '咖啡', '甜點', '宵夜'],
            transport: ['火車', '高鐵', '地鐵', '公車', '計程車', '租車', '飛機', '渡輪'],
            lodging: ['飯店', '民宿', '青年旅館', '溫泉旅館', '住宿稅'],
            ticket: ['景點門票', '展覽票', '交通票券', '樂園票'],
            shopping: ['伴手禮', '藥妝', '服飾', '日用品', '紀念品'],
            other: ['保險', '網路', '手續費', '雜支']
        };

        const EXPENSE_STATUS_LABELS = {
            actual: '實際',
            estimated: '預估'
        };

        const PAYMENT_METHOD_OPTIONS = [
            { value: 'cash', label: '現金 / 自備現鈔' },
            { value: 'card', label: '信用卡' },
            { value: 'ewallet', label: '電子支付' },
            { value: 'bank', label: '轉帳 / 帳戶' },
            { value: 'other', label: '其他方式' }
        ];

        const PAYMENT_METHOD_LABELS = PAYMENT_METHOD_OPTIONS.reduce((acc, option) => {
            acc[option.value] = option.label;
            return acc;
        }, {});

        function getNormalizedPaymentMethod(method, paymentStatus = 'cash') {
            const candidate = String(method || '').trim();
            if (PAYMENT_METHOD_OPTIONS.some(option => option.value === candidate)) {
                return candidate;
            }
            return paymentStatus === 'sunk' ? 'card' : 'cash';
        }

        function getLegacyPaymentStatusFromMethod(method) {
            return getNormalizedPaymentMethod(method) === 'cash' ? 'cash' : 'sunk';
        }

        function createDefaultPaymentSources() {
            return [
                { id: generateId(), name: '自備日幣現鈔', method: 'cash', currency: 'JPY', initialAmount: 100000, note: '' },
                { id: generateId(), name: '台幣現金', method: 'cash', currency: 'TWD', initialAmount: 0, note: '' },
                { id: generateId(), name: '信用卡', method: 'card', currency: '', initialAmount: 0, note: '' },
                { id: generateId(), name: '電子支付', method: 'ewallet', currency: '', initialAmount: 0, note: '' }
            ];
        }

        function normalizePaymentSource(source, index = 0) {
            const method = getNormalizedPaymentMethod(source?.method, source?.paymentStatus || 'cash');
            return {
                id: String(source?.id || generateId()),
                name: String(source?.name || source?.label || `支付來源 ${index + 1}`),
                method,
                currency: method === 'cash' ? String(source?.currency || 'TWD') : '',
                initialAmount: Math.max(0, Number(source?.initialAmount ?? source?.amount ?? 0)),
                note: String(source?.note || '')
            };
        }

        function getPlanPaymentSources(plan) {
            const rawSources = Array.isArray(plan?.paymentSources) && plan.paymentSources.length
                ? plan.paymentSources
                : createDefaultPaymentSources();
            const seenIds = new Set();
            return rawSources.map((source, index) => {
                const normalized = normalizePaymentSource(source, index);
                let nextId = normalized.id;
                while (seenIds.has(nextId)) {
                    nextId = generateId();
                }
                seenIds.add(nextId);
                return { ...normalized, id: nextId };
            });
        }

        function pickDefaultPaymentSourceId(paymentSources, paymentMethod = 'cash', currency = 'TWD') {
            const method = getNormalizedPaymentMethod(paymentMethod);
            const sources = Array.isArray(paymentSources) ? paymentSources : [];
            const exactMatch = sources.find(source => source.method === method && (method !== 'cash' || !source.currency || source.currency === currency));
            if (exactMatch) return exactMatch.id;
            const sameMethod = sources.find(source => source.method === method);
            if (sameMethod) return sameMethod.id;
            const sameCurrencyCash = sources.find(source => source.method === 'cash' && source.currency === currency);
            if (sameCurrencyCash) return sameCurrencyCash.id;
            return sources[0]?.id || '';
        }

        function harmonizeExpensePaymentFields(expenseItem, paymentSources) {
            const currency = String(expenseItem?.currency || 'TWD');
            let method = getNormalizedPaymentMethod(expenseItem?.paymentMethod, expenseItem?.paymentStatus || 'cash');
            let sourceId = String(expenseItem?.paymentSourceId || '');
            let source = (paymentSources || []).find(item => item.id === sourceId) || null;

            if (source) {
                method = getNormalizedPaymentMethod(source.method, method);
                if (method === 'cash' && source.currency && source.currency !== currency) {
                    source = null;
                    sourceId = '';
                }
            }

            if (!sourceId) {
                sourceId = pickDefaultPaymentSourceId(paymentSources, method, currency);
                source = (paymentSources || []).find(item => item.id === sourceId) || null;
            }

            if (source) {
                method = getNormalizedPaymentMethod(source.method, method);
            }

            return {
                ...expenseItem,
                paymentMethod: method,
                paymentSourceId: sourceId || '',
                paymentStatus: getLegacyPaymentStatusFromMethod(method)
            };
        }

        function ensurePlanPaymentData(rawData) {
            if (!rawData || !Array.isArray(rawData.plans)) return rawData;
            return {
                ...rawData,
                plans: rawData.plans.map((plan) => {
                    const paymentSources = getPlanPaymentSources(plan);
                    return {
                        ...plan,
                        paymentSources,
                        days: Array.isArray(plan.days) ? plan.days.map((day) => ({
                            ...day,
                            nodes: Array.isArray(day.nodes) ? day.nodes.map((node) => {
                                const items = normalizeExpenseItems(node).map((item) => harmonizeExpensePaymentFields(item, paymentSources));
                                return syncLegacyExpenseFields(node, items);
                            }) : []
                        })) : []
                    };
                })
            };
        }

        function normalizeStoredData(rawData) {
            return ensurePlanPaymentData(ensureChecklistFinancialEssentials(rawData));
        }

        const createDefaultCompanionRuleMap = () => Object.keys(EXPENSE_CATEGORIES).reduce((acc, key) => {
            acc[key] = [];
            return acc;
        }, {});

        const getPlanCompanionRules = (plan) => {
            const companionIds = (plan?.companions || []).map(c => c.id);
            const baseMap = createDefaultCompanionRuleMap();
            const sourceMap = plan?.companionRules?.categorySplitDefaults || {};
            const normalizedMap = Object.fromEntries(
                Object.keys(baseMap).map((key) => {
                    const raw = Array.isArray(sourceMap[key]) ? sourceMap[key] : [];
                    const valid = [...new Set(raw.filter(id => companionIds.includes(id)))];
                    return [key, valid];
                })
            );
            return {
                categorySplitDefaults: normalizedMap,
                autoApplyOnCategoryChange: plan?.companionRules?.autoApplyOnCategoryChange !== false
            };
        };

        const applyCategoryRuleToExpenseItem = (expenseItem, plan, options = {}) => {
            const { force = false } = options;
            if (!expenseItem) return expenseItem;
            const rules = getPlanCompanionRules(plan);
            const category = expenseItem.category || 'other';
            const preset = rules.categorySplitDefaults[category] || [];
            if (preset.length === 0) return expenseItem;

            const currentSplit = Array.isArray(expenseItem.splitAmong) ? expenseItem.splitAmong : [];
            if (!force && currentSplit.length > 0) return expenseItem;
            return { ...expenseItem, splitAmong: preset };
        };

        const parseTimeToMinutes = (timeText) => {
            if (!timeText || typeof timeText !== 'string' || !timeText.includes(':')) return null;
            const [h, m] = timeText.split(':').map(Number);
            if (Number.isNaN(h) || Number.isNaN(m)) return null;
            return h * 60 + m;
        };

        const parseDurationToMinutes = (durationText) => {
            if (durationText === null || durationText === undefined) return 0;
            const text = String(durationText).trim();
            if (!text) return 0;

            const hourMatch = text.match(/(\d+(?:\.\d+)?)\s*(h|hr|hrs|hour|hours|小時)/i);
            const minuteMatch = text.match(/(\d+(?:\.\d+)?)\s*(m|min|mins|minute|minutes|分|分鐘)/i);
            if (hourMatch || minuteMatch) {
                const h = hourMatch ? Number(hourMatch[1] || 0) : 0;
                const m = minuteMatch ? Number(minuteMatch[1] || 0) : 0;
                return Math.round(h * 60 + m);
            }

            const firstNumber = Number((text.match(/\d+(?:\.\d+)?/) || [0])[0]);
            return Number.isFinite(firstNumber) ? Math.round(firstNumber) : 0;
        };

        const detectDayConflicts = (day) => {
            const nodes = Array.isArray(day?.nodes) ? day.nodes : [];
            const conflicts = [];

            for (let i = 1; i < nodes.length; i += 1) {
                const prev = nodes[i - 1];
                const curr = nodes[i];
                const prevMin = parseTimeToMinutes(prev?.time);
                const currMin = parseTimeToMinutes(curr?.time);
                if (prevMin !== null && currMin !== null && currMin < prevMin) {
                    conflicts.push({
                        type: 'sequence',
                        message: `排序與時間不一致：${prev.title || '未命名'} (${prev.time}) 在 ${curr.title || '未命名'} (${curr.time}) 之前。`
                    });
                }
            }

            const timedNodes = nodes
                .map((node) => ({
                    node,
                    start: parseTimeToMinutes(node?.time),
                    duration: parseDurationToMinutes(node?.duration)
                }))
                .filter(item => item.start !== null)
                .sort((a, b) => a.start - b.start);

            for (let i = 0; i < timedNodes.length - 1; i += 1) {
                const current = timedNodes[i];
                const next = timedNodes[i + 1];
                const currentEnd = current.start + Math.max(0, current.duration || 0);
                if (current.duration > 0 && next.start < currentEnd) {
                    conflicts.push({
                        type: 'overlap',
                        message: `時間重疊：${current.node.title || '未命名'} (${current.node.time}) 與 ${next.node.title || '未命名'} (${next.node.time})。`
                    });
                }
            }

            return conflicts;
        };

        const normalizeExpenseItems = (node) => {
            const nodeSeed = node?.id || 'node';
            const ensureUniqueIds = (items) => {
                const used = new Set();
                return items.map((it, index) => {
                    const baseId = String(it.id || `${nodeSeed}-expense-${index}`);
                    let nextId = baseId;
                    let suffix = 1;
                    while (used.has(nextId)) {
                        nextId = `${baseId}-${suffix}`;
                        suffix += 1;
                    }
                    used.add(nextId);
                    return { ...it, id: nextId };
                });
            };

            if (Array.isArray(node?.expenseItems) && node.expenseItems.length) {
                return ensureUniqueIds(node.expenseItems.map((it) => ({
                    id: it.id,
                    currency: it.currency || node.currency || 'TWD',
                    amount: Number(it.amount || 0),
                    category: it.category || 'other',
                    subCategory: typeof it.subCategory === 'string' ? it.subCategory : '',
                    note: it.note || '',
                    paidBy: it.paidBy || '',
                    splitAmong: Array.isArray(it.splitAmong) ? it.splitAmong : [],
                    expenseStatus: it.expenseStatus === 'estimated' ? 'estimated' : 'actual',
                    paymentMethod: getNormalizedPaymentMethod(it.paymentMethod, it.paymentStatus || node.paymentStatus || 'cash'),
                    paymentSourceId: typeof it.paymentSourceId === 'string' ? it.paymentSourceId : '',
                    paymentStatus: getLegacyPaymentStatusFromMethod(getNormalizedPaymentMethod(it.paymentMethod, it.paymentStatus || node.paymentStatus || 'cash'))
                })));
            }

            const amount = Number(node?.cost || 0);
            if (!amount) return [];
            const paymentMethod = getNormalizedPaymentMethod(node?.paymentMethod, node?.paymentStatus || 'cash');
            return ensureUniqueIds([
                {
                    id: `${nodeSeed}-default-expense`,
                    currency: node?.currency || 'TWD',
                    amount,
                    category: 'other',
                    subCategory: '',
                    note: node?.note || '',
                    paidBy: node?.paidBy || '',
                    splitAmong: Array.isArray(node?.splitAmong) ? node.splitAmong : [],
                    expenseStatus: 'actual',
                    paymentMethod,
                    paymentSourceId: typeof node?.paymentSourceId === 'string' ? node.paymentSourceId : '',
                    paymentStatus: getLegacyPaymentStatusFromMethod(paymentMethod)
                }
            ]);
        };

        const syncLegacyExpenseFields = (node, expenseItems) => {
            const items = expenseItems || normalizeExpenseItems(node);
            const first = items[0];
            const total = items.reduce((sum, it) => sum + Number(it.amount || 0), 0);
            const paymentMethod = first?.paymentMethod || getNormalizedPaymentMethod(node?.paymentMethod, node?.paymentStatus || 'cash');
            return {
                ...node,
                expenseItems: items,
                cost: total,
                currency: first?.currency || node.currency || 'TWD',
                paidBy: first?.paidBy || node.paidBy || '',
                splitAmong: Array.isArray(first?.splitAmong) ? first.splitAmong : (node.splitAmong || []),
                paymentMethod,
                paymentSourceId: first?.paymentSourceId || node.paymentSourceId || '',
                paymentStatus: first?.paymentStatus || getLegacyPaymentStatusFromMethod(paymentMethod)
            };
        };

        const getNodeExpenseByCurrency = (node) => normalizeExpenseItems(node).reduce((acc, it) => {
            const amount = Number(it.amount || 0);
            if (!amount) return acc;
            const cur = it.currency || 'TWD';
            acc[cur] = (acc[cur] || 0) + amount;
            return acc;
        }, {});

        const getNodeExpenseTotal = (node) => normalizeExpenseItems(node).reduce((sum, it) => sum + Number(it.amount || 0), 0);

        const getEffectiveSplitAmong = (expenseItem, companions) => {
            const companionIds = (companions || []).map(c => c.id);
            if (companionIds.length === 0) return [];
            const raw = Array.isArray(expenseItem?.splitAmong) ? expenseItem.splitAmong : [];
            const valid = [...new Set(raw.filter(id => companionIds.includes(id)))];
            return valid.length > 0 ? valid : companionIds;
        };

        const DEFAULT_EXCHANGE_RATES_TO_TWD = {
            TWD: 1,
            JPY: 0.22,
            USD: 32,
            EUR: 35,
            KRW: 0.024
        };

        const convertCurrencyAmount = (amount, fromCurrency, toCurrency, ratesToTwd) => {
            const safeAmount = Number(amount || 0);
            const from = fromCurrency || 'TWD';
            const to = toCurrency || 'TWD';
            if (from === to) return safeAmount;

            const fromRate = Number(ratesToTwd?.[from] || 0);
            const toRate = Number(ratesToTwd?.[to] || 0);
            if (!fromRate || !toRate) return safeAmount;

            const inTwd = safeAmount * fromRate;
            return inTwd / toRate;
        };

        const calculateSettlementTransfers = (summaryRows) => {
            const creditors = summaryRows
                .filter(row => row.diff > 0.01)
                .map(row => ({ id: row.id, amount: row.diff }))
                .sort((a, b) => b.amount - a.amount);
            const debtors = summaryRows
                .filter(row => row.diff < -0.01)
                .map(row => ({ id: row.id, amount: Math.abs(row.diff) }))
                .sort((a, b) => b.amount - a.amount);

            const transfers = [];
            let i = 0;
            let j = 0;
            while (i < debtors.length && j < creditors.length) {
                const debtor = debtors[i];
                const creditor = creditors[j];
                const payAmount = Math.min(debtor.amount, creditor.amount);

                transfers.push({
                    fromId: debtor.id,
                    toId: creditor.id,
                    amount: payAmount
                });

                debtor.amount -= payAmount;
                creditor.amount -= payAmount;

                if (debtor.amount <= 0.01) i += 1;
                if (creditor.amount <= 0.01) j += 1;
            }
            return transfers;
        };

        // --- 自動增高 Textarea 元件 ---
        const AutoResizeTextarea = ({ value, onChange, className, placeholder }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.style.height = 'auto';
                    ref.current.style.height = ref.current.scrollHeight + 'px';
                }
            }, [value]);
            return (
                <textarea
                    ref={ref}
                    className={`auto-resize-textarea ${className}`}
                    value={value}
                    onChange={onChange}
                    placeholder={placeholder}
                    rows={1}
                />
            );
        };

        // --- 元件：可拖曳的備忘錄 (Memo) ---
        const DraggableMemo = ({ memo, dayId, planId, dayNodes, dayMemos, safeTopOffset = 120, dispatch }) => {
            const [isDragging, setIsDragging] = useState(false);
            const [isResizing, setIsResizing] = useState(false);
            const [pos, setPos] = useState({ x: memo.x, y: memo.y });
            const [size, setSize] = useState({ width: memo.width || 224, height: memo.height || null });
            const [text, setText] = useState(memo.text);
            const [title, setTitle] = useState(memo.title || "MEMO");
            const [isMinimized, setIsMinimized] = useState(memo.isMinimized || false);
            const [showColorPicker, setShowColorPicker] = useState(false);
            const dragRef = useRef(null);
            const resizeRef = useRef(null);

            // 同步外部 props（匯入 JSON 或切換 Day 時）
            useEffect(() => {
                setPos({ x: memo.x, y: memo.y });
                setSize({ width: memo.width || 224, height: memo.height || null });
                setText(memo.text);
                setTitle(memo.title || 'MEMO');
                setIsMinimized(memo.isMinimized || false);
            }, [memo.id, memo.x, memo.y, memo.width, memo.height, memo.text, memo.title, memo.isMinimized]);

            const getSafeTop = () => {
                return Math.max(72, Math.round(window.scrollY + safeTopOffset + 8));
            };

            const clampMemoRect = (nextPos, nextSize, minimized = isMinimized) => {
                const margin = 8;
                const minY = getSafeTop();
                const cardW = Math.max(180, Number(nextSize.width || 224));
                const cardH = minimized ? 44 : Math.max(120, Number(nextSize.height || 180));
                const viewLeft = window.scrollX || 0;
                const viewTop = window.scrollY || 0;
                const maxX = Math.max(0, viewLeft + window.innerWidth - cardW - margin);
                const maxY = Math.max(minY, viewTop + window.innerHeight - cardH - margin);
                return {
                    x: Math.max(0, Math.min(maxX, Number(nextPos.x || 0))),
                    y: Math.max(minY, Math.min(maxY, Number(nextPos.y || minY)))
                };
            };

            const bringToFront = () => {
                const maxZ = (dayMemos || []).reduce((max, m) => {
                    const z = Number(m?.z || 50);
                    return Number.isFinite(z) ? Math.max(max, z) : max;
                }, 50);
                const nextZ = Math.min(980, maxZ + 1); // keep below sticky header (z-1000)
                dispatch({
                    type: PLAN_ACTIONS.UPDATE_MEMO,
                    payload: { planId, dayId, memoId: memo.id, updatedMemo: { ...memo, z: nextZ } }
                });
            };

            const handlePointerDown = (e) => {
                const tag = e.target.tagName.toLowerCase();
                if (tag === 'textarea' || tag === 'button' || tag === 'input' || tag === 'label' || tag === 'select') return;
                if (e.target.closest('.color-picker-area') || e.target.closest('.memo-actions') || e.target.closest('.memo-resize-handle')) return;
                bringToFront();
                setIsDragging(true);
                dragRef.current = { startX: e.pageX, startY: e.pageY, initialX: pos.x, initialY: pos.y };
                e.target.setPointerCapture(e.pointerId);
            };

            const handlePointerMove = (e) => {
                if (!isDragging) return;
                const dx = e.pageX - dragRef.current.startX;
                const dy = e.pageY - dragRef.current.startY;
                const clamped = clampMemoRect(
                    { x: dragRef.current.initialX + dx, y: dragRef.current.initialY + dy },
                    size,
                    isMinimized
                );
                setPos(clamped);
            };

            const handlePointerUp = (e) => {
                if (!isDragging) return;
                setIsDragging(false);
                dispatch({ 
                    type: PLAN_ACTIONS.UPDATE_MEMO, 
                    payload: { planId, dayId, memoId: memo.id, updatedMemo: { ...memo, x: pos.x, y: pos.y, text, title, isMinimized } } 
                });
                e.target.releasePointerCapture(e.pointerId);
            };

            // --- Resize handlers ---
            const handleResizeDown = (e) => {
                e.stopPropagation();
                bringToFront();
                setIsResizing(true);
                resizeRef.current = { startX: e.clientX, startY: e.clientY, initialW: size.width, initialH: e.target.closest('.memo-card').offsetHeight };
                e.target.setPointerCapture(e.pointerId);
            };

            const handleResizeMove = (e) => {
                if (!isResizing) return;
                const dw = e.clientX - resizeRef.current.startX;
                const dh = e.clientY - resizeRef.current.startY;
                const maxW = Math.max(180, (window.scrollX + window.innerWidth) - pos.x - 8);
                const maxH = Math.max(120, (window.scrollY + window.innerHeight) - pos.y - 8);
                const newW = Math.max(180, Math.min(maxW, resizeRef.current.initialW + dw));
                const newH = Math.max(120, Math.min(maxH, resizeRef.current.initialH + dh));
                setSize({ width: newW, height: newH });
            };

            useEffect(() => {
                const onResize = () => {
                    setPos((prev) => clampMemoRect(prev, size, isMinimized));
                    setSize((prev) => {
                        if (isMinimized) return prev;
                        const maxW = Math.max(180, (window.scrollX + window.innerWidth) - pos.x - 8);
                        const maxH = Math.max(120, (window.scrollY + window.innerHeight) - pos.y - 8);
                        return {
                            width: Math.max(180, Math.min(maxW, Number(prev.width || 224))),
                            height: prev.height == null ? null : Math.max(120, Math.min(maxH, Number(prev.height || 120)))
                        };
                    });
                };
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, [size, pos.x, pos.y, isMinimized]);

            const handleResizeUp = (e) => {
                if (!isResizing) return;
                setIsResizing(false);
                dispatch({ 
                    type: PLAN_ACTIONS.UPDATE_MEMO, 
                    payload: { planId, dayId, memoId: memo.id, updatedMemo: { ...memo, width: size.width, height: size.height } } 
                });
                e.target.releasePointerCapture(e.pointerId);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    dispatch({ 
                        type: PLAN_ACTIONS.UPDATE_MEMO, 
                        payload: { planId, dayId, memoId: memo.id, updatedMemo: { ...memo, image: ev.target.result } } 
                    });
                };
                reader.readAsDataURL(file);
            };

            const removeImage = () => {
                dispatch({ 
                    type: PLAN_ACTIONS.UPDATE_MEMO, 
                    payload: { planId, dayId, memoId: memo.id, updatedMemo: { ...memo, image: null } } 
                });
            };

            return (
                <div 
                    className={`memo-card absolute shadow-lg rounded-md overflow-visible ${memo.color} border border-black/10`}
                    style={{ 
                        left: pos.x, 
                        top: pos.y, 
                        width: size.width, 
                        height: isMinimized ? 'auto' : (size.height || 'auto'), 
                        zIndex: (isDragging || isResizing) ? 999 : Math.min(980, Number(memo.z || 50)), 
                        display: 'flex', 
                        flexDirection: 'column' 
                    }}
                >
                    {/* 拖曳把手 + 標題 */}
                    <div 
                        className="bg-black/10 memo-drag-handle flex justify-between items-center px-2 py-1"
                        onPointerDown={handlePointerDown}
                        onPointerMove={handlePointerMove}
                        onPointerUp={handlePointerUp}
                        onPointerCancel={handlePointerUp}
                    >
                        <input 
                            className="text-xs font-bold text-black/60 bg-transparent border-none focus:outline-none focus:bg-white/40 rounded px-1 w-24"
                            value={title}
                            onChange={(e) => {
                                setTitle(e.target.value);
                                dispatch({ 
                                    type: PLAN_ACTIONS.UPDATE_MEMO, 
                                    payload: { planId, dayId, memoId: memo.id, updatedMemo: { ...memo, title: e.target.value } } 
                                });
                            }}
                            placeholder="標題..."
                        />
                        <div className="memo-actions flex items-center gap-1">
                            <button onClick={() => setShowColorPicker(!showColorPicker)} className="text-black/50 hover:text-black/80 text-xs p-0.5" title="選擇顏色">
                                <i className="fas fa-palette"></i>
                                                <button
                                                    onClick={() => setPaymentSourcesCollapsed(!paymentSourcesCollapsed)}
                                                    className="flex items-center justify-center w-6 h-6 rounded-full text-slate-600 hover:bg-slate-200 hover:text-slate-800 transition-all"
                                                    title={paymentSourcesCollapsed ? '點擊展開' : '點擊收折'}
                                                >
                                                    <i className={`fas fa-chevron-${paymentSourcesCollapsed ? 'down' : 'up'} text-lg`}></i>
                                                </button>
                                    const nextState = !isMinimized;
                                    setIsMinimized(nextState);
                                    dispatch({ 
                                        type: PLAN_ACTIONS.UPDATE_MEMO, 
                                        payload: { planId, dayId, memoId: memo.id, updatedMemo: { ...memo, isMinimized: nextState } } 
                                    });
                                }} 
                                className="text-black/50 hover:text-black/80 text-xs p-0.5" 
                                title={isMinimized ? "展開" : "收合"}
                            >
                                <i className={`fas ${isMinimized ? 'fa-chevron-down' : 'fa-chevron-up'}`}></i>
                            </button>
                             <button 
                                onClick={() => dispatch({ 
                                    type: PLAN_ACTIONS.DELETE_MEMO, 
                                    payload: { planId, dayId, memoId: memo.id } 
                                })} 
                                className="text-black/50 hover:text-red-600 text-xs p-0.5" 
                                title="刪除"
                            >
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                    </div>

                    {/* 色票選擇列 (只有展開時顯示) */}
                    {!isMinimized && showColorPicker && (
                        <div className="color-picker-area flex gap-1.5 px-2 py-1.5 bg-white/50 border-b border-black/5">
                            {MEMO_COLORS.map(c => (
                                <div
                                    key={c.name}
                                    className={`color-dot ${memo.color === c.name ? 'active' : ''}`}
                                    style={{ backgroundColor: c.hex }}
                                    onClick={() => {
                                        dispatch({ 
                                            type: PLAN_ACTIONS.UPDATE_MEMO, 
                                            payload: { planId, dayId, memoId: memo.id, updatedMemo: { ...memo, color: c.name } } 
                                        });
                                        setShowColorPicker(false);
                                    }}
                                />
                            ))}
                        </div>
                    )}

                    {/* 當未收合時顯示下列內容 */}
                    {!isMinimized && (
                        <>
                            {/* 文字內容 */}
                            <textarea 
                                className="w-full p-2 bg-transparent resize-none focus:outline-none text-sm text-gray-800"
                                style={{ flex: size.height ? 1 : undefined, minHeight: size.height ? 0 : '5rem', height: size.height ? undefined : '5rem' }}
                                value={text}
                                onChange={(e) => {
                                    setText(e.target.value);
                                    dispatch({ 
                                        type: PLAN_ACTIONS.UPDATE_MEMO, 
                                        payload: { planId, dayId, memoId: memo.id, updatedMemo: { ...memo, text: e.target.value } } 
                                    });
                                }}
                                placeholder="輸入備忘錄..."
                            />

                            {/* 圖片區 */}
                            {memo.image && (
                                <div className="px-2 pb-2 relative group">
                                    <img src={memo.image} alt="備忘錄圖片" className="memo-image" />
                                    <button 
                                        onClick={removeImage}
                                        className="absolute top-1 right-3 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow"
                                    >
                                        <i className="fas fa-times"></i>
                                    </button>
                                </div>
                            )}

                            {/* 勾稽節點選擇器 */}
                            <div className="px-2 py-1.5 border-t border-black/5 bg-white/30">
                                <select
                                    className="w-full text-xs bg-white/60 border border-black/10 rounded px-1.5 py-1 focus:outline-none focus:ring-1 focus:ring-blue-300"
                                    value={memo.linkedNodeId || ''}
                                    onChange={(e) => {
                                        dispatch({ 
                                            type: PLAN_ACTIONS.UPDATE_MEMO, 
                                            payload: { planId, dayId, memoId: memo.id, updatedMemo: { ...memo, linkedNodeId: e.target.value || null } } 
                                        });
                                    }}
                                >
                                    <option value="">🔗 無勾稽節點</option>
                                    {(dayNodes || []).map(n => (
                                        <option key={n.id} value={n.id}>└ {n.title}</option>
                                    ))}
                                </select>
                            </div>

                            {/* 調整大小把手 */}
                            <div
                                className="memo-resize-handle"
                                onPointerDown={handleResizeDown}
                                onPointerMove={handleResizeMove}
                                onPointerUp={handleResizeUp}
                                onPointerCancel={handleResizeUp}
                                title="拖曳調整大小"
                            />
                        </>
                    )}
                </div>
            );
        };

        // --- B4: 地圖總覽 Modal ---
        const MapModal = ({ isOpen, onClose, activePlan }) => {
            const mapRef = useRef(null);
